body:
  text: 邱劄記卷六山陽閻若璩撰與徐勝力書昨過談偶及季悼子未執政蓋死於武子手故經未書其卒此亦見之註疏請為先生陳之政逮於大夫四世文子武子平子桓子魯文公薨君於是失國政在季氏季氏者文子也宣十八年欲去三桓以張公室成十六年魯之有季孟猶晉之有欒范政令於是乎成皆謂文子若武子始專國武子立襄五年耳上溯宣元年凡四十有一年政將誰歸乎豈論語妄語耶而左氏忠於公室之言果足據耶盖朱註之誤原於孔氏孔註之誤則以無處位置悼子故自桓子上數四世至武子止矣若知季氏中少一世種種皆合此非弟言註疏之言也與宋既庭書承示詩論八篇内及魯申公詩説此近代偽書之尤者也漢書杜欽傳闗雎為歎康王之后臣瓚曰此魯詩谷永𫝊閻妻驕扇注以為魯詩言厲王無道内寵熾盛也先君之思以畜寡人鄭康成注記時尚未得毛傳故用魯詩曰此衛夫人定姜之詩也劉向列女傳正同盖向家世魯詩故今詩說闗雎仍屬太姒燕燕仍莊姜十月之交仍幽王皆與毛詩合安在毛與三家絶異哉顯誤如此不待細攻謹告與陶紫司書承示鈍翁古今五服考異酌古佐今信為不刋之典但序疑及儀禮處謂丈夫三十而娶為之妻者乃有夫之姊之長殤之服不亦異乎疑姊字誤不知非誤也左傳國君十五而生子冠而生子禮也然則古之冠昏固有不盡二十三十者矣以十五之前之人而有妻而適遭姊喪姊尚可為中殤且不必至長也或曰諸侯絶旁期此降在緦麻已無服而謂諸侯之夫人服之乎弟曰夫人雖無服而却有服之理古五十命為大夫不特無冠禮亦當無其昏禮今乃有大夫昏禮豈非世愈變而期已不若前乎臣不殤君子不殤父殤者亦聞有子也且年十六至十九方為長殤女子十五許嫁笄而字之笄即不為殤是女子無長殤何儀禮言長殤者不一傳記紛如吾欲一以儀禮為斷此特向吾友弟云爾不敢為鈍翁道也序又疑大夫絶緦於其旁親皆然何獨為貴臣貴妾緦不知此義服也周禮王為諸侯緦衰天子且然而况大夫乎他若王一嵗而有三年之喪二只以儀禮父必三年然後娶達子之志解之故妻喪亦可稱三年期之喪達乎大夫其實大夫已降期不待大功今云云者殆又誤㑹中庸之文也復白案王為諸侯緦服衰鄭註為弔服然既葬而除亦已服五月矣又適考得喪服𫝊大夫為昆弟姑姊妹之長殤小功果五十始爵命安得有兄若姊之尚在十九以下與鄭註以此知為大夫無殤服也此既以見世有竒才盛德不必要至五十而即有幼為大夫者又以見已為大夫則用士禮冠矣冠即不為殤而後可以服他人之殤鄭註又云昆弟殤死或謂為士者古四十强而仕則四十始為士今士在殤中亦有未二十得為士者冠也仕也服官政也皆不依常法周公固已為變禮制此服矣若國語趙武冠見范文子冠時年十六七家語孔子年十九娶於宋开官氏特衰季之事以此難鈍翁鈍翁不必服不若以周公所制者還折之也又鈍翁類稿有宗婦死則夫為之齊衰三年三年喪唐儒有主三十六月者以喪服四制喪不過三年三年而祥為據竊意此二禮未知何出或鈍翁因左氏叔向語遂認王為宗子后為宗婦景王真為穆后服三年乎杜氏通典折衷鄭王兩家之説斷以禫在二十六月終又終一月禫除徙月樂是且二十八月得毋又誤記為三十六月乎欲叩之恐嬰其怒也宛轉託人致訊果不出弟所料學術至此竟成塗炭矣又承問宗子為其妻服果有異乎弟曰有異喪服小記宗子母在為妻禫而已禫乃十五月而禫非二十七月而禫也宗婦死有為之齊衰三月者未聞三年也凡喪稱三年皆再期之謂及二十五月之謂非真有三年近惟窮鄉陋邑目不覩會典等書者真服至三年不意作五服考異者而亦出此又與徐勝力書近始從人假得註疏借書之難如此昭十二年𫝊季悼子之卒也疏謂悼子卒不書於經其卒當在武子之前平子以孫繼祖武子卒後即平子立也昭二十五年𫝊政在季氏三世矣註謂文子武子又孔子世家年十七是嵗季武子卒平子代立皆足證鄙説之不誣誣不誣亦何足深計獨恠季孫行父身為權姦流毒累葉而享有忠公室無私積之偽名甚至明著聖經歴二千年為傳註者莫能指以實之嗚呼何以誅姦諛於既死哉聊因續札以發一二與江辰六書承面問鈍翁以長子筠卒以幼子穀貽為之後名之曰權是説也於禮安乎否乎弟以鈍翁長于禮學而又身為士夫不應當哀悼荒惑之餘任情黷禮若世俗人所為者其亦必有所恃乎曷恃爾殆恃宋文鑑劉原父為兄後一議乎及歸取其稾讀之果有與從弟論立後書載劉原父之議曰春秋之義有常有變取義者不得取兄弟常也既已取兄弟矣則正其禮使從子例變也僖公以兄繼弟春秋謂之子嬰齊以弟繼兄春秋亦謂之子所謂常用於常變用於變也春秋唯公羊家多異説姑勿論即以其僖公元年𫝊此非子也其稱子何臣子一例也盖僖公於閔雖庶兄實北面為臣禮諸候臣諸父兄弟以臣之繼君猶子之繼父其服皆斬故傳稱臣子一例今鈍翁非諸侯也然猶可諉者曰有嬰齊大夫之例在然今之大夫非古之大夫也古天子諸侯及卿大夫有地者皆曰君喪服𫝊君至尊也為之斬故大夫尊得以降其親兄弟之服止大功後世此禮不行而劉炫駮牛𢎞降服之議曰古之仕者唯宗子一人由是先王重適今之仕者位以才升不限適庶與古既異何降之有旨哉其由此推言之縱鈍翁無子猶不得以弟為之後而况鈍翁之子筠不過一士庶人耳而敢援古大夫之例乎或又為之解曰鈍翁固云權爾權爾竊以天下何事不可權而唯倫闗父子事渉宗祧天經地義之所在有必不可以權為辭者且公羊不嘗以權許祭仲之廢君乎君子深非之漢雋不疑亦嘗以衛輒拒父春秋是之斷衛太子之獄雖一時君臣相顧嘉歎以為經術之效而後世則罪其説之非善乎鈍翁嘗引蘇氏之言曰執聖人之一端以藉其口夫何説而不可然則斯議也其亦聖人之一端也已矣五與陶紫司今日偶見綱目漢恵帝七年尹氏發明曰天下不可一日無主恵帝以八月崩而太子以九月即位至於曠月無君考之前史盖自戊寅至辛丑二十四日而葬葬而後即位則吕氏擅朝之禍可勝言哉不覺失笑兩漢嗣君即位之禮各别西京陵寢皆生時為之故升遐後不復循古制多或經月少則旬日便葬嗣君即位猶多在既葬之後盖葬始可即吉故至東京則葬期漸遥更制令以大行柩前即位到今皆遵之若以恵帝太子遲立為吕氏之故而髙帝崩於四月甲辰恵帝即位於五月丙寅亦二十三日抑豈吕氏之故耶他若景帝嗣文越九日武帝嗣景越十日皆以既葬為斷也大抵今人不識古人草野人不識朝廷制度而宋儒又苦以道理硬説其不試於用者特幸耳竊念老弟素抱大畧而復深嗤宋儒故輙獻其説如此與王山史書頃問㸃將錄果出貴鄉王諱紹徽手否何以逆案載其事先生以此書實出阮大鋮王偶失魏閹歡謀所以解之術於阮阮授以此書而王上之而世遂以名之此鄉曲所共傳者弟思之殊不然兒時讀㸃將錄記沒遮攔穆𢎞乃大鋮豈有自作此錄而竄入巳姓名其中者乎盖大鋮本東林以求任吏掌垣不久遽彊之歸東林諸公留以處魏廓園也遂叛去禍由茲始凡事實不特鄉曲多承譌即人子孫親述其祖父云何亦互異此史學之所以難也與李天生書十年仰止始得晤於傅舎親寓何幸何幸先生從横博辯自一往莫禦但云古人叙其世系即子之於母有疑誤者弟不勝駭異因云杜公母崔不待言而所作范陽盧太君誌乃云冡婦同郡盧氏冡婦者奉天令之妻是公之母又盧盧亦名族何不見詩中有某舅内弟表姪之稱若崔者乎弟歸而詳考范陽盧太君誌與他誌例叙者不同先叙三男三女或存或沒次叙一男二女或存或沒然後叙其往葬既哭成位有若冡婦同郡盧氏介婦滎陽鄭氏鉅鹿魏氏京兆王氏皆及見存之子婦此作於天寳三載公母崔已早亡而現存者繼母也盧即其繼也公家兩世皆繼娶於盧詩中若十一舅十七舅二十四舅不著崔字面安知非盧送盧十四弟侍御懐盧十四弟侍御弟尤明為表弟天寳初南曹小司㓂舅於我太夫人堂下累土為山太夫人既盧則小司㓂舅應亦盧舅固公之母黨實亦太夫人之姪耳故有斯舉因又歎博極如牧齋亦不免誤曰冡婦盧氏的為傳寫之譌不知非譌也鄙見如此尚望先生教之與傅青主書向在太原日先生曽以禇師聲子韤而登席公怒下問云古人既脱屨復脱韤乎雖杜註古者見君解韈然書傳中僅此一見無別證何也晚不敢對盖先生博極羣書而復精析入毫芒晚何人敢知先生之所未逮乎謹識之不敢忘越四載讀陳祥道用之禮書始釋然今報禮書謂漢魏以後朝祭皆跣韤又謂梁天監間尚書參議案禮跣韤事由燕坐今極恭之所莫不皆跣清廟崇嚴既絶常禮凡有履行者應皆跣韤盖方是時有不跣韤者故議者及之可見六朝時猶然而尤妙者在案禮跣韤事由燕坐二語古祭不跣所以主敬朝不脱履以非坐故唯登坐於燕飲始有跣為歡後則以跣示敬此亦古今各不同處因怪杜註見君解韤見君字不確要須易為古者燕飲解韤耳又考得漢哀帝紀中山王賜食於前後飽起下韤係解此賜食也非燕飲比故韤尚存與馮圃芝書承示石林源師義山詩註即世盛行之呉江本然尚苦譌闕如謂李肱以霓裳羽衣曲詩及第而義山不與肱同年何亦有記得大羅天上事衆仙同日詠霓裳之句不知開成初髙鍇連知貢舉第一榜肱為首賦試琴瑟合奏詩則霓裳羽衣曲明年復前詩題為賦題而别試太學創置石經詩並鍇辭入貢院日文宗面賜故不厭重複義山畏之正二年進士其同詠霓裳復何疑焉六與陶紫司又考得唐儒學𫝊王元感論三年之喪主三十六月鳳閣舎人張柬之厯破其説其驗有四具在新唐書當時以柬之言為允而元感論遂廢豈鈍翁所指唐儒即王元感乎果爾亦犬之拾骨鈍翁尚未至此大抵通典中一段頗難理會下訖宋治平初㡬三百年禮官奏祖宗朝據通典為正以二十五月終大祥二十七月終禫二十八月終禫除是且二十九月亦與杜説異直至弟今日發之然則何恠鈍翁之不解邪與陸冰修書昨紫司兄見過云人知周公制禮而不知周姥所制之禮弟笑問出何書曰出鈍翁類藁宗婦死夫為之三年非周姥所制禮耶唐上元中武后請父在為母與父沒服同請之而未果行後卒行之盖天下邪説莫患乎倡其端後遂河决魚爛而不可挽止春秋所為惡始亂也今鈍翁雅有文譽又新領史職趨承羽翼之者唯恐後益哆然以三禮自命萬一世逺言湮譌以𫝊譌一時好異之徒起而宗之或著為律令其有害於世道人心不可勝言尤酷於武后王充不云乎俗語不實成為丹青丹青之文賢聖惑焉先生固素惡夫惑世者願勿以此等議論為等閑而力排之顯斥之無讓與陸翼王書鈍翁毁我於朝又詈我於私室終不肻已曰閻某聞有親在堂奈何用喪禮與僕相往復縱言之是已非因及檀弓之死而致死之不仁而不可為也左氏豫凶事非禮也以佐成其説嘻異哉檀弓所云乃指明器左氏所云乃指生而來贈者皆非親在而言喪禮之謂也古大功廢業况於居父母䘮宜一切廢然獨許之未葬讀䘮禮既葬讀祭禮者盖以二禮繁重苟非平日從師講肄復又習於臨時必不能按其節而合乎度若如鈍翁説是取辦倉卒人縱聖人其能一一中禮乎唐顯慶間許敬宗李義府用事謂凶事非臣子所宜言遂焚國䘏一篇凶禮由是闕今鈍翁得母類是噫士大夫議論若此弟深為世道懼焉又與陶紫司書鈍翁引鶴山雅言經止有曾祖無髙祖之文若果有髙祖稱則漢恵不應名其父為髙祖矣不覺噴飯孝恵嗣立至太上皇廟與羣臣上其父廟號曰太祖謚曰髙皇帝史記始譌而為髙祖班氏作漢書即正之曰髙帝紀何得誣孝恵憶家居時以明既有世宗而𢎞光朝又上景帝號曰代宗盖代宗即世宗不重出乎致書興化李映碧先生問之先生復書曰此當日出顧瑞屏手瑞屏時文名家未諳舊典宜來吾子之譏耳老夫耄矣幸及未死得聞髙論噫其虛懐如是洵有前輩風範也與徐電發書令宗兄勝力先生来談因及元儒黄澤趙汸之學黄曰經在致思而已趙曰何謂黄曰如禮有五不娶一為喪父長子註曰無所受命近代説者曰蓋喪父而無兄者也女之喪父無兄者衆矣何罪而見絶於人其非先王意已姑以此思之趙退而精思久之得其説曰此蓋宋桓夫人許穆夫人之類爾註謂無所受命猶未失若喪父而無兄則期功之親皆得為之主矣以復於黄黄曰甚善以弟論之果屬宋桓夫人許穆夫人之類不與上文亂家子不娶註曰類不正相重乎禮止有四不娶耳烏得五先生曰然長子蓋女子長成者而當嫁而適遭父喪故曰䘮父長子故曰無所受命此即曽子問昏禮既納幣有吉日女之父母死壻弗取事耳弟不覺擊節遽起揖曰千年幽室為子一燈照破可不謂天啓其𠂻哉猶憶故山有來問五十人人物何如者弟答以吳志伊之博覽徐勝力之彊記可稱雙絶若李天生之杜撰故事汪苕文之私造典禮恐亦未必有三焉語雖戲殆亦寔録云九與陶紫司甚矣檀弓之多誣也季武子之喪曾㸃倚其門而歌是為魯昭公七年丙寅孔子甫十七㸃少孔子若干嵗未可知然論語叙其坐次於子路則必少九嵗以上也可知計此時尚孩㓜安得有倚門而歌之事即此以推則世傳孔氏三世出妻以為實本檀弓者非唯不足信抑且無所庸其辯焉矣又與徐勝力書先生左傳之熟殆無復有兩弟請以一事問覲禮同姓大國則曰伯父小邦則曰叔父晉非小國也且勿論而自唐叔以迄文公景公皆稱為叔父何昭九年三十二年傳于平公定公反改稱伯父當其伯父也并惠公亦伯父之或曰周自景王以下實然然昭十五年景之十八年也何又曰叔父幸有以答我焉答友人書唐李太白嘲魯儒詩云問以經濟策茫如墮煙霧其弟之謂乎是以生長黄淮之濱數十年而懵然于水道雖然嘗聞其畧矣潘公季馴號印川者治河工成故老傳其要語二句曰東去只宜開海口西來切莫放周橋此二語者平平無竒竊恐神禹復生不能易矣前之治河者雖勤勞十二載專與此二語相反不惟已不開下河見人之開必從而撓之俾之去後已周家橋在髙堰南四十餘里翟壩又在周家橋南二十餘里皆堅築之以捍淮東侵者淮不東則淮彊淮彊則黄弱然後由清口以達海彼不惟周橋翟壩而已且一帯盡圯之以聼其衝溢是以末局雖知建草壩導淮入運河刷沙運漸深濬然不過暫時䇿耳豈經久之道哉今知所以失則知所以得惟當確遵印川名言廣開海口堅塞周橋斯無事矣或曰海不可濬潮汐往來人力難以施工然舊口皆係積沙水力自能衝刷故海無可濬之理惟導河以歸之海則以水治水導河即濬海之䇿也然河非專以人力導也欲順其性先懼其溢惟繕治隄防俾無旁决則水由地中沙隨水去治隄即導河之策也或曰海髙于内水不可下不知江南江北弟曾徧厯凡瀕海之地比之腹内特髙但濬治倍深無礙乎水之東注矣此今日阻撓下河者有三等人為可痛恨也一䀋城人懼醎水入内變傷其田禾一泰州車兒埠人富商居宅横當下河故道一山陽人有墳在澗河邉懼傷其風水只觀二次勘河疏皆以開廣興文閘言興文閘廣則澗河亦必挑廣而風水壊第三次便以不必廣而澗河仍故可見矣昔人謂救荒無竒䇿弟亦謂治水無竒策茍能守前人成規勿循近日浮議則兩河並治萬世永賴矣與李公凱書徐健菴先生適至云汪舍親持親在不得言喪禮益堅欲折之須經傳有明徵者亦有之乎弟對曰有一雜記曽申問於曽子曰哭父母有常聲乎申曽子次子也一檀弓子張死曽子有母之喪齊衰而往哭之案子張没于孔子後不待言而是時曽子方有母喪則孔子在時曽子母在堂可知也既在堂胡忍以䘮禮相往復若曽子問者乎果若鈍翁言則曽氏父子乃聖門逆子而世俗以為不祥人矣健菴首肻而去兹復質諸吾兄與趙秋谷書壬申夏遇馮三兄於玉峯首問訊先生起居知文酒自適不復以世務縈懐竊以天之成就我公之髙者至矣他何足云江南北盛傳阮亭先生唐賢三昧集專以盛唐為宗某亦購而熟讀其盛唐宜收而不收及非盛唐如張旭四絶句本屬蔡忠恵者亦誤收且其于古今地理之學何不講也如祖詠夕次圃田店末云西還不遑宿中夜渡涇水圃田在今開封府中牟縣於關中之涇水逺不相涉盖京水也京水出滎陽經鄭州入鄭水證以王維宿鄭州詩明當渡京水昨晚猶金谷宛然可見豈選王詩至此旋忘之耶孟浩然夜渡湘水末云行侣時相問潯陽河處邉湘水入洞庭不復至湖北漢潯陽縣在黃州府蘄州東今潯水城是晉潯陽則桓温移九江府徳化縣西于湘水皆逺不相涉證以河嶽英靈集蓋涔陽也涔陽在岳州府灃州北七十里正合豈選河岳英靈不能擇善而從耶髙適燕歌行云摐金伐鼓下榆關燕今京師榆當作渝音喻水名又曰臨渝關在永平府撫寧縣東今山海關即其移而更名者證以下文旌斾逶迤碣石間可見至王維東南缷亭上莫使有風塵卸當作御蓋吳大帝駐輦所憇後人因建御亭在晉陵顧颺監晉陵軍事於御亭築壘以禦蘇峻庾肩吾亂後經吳御亭詩御亭一囬望風塵千里昏是借問襄陽老江山空蔡州千里送行人蔡州如眼見州並當作洲蓋後漢蔡瑁居漢水之洲上故名蔡洲魏武帝嘗造其家在襄陽峴山東南一里見荆州圖經等書竊以阮亭先生才最髙名滿海内獨少集衆思廣忠益工夫遂不克無遺恨偶發憤一道不敢以聞他人也願先生為我秘之頃至白下有傳誦天上白雲如逝水草間黃蝶似秋花之句豈不使新城侍郎失色却步耶知髙文富有日新望録示一二以警憒憒山川間阻接席末由臨楮曷勝依結答萬公擇書前承下問古止再拜今四拜之禮起自何代弟學淺識劣茫然莫知一對退而竊思此寔古今禮制之大者不可不考近少徴得梗概先就古禮以對可乎按古再拜周官之褒讀為報􅉔即拜字今之两揖是也折腰而已非頭至地今四拜則頭叩地者四是兩拜字雖同而義各别唐杜甫詩老病人扶再拜難韓愈釋言見今相國鄭公愈再拜謝亦止如今兩揖耳非連叩頭也或曰拜之數既可得知矣稽首之數亦可得詳乎曰稽首止頭一至地而已無今所謂八拜四拜者覲禮侯氏降兩階之間北靣再拜稽首升成拜燕禮同再拜稽首頭一至地也升成拜升而至堂上復再拜稽首亦頭一至地惟左傳定四年秦哀公為之賦無衣九頓首而坐九頓首而坐坐即跪也所以下文云秦師乃出杜註無衣三章章三頓首據每章闋祗宜一頓首今遂三頓首盖申包胥故重其禮以謝秦君若禮之正如襄四年歌鹿鳴之三三拜三拜乃三揖耳豈得至頓首而又凡九頓首者乎故曰此禮之至變也又按燕禮有公答拜有公答再拜答拜周官之竒音羈􅉔鄭氏註一拜是也因思論語拜而受之今之一揖也再拜而送之今之兩揖也或曰論語之所謂拜止指揖而言乎曰否拜下今拜乎上皆指再拜稽首言豈止揖故曰夫言豈一端而已夫各有所當也至論語揖所與立上如揖則皆今之拱手周官肅􅉔是也又按舜典禹拜稽首讓於稷契暨臯陶詩大雅虎拜稽首天子萬年止言拜不言再者省文也何以徵之郊特牲拜服也稽首服之甚也豈有至服之甚而不先再拜者乎尤當㑹於言外又按孟子北靣稽首再拜而不受先言稽首後再拜再拜稽首而受先言再拜後稽首此何以别焉此從未經拈出者也拜而後稽首周官之吉拜是也稽首而後拜周官之凶拜是也吉拜拜之常故主於受凶拜拜之異故主不受又按朱子有跪坐拜説一篇其畧曰儀禮禮記老子所言坐皆謂跪也然記有受立不跪受坐不立則跪與坐又不同疑跪有危義兩膝著地伸腰及股而勢危者為跪兩膝著地以尻著蹠而少安者為坐小雅不遑啓居傳傳當作箋云啓疏也爾雅妥為安坐疏云安定之坐也夫以啓對居而訓啓為跪則居之為坐可見以妥為安定之坐則跪之為危坐亦可知盖兩事相似但一危一安為小不同耳因最賞趙岐孟子註於坐而言曰危坐於坐我明語子單曰坐蓋危坐者客跪而言留孟子之言迨不聽然後變色而起孟子於是命之以安坐以聽我語此兩坐字然不同而孟子文字止於前後著兩坐字中間絶不叙客起立之狀而起立自見此文章家草蛇灰線之法趙岐註則於勿敢見下先補一筆曰言而遂起退欲去請絶也為下文坐字張本漢註精妙至此宋儒不能及也案郝仲輿亦云請勿復敢見者起而告退之辭與石企齋書漆園有云在曹縣者在曹州者二曹皆春秋之曹國宋景公滅曹於魯哀公八年地故為宋有故莊周亦宋之官也竊以史記周嘗為蒙漆園吏蒙當作宋則妙不可言註史記以漆園本屬蒙邑不知一在歸徳一在兖州相距頗逺也弟嘗要改古人原文此等是也死罪死罪又監板十三經中儀禮脱誤尤多士昏禮脱壻授綏姆辭曰未教不足與為禮也一節十四字頼有長安石經據以補此一節而其註疏遂亡鄉射禮脱士鹿中翿旌以獲七字士虞禮脱哭止告事畢賓出七字特牲饋食禮脱舉觶者祭卒觶拜長皆答拜十一字少牢饋食禮脱以授尸坐取簟興七字此則秦火之所未亡而亡於監刻矣上見日知録因讀宋楊復儀禮圗末刻儀禮十七篇白文今監板脱者皆全唯哭止告事畢賓出七字作哭者止賓出五字亦不是寧脱毋删此尤可笑者尊札並當作并雖有並并通用俗字書不如廣韻古并與並音義俱異又岐山既容不得七十里文王囿而漢唐靈囿靈䑓現在今鄠縣東所以王伯厚詩地理攷以文王之囿細註於三輔黄圗靈囿在長安縣西四十二里之下嘆為千確萬確者也想像二字弟不甘受於傳有之兩見孟子皆實事不然孟子答以好事為之也何如何如來札云惠王三十一年辛巳秦虜公子卭東地至河即弟所引商君列傳魏日以削乃使使割河西之地獻於秦以和者也但弟素堅持辛巳徙大梁三十五年乙酉孟子至梁三十六年丙戌惠王死襄王立矣襄王五年與秦河西地少梁此自襄王事於惠王無渉不得如通鑑以襄五年作惠四十一年也可查孟子生卒年月考一㸔更與弟辯願聞願聞至魏地今年入於秦如兄所引蒲陽即其一明年又屬魏後年又屬秦此等事多不可言吾兩人一為輸攻一為墨守皆以孔孟為主朱子次之又讀陳幾亭書辨史傳載耿弇屠城三百為萬不可信以三説破之皆確因檢此語出後漢書耿弇傳而司馬公通鑑刪滅此一句不存真大見識湏知觀鑑要得其所以不載之意此古人絶識也只是不載丙吉問牛喘則不可解又取女有吉日而女死壻齊衰而弔既葬而除此於昏禮為請期在納采問名納吉納徵之後蓋第五禮恐以前壻不得行弔禮也以之歎太僕太僕不受六禮至納吉鄭康成曰婚姻之事於是定前解養尊者必易服亦不確請自攷之又通鑑有大可議二事一茅焦諌秦王太后復歸咸陽史記秦始皇本紀在始皇十年六國表始皇十年太后入咸陽吕不韋列傳秦王十年茅焦說王迎太后於雍歸復咸陽并不在九年嫪毒才誅之後不知文正何縁移置早一年是必有故因博考載籍得之於劉向説苑所云遷於萯陽宫茅焦上謁王按劍口沫出復為母子如初皆說苑之文也在向自有本但豈如太史遷本秦史記年月之足信乎縱不移置紛更須作數句見得本紀列傳六國表皆作十年如此說苑則作九年如彼文正從説苑以俾天下萬世人知我軰讀書精審也一始皇本紀十年止逐客令大梁人尉繚來説秦王毋愛財物賂其豪臣以亂其謀不過二三十萬金則諸侯可盡説者謂秦并天下止二策范雎創謀逺交近攻於前尉繚收功於賂其豪臣以亂其謀於後史記凡一百七十一字如何通鑑概削不載或曰得毋以梁惠王時有尉繚子此為重出乎不知前後各一人也漢志尉繚一見雜家一見兵家亦二人也自宜删史記之文補遺恐文正復生不能不心折氣盡也孟嘗平原信陵通鑑皆及其食客三千人黃歇吕不韋亦食客則削之似未允又前詆時文大名家如王唐别字譌事填塞滿紙皆時文害之也今讀歸太僕五岳山人前集序此推為三百年第一古文今文手者序云荆楚自昔多文人左氏之傳荀卿之論屈子之騷莊周之篇皆楚人也按荀卿趙人但晚為楚蘭陵令耳莊周劉向曰宋之蒙人也蒙城在商邱城外正宋地於楚何渉太僕尚如此於他人何尤朱子曰莊子自是楚人亦誤大抵考據文人不甚講理學尤不講死罪死罪又㸔得細甚矣敢不心折但謂國語不足信殊不然大傳曰牧之野武王之大事也既事而退遂率天下諸侯追王太王王季文王不以卑臨尊也武王追王正在牧野之後非如尊㫖所謂在既有天下大定之後是國語此一段正在布戎於牧之野後非前也漢髙帝稱父為太上皇此不足引乃因家令言方上徽號當時庶事草創如此無家令言幾終身庶人矣又鄭康成註卜得吉兆婚姻之事於是定此謂男家也賈公彦疏納徵則婚禮已成女家不得移改此謂女家也然則納采問名二禮雖備尚在未定之天古禮如此不可以今日討庚帖便算䋲之此事得長兄一難既精思又詳考似無可疑總之古今不同學不可不講此講學也與吳亦韓書按註疏魯侯爵宜九附庸而春秋註止邾小邾二國旋進爵子居然比鄰敵國顓臾在左傳未見為魯附庸論語方寔指之桓公十有五年邾人牟人葛人來朝杜預云皆附庸之世子也馬公驌力辯為臆說從公羊傳作夷狄之最是謝𤣥暉直中書省詩風動萬年枝日華承露掌李善注晉宫闕名曰華林園有萬年樹十四株韻府羣玉云冬青樹也無所謂春入萬年枝况日暖萬年枝乎安得先生靣訊後指示我射不主皮解主漢不主宋文公晚年輯儀禮經傳通解不主貫革解試問近時講家舍集註外又讀他書乎且㸔汪武曹大全何如與戴唐器書辨志堂解顧命曰先言西序又特言西夾者成王殯在西序以西為重也吳三兄疑蔡傳止有廟門路寢之門也成王之殯在焉故曰廟無殯在西序之説萬經何從而臆決之如此愚曰此書未可輕議因檢檀弓夏后氏殯於東階之上殷人殯于兩楹之間周人殯於西階之上西序於西階宻邇然不如竟作成王殯在西階為妥又前承靣語經術家參政指黃東發弟心知其不然以東發未知政事官卑也因考眉山家鉉翁累官端明殿學士簽書樞宻院事非參政而何蓋俞邰自以鉉翁授經河間不肯仕比太冲先生未必盡知先生學問出日抄也昔李西涯與謝方石倡和李嘗作厓山詩一聨謝意不滿李以為無可易謝笑曰觀子胷中似不止此最後曰廟堂遺恨和戎䇿宗社深恩養士年謝又笑曰㣲我子不至此李又為端禮門樂府以為末句未盡往復再四最後乃躍然起即今安石工末句不見姦黨碑但見姦臣傳是也弟料吾兄胷中才思學識尚不止此四十字蓋寔為韻脚所縛不能暢所欲言另作一首不必和韻弟當如謝方石矣又近代圖章力駮何雪漁而返文三橋書家力駮董文敏而歸趙松雪皆鑿鑿至理古學復興亦其一也適閲明文案目録可惜其中多生平欲見之文而不得見亦可惜吳園次名綺今揚州人見在且為湖州郡守豈可與李世熊比而入明文也他文體宜辯行狀豈可合墓文題後豈可作弁首皆紕繆之大者不識吾兄以為何如又特假舊唐書㕘考李浙東亦不知何名或者李翺習之全集出尚可得其人然弟老矣倦於尋訪矣張籍寄白樂天使君登第早年同座主非同年進士白貞元十四年見舊書張貞元十五年見韓集但統是禮部侍郎髙郢知貢舉故曰同座主也誰人考究及此唯吾兄賞識我耳杜于皇二丈詩三春㸔漸好千古意如何努力努力弟雖老尤當炳燭以行耳尊作竟不梓一帙得毋使臣虎葆山空回耶又歸讀陳處士墓表真正庸筆銘尤不成說話更取黃先生陳定生墓誌銘㕘㸔黃身與其事自然娓娓言之所謂襄昭以下詳是也但定生生母王安人以子貞達封者乃誤作湯孺人何也生死而肉骨誤作骨肉配湯孺人左都御史湯公兆京女則可笑湯字伯閎宜興人萬歴壬辰進士官止御史卒贈太僕寺少卿而已何曽為左都舍下有十六榜進士履歴及壯悔堂集可考然則云我先生必不誤者亦所謂淮隂少年有目無覩者也至墓表云起左都御史以言事忤同縣要人削籍陳中湛以争驕弁忤崇禎㫖去位於延儒何渉輦金巨萬於京師謀復用無此事其説長懷寧起東林無噍類此時大鋮之惡不至於此竟是說夢檄未布而事泄愈胡説南都防亂揭廣布通衢且傳四方弟㓜時熟悉之大鋮竄入其幕中何曽延儒復相阮得入其幕周亦不敢容但許用其同年馬士英而已靣時當為吾兄詳言之此關係甚大也又唐書厯志曰九執厯者出於西域開元六年詔太史監瞿曇悉達譯之向承問九執厯不能答今得之矣謹報只是嘉靖初五星聚營室占曰主有兵謀於王陽明之道何渉而黃先生歸為陽明之祥與宋乾徳五星聚奎一類不大謬乎至天啓曽四星聚於張而黃先生增潤為五星以為為子劉子而現尤竒之竒者似當將蕺山學案此等語刪去勿與後人口實則真愛我先生矣弟固蒙先生愛者不識髙明以為何如又弟嘗謂訓詁之學至宋人而亡朱子尤其著者兹偶思厯來字書皆是石激水曰磯無有如集註水激石之解者於是講章曲為附㑹曰磯水激石也當云水激於石也石喻母水喻子愚謂石喻子水喻母石激水而水怒猶子激母而母怒也至師說載萬貞一議論繼引晁以道辨小序一段以證之亦似是而非此非靣相質正往復辨析不能定也又王伯厚余㓜好竒等語乃效班氏漢書叙賛體字字精確竟名曰叙賛似非䟦䟦多不用韻不識尊見以為若何又凡叙人先世皆從曽祖起其間及髙祖必髙祖顯人或有事蹟宜書區區髙祖易一守備耳不足及黃先生及之似不知此例愚向與汪鈍翁辯者正此一事掌管詹事府官銜中有管之一字否宜去當増事字於府下以居黃河下故謂之下河大非下河對漕運河而言越職上封事越職二字宜去下文明云應詔言事矣小臣可得而言也将一束楚明明是芻字譌而不覺何也以上五條不知確否乞覆我又歸檢始皇本紀並河並海俱音傍依也古而且確逺勝循字敬服敬服右佩玦出禮記内則南嚮坐舉右邉所佩者以示東嚮坐者正合苕文真妙解閒情唯認作閒情自有白璧微瑕之刺使知終歸閒止曲終奏雅之㫖東坡譬以國風賛以屈宋正合矣然則彊作解事小兒真不識字耳吾兄云云殆以體制論尤寛言之不若弟直伐毛洗髄也又過字曽大加討論非一朝一夕矣敢詳所聞以待吾兄之自擇可乎案字書過音戈經也度也如三過其門而不入過我門而不入我室是也過音箇超也越也如地未有過千里夫子過孟賁逺矣是也又失也罪愆也如可以無大過茍有過不貳過是也是音戈之過無超也越也之解何以杜詩吾舅政如此古人誰復過道林才不世惠逺德過人作平聲乎老杜音韻至精必不誤因讀詩集傳永矢弗過音戈踰也非平聲内亦有超也越也之解乎但字書不備耳獨過失之過押入平聲似未有明證弟生平雅不喜作和韻限韻詩詩而限韻和韻譬猶與人鬬而先自絆其手足豈能勝乎至歩韻則昔人所深戒矣小力從鹽凟至擕有節蟹分敬三十隻昔朱登為東海相遺張敞蟹報書曰蘧伯玉受孔氏之賜必以及鄉人敞謹分斯貺於三老尊行者何敢獨享之此非所論於鄙人也唯叱存是荷又昨同雲九兄㳺紫極宫登程知節墓慨想林靈素如昨日吕洞賓不可得遇求揜鶴井亦湮無跡為之低回而不能去又欲至萬柳池以足力不繼遂返偶從蛛絲煤網中得手鈔一紙乃宛邱鄉先軰文恐大家歐蘇六公外便宜屈指及斯人槀即留尊几上不必見返也小學紺珠九經雖有其名不曽詳唐九經若何宋九經若何十三經且缺難言難言又讀書欲精不欲博用心欲純不欲雜觀書欲博常不盡意用心不純訖無成功此黃山谷語也録來為吾兄共欣賞之黃文如錢龍錫志及毛文龍袁崇煥公案致確此等文有數十百篇便可懸諸日月將來國史取法豈不勝為人作詩序乎又弟于古文一道雖不甚深然視近代作者已洞若觀火承委直筆敢不自竭其愚得大抵此道最忌者曰冗曰穉唯簡可以救冗惟老可以救穉此須多讀書多講貫非可一蹴至者劉予吉行畧情辭斐亹讀之惻惻動人書類槀後則冗穉矣查經籍考毛詩補音十卷韻補正五卷則昨來書還有八本已足不必疑當亟收之上有弱侯印出於焦氏亦無疑但有一竒事疑古文尚書自才老始而此書才老又取五子之歌仲虺之誥伊訓謂用韻最古何也韻補内必有説他日得購全帙付我一目預訂安得其書禆𫝊忽焉呈現於吾兄前亦俾我一目乎弟家原有舊唐書久不全小壻劉紫函忽得其全連披覽如此等史學豈不經天緯地何苦迯之於詩人逃之於道學詩人道學皆寡陋可耻者如西園不能辨出為西垣亦可耻也唯吾兄秘之韓昌黎餘事作詩人洵有味哉不盡中所欲云又屯作物之初生解敬聞命矣真韻自可押通韻鑿鑿唐人書寧人豈欺我哉欲易末四句云頽風其再立湖與蜀學新更復追古始長夜方及晨有昌黎送孟東野序不懈而及於古之義胡瑗翼之號湖學仲車為其高第弟子愚謂其理學不愧從祀兩廡元祐學術自指司馬文正一𣲖蘇黃一𣲖程子一𣲖為紹聖以後奸臣所厲禁初不及仲車元祐奸黨碑凡三百餘人何曽有節孝先生哉垞音茶不音差去聲鈔音抄楚交切取也畧也若讀作去聲則錢鈔之鈔矣臠音臉晉元帝公私交窘得㹠以為羙項上一臠似指豬言不指牛言然今亦有指牛言者此等講究不可不知又宋宣獻家藏書止二萬卷蓋凡無用與不足觀者皆不取葉石林曰吾書每以為法也南雷葉氏壻也文案稱葉為内弟此明朝人俗稱也儀禮姑之子稱舅之子曰内兄弟當改作妻弟見史記或婦弟見漢書孟舉自云舉所刻盡送弟必不欺弟一言慨出百金葬先友于皇丈而謂吝一書乎其不送弟者必是天蓋樓刋非守愚堂刋也守愚孟舉堂名讀五王列傳崔𤣥暐少頗屬辭晚以非巳長不復搆思專意經術宛然太原閻生一小像矣吾兄以為何如又韓昌黎贈太傅董公行狀開首三行大書曽祖仁琬祖大禮父伯良各繫官階於其下此即作文之定例也故崔評事墓銘曽大父知道大父𤣥同父倚施州房使君鄭夫人殯表曽祖隨祖玠考綘河南少尹裴君墓誌銘曽大父元簡大父曠父虬國子助教河東薛君墓誌銘曽祖希莊祖元暉父播監察御史元君妻京兆韋氏夫人墓誌銘曽祖父伯陽大王父迢王考夏卿興元少尹房君墓誌曽祖元静祖肱父巒河南少尹李公墓誌銘曽祖𢎞泰祖乾秀父爕夫人劉氏曽祖子元祖餗集賢院校理石君墓誌銘曽祖行褒祖懐一考平太原府㕘軍苖君墓誌曽大父延嗣大父含液父頴唐故河東節度使觀察滎陽鄭公神道碑文曽祖嘉範祖撫俗父洪清河郡公房公墓碣銘大王父融王父琯父乗息國夫人墓誌銘曽祖某祖某父某試大理評事王君墓誌銘曽祖爽祖微父嵩唐故檢校尚書左僕射右龍武軍統軍劉公墓誌銘曽大父承慶大父巨敖父訟唐故朝㪚大夫尚書庫部郎中鄭君墓誌銘曽祖匡時祖千尋父廸唐正議大夫尚書左丞孔公墓誌銘曽祖務本祖如珪皇考岑父故江南西道觀察使贈左㪚騎常侍太原王公墓誌銘曽祖元暕祖景肅考政河南府法曺㕘軍盧府君夫人苖氏墓誌銘曽大父襲夔大父殆庶父如蘭四門博士周況妻韓氏墓誌銘況曽祖延祖晦父良甫無及髙祖者間及髙祖如唐故朝㪚大夫越州刺史薛公墓誌銘是然必其髙祖有事足書非空空云諱某者可比如所謂公四世祖嗣汾隂公諱徳儒為隋襄城郡書佐以卒襄城有子二人皆貴其後皆蕃以大是也弟持此論最久恨不縮地質之太冲先生續入金石要例耳又錢序果詳但四聲始於南齊周顒較沈約少前其誤一梁武帝問周捨何謂四聲捨曰天子聖哲非約語特見沈約傳耳其誤二二百餘年不遵行正韻太祖固不甚可此書實録載之其誤三予本上聲今作平者非此與離騷九歌等合矣而逺逰命天閽其開闢兮排閶闔而望予召豐隆使先導兮問太㣲之所居集重陽以入帝宫兮造旬始而觀清都未嘗不讀如余蓋字有二音善乎鄭康成曰余予古今字則同音餘老杜觸目非論故新文尚起予亦押入六魚韻其誤四上聲脫去二十五拯止二十九部此近代俗書也不加釐正其誤五以一序四五葉而有此五誤豈不可恠此弟之生平苦心戮力晚漸有㑹盤鬰於胸臆間欲一吐露吾兄之前者安得數晨夕乎明文衡有胡翰衡運論即萬一千七百八十年分為十二運今交入大壯卦之説雲九兄止見其書元大徳間曉山老人撰不知曉山廣陵人姓秦氏弟以仲申論證之耳又昨如李太白所云今日酔飽樂過千春然不為折福者以一日而三善得焉請具陳之第一聞髙論椰經珠經只算得東坡酒經入文集雜著類中豈得標一目曰經實以椰經珠經乎真不通必非黃先生之本意也主一為之弟謂昭明太子選離騷經明曰經矣列於騷之目之下不敢曰經矣第二塗中誦上山採蘼蕪一首蕪夫夫如殊如去素餘素故凡十一押韻雖平去相雜實合顧氏四聲一貫之義三百篇多有以周顒沈約未出無四聲之截然畫界不相通貫者也初以為隔句韻大非大非第三枕中思明文授讀必不出黃先生手果出黃先生手敢直標其父名曰黃尊素乎竊以元好問中州集選其父徳名詩目曰先大夫不敢標名憶邱季貞選淮安詩城標其尊人之名曰邱峻孫為余懷澹心所寄語直攻當燬其板且并追還其已送人間者無令世謂淮安人不通邱氏子為不孝嚴哉嚴哉曽謂黃先生一代文獻而忍出於此乎敢出於此乎請詳思熟復以答我望望又老饕無厭固見諒於知巳得毋為君家庖人所嗤笑乎雖然杜于皇二丈詩云交道㸔僮僕迎余有好顔此千古未發之嗤也吾兄可隂為我察自巳僮僕庖人有倦厭之意乎抑曰我家老先生至如洛中待康節故事也程篁墩皇明文衡選其父襄毅公奏疏二篇直標名曰程信亦大不是不得藉口黃先生却從文衡中論李綱固守京城不是脱胎為天津廵撫馮留仙碑誌劉超宗一隅之見便不信此可憐可憐何況其乳臭之孫子乎又許逺誤記作雙廟而詩又不佳豈此老耄耶原不在古文名家之列但識見議論也有趣姑取數首作小品文字或亦無不可乎曽蒼山起寧都號詩國此宋時事也天水公作劉室髙孺人誌書側室之子某某與嫡子一連以為合子女皆統於父而不分書所出之例妙矣及考息國夫人墓誌銘夫人嫡也是其所親生二男一女書出非其所生側室之子不書又添一例又夢硯齋似重出古人且有家諱自宜避之愚意作寤硯齋妙絶蓋寤即夢也汲冡周書王曰今朕寤有商驚予註曰言夢為紂所伐故驚又王召左史戎夫曰今夕朕寤遂事驚予參以說文解字寤一曰晝見而夜夢也硯非日日見之物而偶夜夢者乎此寤字是自弟發之嘗謂本草解藥性不盡韻書解字義不盡當尋名手如鄭汝器八分趙秋谷行書冩之若杜首昌宋曹惡賴極矣又新刋經解復閱一過春秋名號歸一圖宋馮繼先案繼先當作元偽蜀朝人宜冠宋孫復之首乃屈居劉敞之後何也孟子音義宋孫奭案奭諡宣公真宗朝名臣屈居南宋蔡謨之後又何也宜乎東海云書不經某先生眼過譌謬百出貽笑人口罪過正復不小至總經解三字不通之至東坡端硯銘千夫挽綆百夫運斤篝火下縋以出斯珍按斤斧類斫木噐也莊子運斤成風亦作釿未聞作􅀢且編閱字書無􅀢字竊以此硯斷送在此一字答我答我又通鑑考異引張中丞傳是司馬文正時猶傳今遂亡逸惜哉今既不徵之於傳則不載雷萬春事首尾雷萬春自當如茅鹿門作南霽雲三字為是黃先生說非南霽雲之乞救於賀蘭也用之字也字文法分明照應前邉不然果屬雷萬春南霽雲一大段無根了文字未有無根者不為許逺立傳後即為逺辯白不載雷萬春事首尾後無一字及雷天下有如此文字昌黎不怕人笑倒耶又承問難妙甚只以雜肴蔬兮進侯堂肴俎寔也蔬菜也以二物共薦故曰雜今坡公作雜肴其可通乎似是趁筆之誤未可以出於坡便是金條玉律也忽思昌黎長女初適李漢更適樊宗懿金石要例載之非漢死而後嫁乃出而再嫁於樊者果爾昌黎死後漢為文集序自稱門人且云辱知最厚且親於韓氏絶矣猶曰且親乎更竒者唐書李徳裕惡李漢以漢之友壻蔣係出之外吏係即第三女之夫故與漢曰友壻昌黎死時三女尚未字人後乃嫁蔣係係名又之子也皆見唐書此時昌黎女更適人久矣猶并其姻黨謫之乎可見漢終始以韓壻為重何如當日不出之乎乞為我一解又百忙中不妨措思若并不思則非矣晨風蟋蟀皆指詩人而言誦毛詩白文可知自傷留滯去關東去字不是易以向字亦本等唯老字又屬一層意思可加細思他日靣語未有不躍然者校太僕集有名介者字安叔其元孫也元孫之子為五世孫名顧廬字甫吟冐籍常熟中癸酉鄉試文人有後頃始得知以告同好者又承詢大加討論讀當廣韻以其備也作詩須韻㑹以上平十五下平十五上聲三十去聲三十入聲十七適得古今之宜若廣韻上平十六下平十六上聲三十一去聲三十三入聲十九今作詩者遵用之乎即宋禮部韻畧上下平上入三聲同韻㑹而去聲三十一今作詩者遵用之乎惟今俗本韻書上聲二十九漏去二十五拯則不可從耳復讀顧氏音學五書心花怒生背汗浹出前輩所謂譬如美人經時再見轉覺眄睞有異耳不知新城王侍郎何以痛掃幾無一足取正恐能詩未必通韻學也又考正韻凡例云平水劉氏上平十五韻下平十五韻上聲三十韻去聲三十韻入聲十七韻共一百七韻黃氏韻㑹本之只查韻㑹看便已又鈍翁文畧一披閱竟同嚼蠟無餘味奈何但有一事可感者汪氏族譜序古者宗子之妻死其夫為之齊衰三年今令甲無是也弟代易其文曰宗子之婦死其夫雖母在為之禫今令甲無是也今新刻本果如弟所改不可感乎吾兄可覓類槀初本對之獨五服考異云禮同父母之昆弟期同父異母之昆弟大功曽與玉峯兄弟笑古無此服制殆汪公杜撰答或人論詳譚第二書云唐儒又有主三十六月者此據喪服四制喪不過三年而祥之說也尤屬妄談當作二十八月與杜氏通典合杜却不曽據喪服四制唐雖有王元感主三十六月已為鳳閣舍人張柬之闢倒所謂元感論遂廢是也汪何從而知其所據乎總之通典新唐書不熟當時不曽與之言遺誤到今㝠㝠之中負此良友老友山右傅青主先生顧寧人極稱其識字却盛稱方日升書自勝正字通妄語然須黃氏韻㑹原本一對方可决彭城家正原本也又北闈䇿題逺震陳櫟衞湜之於禮記皆篤守紫陽者衞正叔之於朱子邈不相􅍱逺震二字必係傳寫之譌乞吾兄為就禮記大全衞湜書前列先儒姓名一正之就一事直窮到底勝汎覧博觀萬萬也邢子才曰誤書思之亦是一適或曰誤書思之何由便得子才曰若思不能得便不勞讀書朱子曰此言雖戲實天下之至言也吾與兄約若考不出逺震二字吾兩人亦不勞讀書也陳祥道禮書有拜儀上下二篇真曠代竒作吾師乎吾師乎三百年無此等人矣又顔氏家訓曰學問有利鈍文章有巧拙鈍學累功不妨精熟拙文研思終歸蚩鄙但成學士自足為人必乏天才勿强操筆此十言者可以教天下萬世不獨吾徒之藥石已也王深父以鄭州刺史李翺乃另一人葢新唐書李翺列傳傳其歴官最詳止出為朗州刺史又為廬州無鄭州刺史之説也自另一人今魏叔子杜于皇以昌黎送李愿為西平王之子李愿何異說夢亦是另一李愿隱士也凌虛臺記首句云臺於南山之下自然是臺字言此臺在南山下下四方之山云云又推開去説細細體㑹自知不知何人改臺作國此非口舌所能辯荆川鹿門皆云此記於太守少回䕶試考太守何人於東坡何嫌而痛掃之而作此議論便是讀書論世之學吾兄從此等處逐一理㑹何如又方山子𫝊方屋而髙四字妙絶不知何人改屋作聳按幘崇其中者曰屋故後漢輿服志未冠童子幘無屋者示未成人也句卷屋者示尚㓜少未逺冒也東坡豈有一字無出處耶古人文可容易竄易耶逺景樓記立表下漏鳴鼓以致衆立表一事下漏一事鳴鼓一事不知何人以立表下為句不見下文一人掌鼓一人掌漏又仆鼓决漏耶此豈出黃先生手筆願明示我又昨幾夜不成寐矣長淮大河之英靈節孝文之風流不絶於世間鍾一二人此一二人者可不愼重其軀耶爾雅母之晜弟為舅舅之名亦古但先舅二字不見古人有不如用秦風我送舅氏曰至渭陽稱曰舅氏顧寧人先生為千確萬當因攷國語公父文伯之母曰吾聞之先姑註夫之母曰姑没曰先姑又曰吾聞之先子註先子先舅季悼子也恰恰有先舅二字是稱夫之父無加之母之晜弟者又爾雅姑舅在則曰君舅君姑没則曰先舅先姑愈加不得於母黨矣此等講貫寔寔快絶然非吾兄難我亦不及窮析至此也又羅文肅公集序編幅二字非是按邊幅出後漢書馬援列傳謂隗囂語耳邊幅指布帛言西江君子愚嘗笑其文多别字可耻可賤或曰文章全在道理氣格不在一二字句間則請質之吳下人不必古也艾千子云上林子虛兩京三都讀其文不過如今之學究據通考類要之書分門搜索相襲為富求其一言一字出於其心之所自得無有也此等說話罪不容誅班固賦曰兩都張衡賦曰二京無兩京名目揚泉物理論云平子二京文章卓然孫興公云三都二京五經鼓吹可見古人稱名無有誤也通考指文獻通攷而言乎今學究是何人能據以搜索亦可謂通達國體之人矣類要是何書至真子虛賦久不傳文選所載乃天子㳺獵賦昭明誤分之而標名耳此則愚之獨解非南英所能知南雷先生云艾千子與王李只争一頭靣煞有見如不讀唐以後書邪說也詆上林諸賦又寧正論乎均宜服上刑又李商隱與陶進士書常自呪願得時人曰此物不識字此物不知書是我生獲忠肅之諡也按忠肅諡之最美者言我已生而得美諡矣何幸如之善戲謔兮正義山輕薄之故態乎衝波傳顔淵曰人知其一莫知其他但知暴虎不知慿河鹿生三年其角乃墮子生三年而離父母之懐懐音窠與他河墮協如何不引又虹考去後考得緯書河圖大星如虹下流華渚女節意感生白帝宋書符瑞志帝摯少昊氏母曰女節見星如虹下流華渚既而夢接意感生少昊非黃帝事也陸氏記誤且星如虹非真虹也若真感虹而生何不用宋符瑞志母曰握登見大虹意感而生舜於姚墟乎又考得春秋演孔圖鳥化為書孔子奉以告天赤雀集書上化為黃玉刻曰孔提命作應法為制赤雀集無虹字靣陸氏復記誤弟此等考證辯折在古人亦屬絶學不論今人不識吾兄信及否所謂虞翻得一人知已死可不恨其在斯乎鈍翁不足攻生平所心摹手追者顧也黃也黃指太冲先生顧指寧人先生賛我觀書眼如月何敢當何敢當又覆不一又文鈔一本不曽卒業聊就其序一卷指摘之此正揚之類願為我作正正揚焉禮記說義纂訂序楊公獨能旁綜儀禮周官二經淹貫馬伏鄭王諸訓故按西漢有伏勝東漢有伏湛皆於三禮之學無交涉豈鈍翁别讀人間未見之書加我軰之上邪傷寒書序夫庾跗扁鵲之徒按史記扁鵲列傳臣聞上古之時醫有俞跗索隱曰音臾附應邵曰黃帝時吕氏春秋上古醫曰苖父中古醫曰俞柎周禮鄭氏註岐伯榆柎陸徳明曰本亦作俞柎然則必無庾字之理或曰安知鈍翁不别有所本試問上三書不足據而以他雜書藉口乎其為别字無疑古今五服考異序二葢嘗三復喪服傳而不能以無疑此句大非傷天害理下文五可疑愚皆在京師歴歴與之辯久折其角矣安得靣陳之東都事畧䟦序夫舜囚堯太甲誅伊尹此皆書之所不載聖人之所不道而後世猶述而志之凡所謂信傳信疑傳疑也按信傳信疑傳疑出公羊傳文不過如夏五闕月字之類非謂舜囚堯太甲誅伊尹此等傷天害理之說聖賢不辭而闢之者鈍翁讀書多不諳文理難言難言又舜囚堯太甲誅伊尹出竹書紀年此非書邪必尚書方謂之書邪且尚書無此等言又何待云鈍翁真是癡人說夢詩說序自唐世盛行毛鄭而齊魯韓三家遂亡按隋書經籍志云齊詩魏代已亡魯詩亡於西晉韓詩雖存無傳之者安得謂三家至唐始亡耶又經籍志唯毛詩鄭箋至今獨立可改曰自隋世盛行毛鄭而齊魯韓三家已亡具區志序古揚州之境踰淮距海踰字不可解按蔡傳勝孔傳徐州南至淮揚州北至海蓋以淮水為分界非如今淮安府跨淮南淮北而有也隋煬帝詩借問揚州在何處淮南江北海西頭何等工確不可移易吳逸民傳序史記謂武王滅商封仲雍曾孫周章弟虞仲於周之北故夏墟是謂北吳是也按史記吳世家北吳作虞仲不知鈍翁讀何本史記乃有北吳字靣又序自漢孔安國至魏王肅何晏諸家俱不注虞仲何人近世始以仲雍實之按近代二字指朱子集註不知史記索隱以虞仲即仲雍是唐人久作此解矣篆隸考異序古人之書其字則大小篆籀文按宣王太史籀著大篆十五篇漢人稱為籀書又謂之籀文豈得二之邪是非一一教我毋謂我老耄姑聼之而棄我也又樂府人生富貴何所望恨不早嫁東家王唐人詩十五嫁王昌王昌且在墻東住當另一王昌風流艶美人也必非襄陽耆舊傳之王昌傳云王昌字公伯為東平相散騎常侍早卒婦任城王曹子文女昌弟式為渡遼將軍長史婦尚書令桓楷女昌母聰明有教典二婦入門皆令變服下車不得踰侈後楷子嘉尚魏主欲金縷衣見式婦嘉止之曰其嫗嚴固不聼善耳不須持往犯人家法其畏如此古人同姓名者最多陳驚坐且同字同時人矣袁宗安述宋既庭之言曰荆川才大如海評詩有詳有畧唯文編出陳元素手者非其原本兩本舍下俱有他日呈寄自知之又喬氏曰有譏汪先生以史證經者汪復之云云萊按明夷引文王箕子繋辭引顔氏之子此孔子之以史証經也明夷引箕子㤗引帝乙歸妹引帝乙隨引王用享於西山升引王用享于岐山既濟引髙宗伐鬼方未濟引伐鬼方此周公之以史證經也惜堯峯下世不及以余言告之閻子讀至此不覺笑曰惜石林下世不及以余言告之孔子時尚可分經史周公時有何經史可分此學問源流一毫不明白之論吾兄試討論之又南宋詩人有永嘉四靈曰翁卷字靈舒曰趙師秀字紫芝亦稱靈秀曰徐照字道暉亦稱靈暉曰徐璣字文淵亦稱靈淵無所謂徐靈照也至争天奈何事現見葉水心集徐文淵墓誌銘故當正其誤曰如徐靈淵争天奈何耳中山程氏以安郷侯程昱為祖自與新安程黏不上奈程篁墩博極羣書者也尤精考究其所取則以開元十六年李邕撰程長史碑曰重安侯嚮即忠壯公靈洗之孫嚮生育育生皆皆生𢎞𢎞生大辨林寳元和姓纂曰大辨實北徙中山忠壯公其五世祖也果爾二程出自新安亦可故弟此一篇文字且輟簡恨不使黄先生聞之又與石企齋書昨讀馬公驌繹史列荘之學公于古今樂錄稱荘子為齊人也下辨曰周䝉人屬宋不屬齊不覺吐舌此老學之確如此鳯陽濠梁為其㳺覽之地曹縣漆園為其宦㳺地俱不必言新唐書譙郡䝉城縣自註曰本山桑天寳元年更名唐何以名為䝉城不可得而考矣向劉超宗嘗云池州青陽縣有長白山范文正子孫繁衍聚族居于此有譜牒乃知長白山在此弟與之辯曰長白山斷㫁在今濟南新城長山四縣界上文正當日讀書於寺中不必云其子孫最為繁衍安知不是其一枝流寓占籍于青陽妄指青陽一山曰此吾祖讀書之長白山乎今寳應現有文正子孫范姓為秀才現有譜牒青陽亦此疑耳吾輩當援古以證今不當以今而疑古耳孟子㳺宋宋稱王當在慎靚王三年癸卯荘子書亦有宋王之稱似荘子此時尚在然荘子書多後人羼入非一一出其手筆不比孟子故昨以孟子㳺宋不相遇荘子者以荘子既死或往㳺他方耳荘子書云恵施為梁相荘子曾㳺梁大扺在孟子三十五年㳺梁之前孟子在梁止一年餘恵王死襄王立孟子往齊矣見孟子生卒年月考朱子云莊子聲聞至於梁而止不知其書自云㳺梁也滕口説多不確安得面一頃吐之又于理無礙但以訓詁言之不可妙妙此已跳上子静船矣可見吾兄心服而口不然弟謂士夫不能陶鑄人畢竟學問中火力未透頗自反而愧不敢對吾兄也謂我欲示博遂加朱子以罪不敢不敢但株守朱説遵若金條玉律莫若顧麟士昨見其詩經說約謂朱子于狐貍貉三物也而謂一物斯螽莎雞蟋蟀亦三物也而謂一物極是朱子草率處又言朱子奈何作此憒憒乎此等出信朱子口當如何責之竊以不直則道不見吾以明道也豈議朱子乎總之謂吾書欲無所不有志在駕軼古人此真洞見腑鬲之言也謂有意翻駮朱子則决不敢素愛馮定逺之言今人信孔子不如信孟子信孟子不如信程朱弟則信孔子過篤者耳又尊論云此亦古人同文之一端也同文謂書之㸃畫於聲律無涉何不用周禮大行人之職九嵗屬瞽史諭書名名觧作字字古曰名今曰字聴聲音註曰達六書之文察五音之和瞽史之職也故九歳則以屬瞽史且讀陳㳺撃季立書自知古無叶音之說為精確寧人書亦非嘔數升血讀之不可弟素鄙薄道學先生不博學如讀書劄記云漢止立文帝武帝宣帝加孝字何異說夢何異見鬼漢代皇帝謚有孝字唐書顔真卿𫝊奏疏曾言之唐書道學先生那裏㸔須知漢書也該寓目并哀帝平帝皆冠以孝字也又昨承教後又取韓作讀之文真妙竊以改作即以二雅之舊人如家父凡伯亦云老矣而曩者南山瞻卬之詩何為今不作也貼在平王東遷之初葢幽王在位僅十一年家父凡伯想在世上況又加以老矣二字元少真妙舌但作板之凡伯不如用作瞻卬之凡伯何如此猶想像也若鑿鑿可據之舊人莫作衛武公和四十二年佐周平戎平王命為公又後十三年即平王在位十三年而薨不當云此㑹作賓之初筵之衛武尚在亦不復為雅詩乎此等死證運入文字中尤妙或曰何不及抑抑威儀詩但序以為刺厲王厲王已死安容追刺之此序之不足信也或曰炳燭齋随筆云幽王八年衛武公相周作抑戒詩此係近代偽書不足汙吾輩齒牙也非吾兄教我不克聞過謝謝又恩制賜食于麗正殿書院宴賦得林字此題最古經品彚便改得時氣不必言弟亦嘗細考来㕘以舊唐書張說𫝊答徐堅云方知每日在麗正殿皆賜食不須家人送食此成一代之制故曰恩制與偶然賜宴不同賦得林字十五字為一句其日賦詩時適為賜晏一指常一指暫字字不茍如此張說卒于開元十七八年通鑑不載何也乞考以示我向有釋地餘論謂鞌之戰自鞌至華不注山一日行一百三四十里且三周其山焉長兄引曹操追先主于當阪一日一夜行三百餘里可謂神速除此外更引證一事来弟不能答今日讀夏侯淵傳注引魏書曰淵為将赴急疾常出敵之不意故軍中為之語曰典軍校尉夏侯淵三日五百六日一千三日五百是一日行一百七十里則晉人自鞌戰起勝而逐齊師三周華不注華不注一㸃㸃山兒三周之不多時也可謂妙證書奉同紫函賞之如何又地理三條妙可解頥弟解雪宫章亦黜誇其禮遇之隆說吾兄引孔僖對章帝云云折之確不可言自孔氏為答郷里人語妙甚但子路歸魯視其家意太鑿子路自不妨有歸時耳由卞人也卞今泗水縣在曲阜本以闕里二字證家語為王肅私定空中窺覷無可躱閃快快與劉紫函書春秋經襄公六年秋莒人滅鄫非滅也立異姓以蒞祭滅亡之道也范甯註言非以兵滅也莒是鄫甥立以為後非其族類神不享其祀故言滅後晉武帝太康三年賈充薨其妻郭槐輙以外甥韓謐奉充後博士秦秀議曰春秋書莒人滅鄫聖人豈不知外甥親耶但以義推之則無父子耳充舍宗族弗受而以異姓為後絶父祖之血食開朝廷之禍門按諡法昏亂紀度曰荒請諡荒公大清律曰其乞養異姓義子以亂宗族者杖六十若以子與異姓人為嗣者罪同其子歸宗其棄小兒年三歲以下雖異姓仍聴收養即從其姓但不得以無子遂立為嗣條例曰一無子者許令同宗昭穆相當之姪承繼先儘同父同親次及大功小功緦麻如俱無方許擇立逺房及同姓為嗣并不許乞養異姓以亂宗族又前承下問昏禮用雁匆匆對未悉今考之不獨親迎為然曰納采曰問名曰納吉曰請期曰請迎凡五禮皆用雁解者曰昏禮無問尊卑皆以雁為摯者鄭康成云取其順隂陽往来者雁木落南翔氷泮北徂夫為陽婦為隂今用雁者亦取婦人從夫之義是以昏禮用焉無取不再偶之說謹覆又韓昌黎祭十二郎文十二郎韓之姪也文自稱季父愈此即所說令叔可稱名之證也祭女拏女文女拏韓之女也文自稱阿爹阿八此即所說尊公不宜稱名者也豈惟父即姪孫自亦不名祭滂文曰十八翁及十八婆盧氏盧于滂為叔祖母以異姓故别曰盧氏昌黎行十八對女曰阿八省一十字也闞湖逸民即書中之應廷吉字棐臣者也慈谿人天啓丁卯順天郷試舉人與史道隣同榜故稱同年忍俊不住書中處處露出且匿此帖俟石二兄閱訖問為何人手筆可以定吾兩人之優劣矣黄山谷見蘇詩後騎且勿驅前山正可數曰東坡不死百詩不死又賈譲上䇿當日不曾行行則徙冀州之民當水衝者矣屯氏河絶不絶不要𦂳要𦂳在北决于館陶溝洫志兩箇决於館陶决館陶則從渤海郡章武縣入海即今之天津衛即書所稱漢以後宋熈寧以前將千年入海之大道此須合地理志水經注觀之班固叙傳述溝洫志第九曰成有平年何嘗不以成帝河平紀元為盛事與宣房一般至前河成二年而决後河成九歲而決乃河決之常事未嘗抹煞王延世之功也安得面一指授乎昌黎三女見皇甫持正所撰文長女嫁李漢改嫁樊宗懿次女聘陳氏三女并未聘葢昌黎死二女俱幼也後考唐書方知三女嫁蔣乂之子蔣係有文名見唐列傳今之宜興蔣家正其後也家譜畫然可稽来明季遺聞二本此書第一受張縉彦賄第二受李明睿屬妆㸃粉飾總不足信已被蕭震特疏㕘處但也有些好處此萬季野所以不廢也又晨興檢註疏喪服小記獨脫落士妾有子而為之緦一張舍下豈無他本㕘㸔奈為金素公假去至今不歸乞将鄭註昨所厯歴誦者鈔示来并以時賢意見詳及之僕嘗笑人不好學不好問豈容自犯之耶昨云單子字未必指女以禮記儀禮皆稱女子子或女子也此最髙明之見但曲禮子于父母則自名也豈無女子在内喪服子嫁反在父之室非女子邪論語以其子妻之直指女矣又尋玩鄭註子兼男女解亦未為不可但今之時賢執此句為吾妾現有子吾故為之服此萬萬不可唐開元禮妾無服司馬文正書儀朱子家禮及明孝慈錄寵妾而作者妾俱無服葢妾之無服千餘年于此矣汪苕文曰今卿大夫舉凡服其餘親莫不兢兢令甲而莫之敢越而獨于其妾也則必秉周禮毋乃暱于所愛乎哉可謂刺心之論又唐方面官有節度使有採訪使節度使統兵乃鎮将故稱某鎮如髙仙芝為安西四鎮節度使是也採訪使非鎮将故其稱但曰某道如安祿山兼河北道採訪處置使是也然採訪不言鎮而節度亦可言道通鑑屢見之如天寳四載謂王忠嗣既兼兩道節度邉陲要害悉列置城堡六載謂葢嘉運王忠嗣専制數道始兼統矣十四載謂安祿山専制三道隂蓄異志殆将十年以此知謂節度使不可言道者非也考唐制太宗分天下為十道一曰闗内二曰河南云云元宗又因十道分山南江南為東西道増置黔中道及京畿都畿共十五道各置採訪使故山南江南等可稱得某道採訪使而節度使止名鎮不名道也此豈時文名士所知非自執己見不直則道不見道固如是耳賢倩一覽焚之不可示人頃聞吳荆山選考卷及沈儼禄之去公室文尾載儼自記即不佞議論荆山駁之正之亦是先儒已及者意只在遵朱子集註如金條玉律一字不可揺動耳寃哉寃哉荆山與僕交情亦佳安得及屺瞻貴同年僕之畏友乎真令人心折氣盡又晤對頗暢歸查玉海無所為芙蓉宫殿門闕者老杜芙蓉别殿漫焚香乃曲江芙蓉苑意其有殿故曰芙蓉殿豈有此處㑹百官而勅賜櫻桃乎老杜于門下省賜櫻桃昌黎于宣政衙賜櫻桃不聞有甚芙蓉闕也乃虛字面㸃綴耳此千年未經拈出者與劉頌眉書昨承問詩有自對法清晨起撿杜詩如桑麻深雨露燕雀半生成此露對雨成對生自對法也近接西南境長懐十九泉南對西九對十亦自對法白狗黄牛峽朝雲暮雨祠黄牛對白狗暮雨對朝雲覊棲愁裏見二十四囬明覊也棲也愁也三字自對二也十也四也三字自對四十明朝過飛騰暮景斜四也十也二字自對飛也騰也二字自對氣色皇居近金銀佛寺開色對氣銀對金各自為對社稷堪流涕安危在運籌稷對社危對安神仙才有數流落意無窮仙對神落對流毛骨豈殊衆馴良猶至今骨對毛良對馴風塵逢我地江漢哭君時塵對風漢對江凡十條呈覧可以推類而知其餘亦可自已思路通對偶廣矣古文云夫人目之所及不百里而天地之際合及至百里以迄千萬里未嘗合也其去之乃愈逺此晚眺二句之所本也文可以入詩但要融化耳又考萬歴六年潘司空季馴河工告成其功近比陳瑄逺比賈魯無可移易矣乃十四年河決范家口水灌淮城全城幾奪又決天妃壩尋塞治之二十三年河淮決溢邳泗髙寳等處皆患水灾以按臣牛應元河臣楊一魁言患少息天啓元年河決王公堤水灌淮安新舊二城水民蟻城而居裏外河清河一帶滙成巨浸郡守宋統殷等力塞王公堤患始殺焉所云蟻城而居者即余幼聞父老言人在新城西門城垜上垂足洗滌是也安得云潘司空治後無水患六十年之說大抵司空成規具在縱有天灾縱有小通變治法不出其範圍之外故曰河防一覽為平成之書云又左傳襄二十五年太史書曰崔杼弑其君崔子殺之其弟嗣書而死者二人其弟又書乃舍之南史氏聞太史盡死執簡以往聞既書矣乃還杜氏無註林氏註云南史氏齊史之在外者安得以其南字懸揣有南北二史官真妄而謬矣太沖先生序崔杼弑其君此檮杌之書法南史楚史官執簡而往書齊國之事此何異于送死且喫自巳飯管人家閒事乎太冲之徒麤此其一班又明一統志如臯縣本漢廣陵郡地晉分廣陵五縣置山陽郡時已有如臯縣莫知為縣之始隋初省入寧海屬江都郡唐析海陵地置如臯鎮南唐復陞鎮為縣屬泰州按此即邱詩之所出但查晉書止云晉分廣陵界置海陵山陽二郡而已說不詳詳則見沈約宋書宋書云海陵郡晉安帝分廣陵立領縣六曰建陵曰臨江曰如臯曰寧海曰蒲濤曰臨澤又山陽郡晉安帝義熈中土㫁分廣陵立領縣四曰山陽曰鹽城曰東城曰左郷無如臯屬山陽之文且沈約明云如臯晉安帝立安得云莫知為縣之始真不通安得天順朝臣披尋全史地志之理然則作詩者不必與之言與敬存書承屬将陳大士禹疏九河一一駮正今請駮之提比云外國之人為患中國外國之水亦為患中國最為竒妙而艾南英批曰纎何也中國之水流常主合外國之水流或主分不知何以見得且外國之水必主河言昔人云河不兩行真千古名言此不竟說反乎中比云至于積石何以不分積石在今陕西河州衛西北七十里水經注云河水重源又發于西塞之外出于積石之山此地距九河入海處不啻數千里何故分又何以分得真正説夢至于王屋何以不分王屋即太行山别支之名在今河南濟源縣西八十里此山安得有河謂此山為濟水之源則合矣而至大陸乃分者大陸在元邢趙深三州之地俱今直𨽻孔安國書𫝊河水分為九道在此兖州界平原以北是若将大陸二字改為平原則合矣至南英總批曰中二比諳熟河勢真正寃哉又曰此九河入海故道禹特疏之而已亦非導河自積石以下開天闢地直至禹始如此豈禹之前有甚故道乎幾于見鬼善乎元人于欽曰河至大陸趨海勢大土平自播為九禹因而疏之非禹鑿之而為九也夏允彛曰禹之導為九河也何居蓋河不可分謂其上流耳若入海之處泄之愈速則河愈通利又何害哉今九河之下即為逆河殆謂自此而下即海潮逆入矣蓋名雖為河其實即海也海水内吞九河外灌不惟藉水力以刷沙而海之潮淤亦借河力以敵之禹之以水治水所為不可及也又曰要以入海之所固宜分疏之使速泄下流速泄則上流不壅河之利也若未及于海則流分力弱無以刷沙適壅之矣故曰河不兩行兩行且不可况九河乎愚謂若将此等議論做禹疏九河文真正古學真正經術可以為三百年制義之光數千年聖經賢𫝊不至為窮措大弄壊試問有誰能見及此者唯有仰天太息而已以俟百世聖人耳先質我執友石二兄佳壻石梁劉子逺則應敬存之求也又劉克猷禹疏九河文讀之甚佳非一切時文所及但有小小譌處亦不可不指摘出如漳以汾衛来矣汾發源管涔山至平陽榮河縣入河不入漳衛在禹貢出靈夀縣東入滹沱河亦不入漳若今衛河乃源于蘇門山者又一衛水然則當改作何語曰漳以清濁来矣漳有清有濁清漳入濁漳濁漳然後入于河至今漳自入海矣水道變遷如此海雖逺可以徐達九河濶二百餘里長約四百里在今平原縣迤北至滄州逼近海安得謂之逺予决九川九川九州之川于九河不相涉中二比起云史謂禹之治河自龍門始者不知此導河序次第之文也而非其功之所始又謂治河自冀州始者不知此禹貢尊京師之文也而非其事之所始鑿鑿名言真與經傳相表裏可𫝊無疑雖然此猶第二義若将河何以分而為九却在此地說明水之性地之勢則天地間第一義矣豈經生所能及哉河不兩行自古記之潘司空季馴語也實自宋史河渠志蘇轍疏黄河之性急則通流緩則淤澱既無東西皆急之勢安有兩河並行之理来孰謂經綸大手不從屈首受書出哉錢相國士升曰經正則庶民興史熟則名臣出毎誦其言而三歎之又紏兄桓弟此萬萬無可疑者不特前人歴歴辯證僕亦有撰著至亡公子爭國無大優劣其説最長非面陳不可歐公年譜鄭為歐陽觀元配非繼娶果少二十九歳此亦疑得好服服表明云觀少孤力學故晚婚乎禮記月令仲春之月上丁命樂正習舞釋菜天子乃帥三公九卿諸侯大夫親往視之夏小正丁亥萬舞入學隋制國子寺毎歳四仲月上丁釋奠于先聖先師迄唐不改遂為萬世之定制韓昌黎詩多情懐酒伴餘事作詩人昌黎以古文為根柢詩為雕蟲小技不比老杜以生平全副精神注于詩故詩云詩是吾家事韓杜之言如此故曰詩可以觀王孝逸事見文中子王孝逸陳留人先軰之傲者也然而白首北面于文中子文中子十五而為人師豈以年哉明羅圭峯西涯之門生也其稱夀之詞曰白頭王孝逸北面敢徐徐正用此事葛生䝉棘蘝蔓于域毛詩域塋域也百歲之後歸于其居鄭箋云居墳墓也百嵗之後歸于其室鄭箋云室猶冡壙此衛先生以詩為婦人臨墓而作亦非無因但不如僕駮正之尤確與劉超宗書博考羣書舜之時禹征三苗事頗夥其執干戚舞兩階而遂服者則韓非子也淮南子也今一概抹煞如左氏僖十九年𫝊文王退脩教而崇因壘而降何以解焉一念感人動物後世尚有况大聖人乎只言此時三苗丕叙那有弗率之事或可然苗頑弗即工亦難解願先生精思詳處彌縫其説使無憾則幸耳又考禹錫𤣥圭在堯受命神宗在舜相距年頗逺恐難以向之丕叙闢後之徂征也傳曰三苗負固不服乍臣乍叛似獨得之前語非昨札猶非晚好自攻撃其説此亦一端也又百忙中檢野客叢書云唐大歴中權臣月俸有至九千貫刺史無大小皆千貫視兩漢不啻數倍當時詞人見于歌詠如元微之遣悲詩今日俸錢過十萬與君營𦵏復營齋十萬正十萬貫也先生以為然乎抑别有證否宋陳振孫以水經所叙為詭誕全無慿據何也豈不足信乎乞示陳夀進諸葛亮故事表云咎繇大賢也周公聖人也考之尚書咎繇之謨畧而雅周公之誥煩而悉何則咎繇與舜共談周公與羣下矢誓故也此段與先生舜𫝊禹無人心道心等語相表裏的的髙明之見難以言傳郝氏言之而未妙安得先生暢言之而見妙乎又來札云舞最在後當升歌下管之時尚未及舞也案禮記文王世子云反登歌清廟既歌而語云云又云下管象舞大武當下管象于堂下即舞大武于庭中不得岐為二時此報或曰歐公不信河圖洛書得一廖偁與已同輙喜不自勝子得彭城先生為知已反攻之可乎余曰此愚之所以報先生也不然先生愛小子何如教小子何如而小子敢隐匿之以自欺其本心哉且此曽足損先生之毛髪乎或者慙而退并次其語以報先生蚤凉萬唯努力二帝三王實鑒臨之聞絳雲樓作史羣鬼皆夜哭且見形焉以翻成案而不公也若此書當如何哉不覺落筆一笑又昨聞集聖賢羣輔録以王霸封淮隂侯頗訝其異及歸檢後漢書乃淮陵侯非淮隂也註云淮陵縣屬臨淮郡唐淮安郡即唐州隋又曽改桐栢縣為淮安古今郡縣名有三淮安矣二十八將功次云上谷太守淮隂侯王霸隂字乃陵字之譌又偶思左手執籥右手秉翟籥如笛而六孔豈徒執焉而無聲乎質諸家大人家大人曰汝當博極羣書以釋斯惑因考周禮籥師掌教國子舞羽龡籥註云文舞有持羽吹籥者所謂籥舞也詩曰左手執籥右手秉翟春秋宣八年壬子猶繹萬入去籥註云内舞去籥惡其聲聞疏云吹籥而舞謂之文舞公羊傳籥者何籥舞也註云籥所吹以節舞也吹籥而舞文籥之長小雅以籥不僣疏云以為籥舞謂吹籥而舞也又籥舞笙鼓傳曰秉籥而舞與笙鼓相應則所謂文舞小舞者有聲明矣書以為助所闗似非小也又連百忙中又細讀虞書數過見舜典本為堯典而一典兼叙堯舜事舜則分登庸在位兩截判然不亂承教云禹作司空往平水土豈待格文祖後耶愚謂何待言蔡𫝊自明平水土者録其舊績兼百揆者免其新功即稷播穀契敷教臯陶明刑亦申命其舊職而已亦合孟子舜敷治一段非至此為是官也蔡𫝊精確者已萬不可易况聖經乎死罪死罪記稱朱干玉戚以舞大夏夏字自誤若公羊昭二十五年𫝊朱干玉戚以舞大夏八佾以舞大武此皆天子之禮也又竟是大夏亦不誤此愚之所以欲博極羣書也既思干戚是武舞豈容揖遜得天下者有之公羊説不可信不特公羊也鄭康成註禮記内則二十舞大夏曰大夏樂之文武備者也其説亦不可從晚好自破其説如此舞是樂之終則是辭之決妙妙敬受教矣又泗水此番洗發得明白委曲毫髪無憾然非小子一難先生恐無暇及此聖門起予不端在今日乎泗水出乗氏此出字乃孔穎逹疏尚書所加班書自註原無妙哉妙哉漢書未可輕也陳氏議水經謂其全書不指泗水大抵昔人多輕水經似自蔡仲黙始引入經傳耳此書斷為東漢和帝以後人所著出通典以為成帝時桑欽作大非又雨中已將十六字大肆發揮只言其有依傍非能鑿空撰出者不似郝氏并十六字亦罵倒太武斷矣魏凝淑謂今天下有不可少之書三興化李廷尉清南北史合註仁和吳任臣文學十國春秋常熟顧處士祖禹方輿記要愚謂此史也若經著述則鄒平馬宛斯繹史中儀禮十七篇太原閻百詩尚書古文疏證真可超前絶後安得有如大手筆者將此作我弁言乎義仍集序果佳他文逺不稱數過而後得之甚矣吾之鈍也并聞以志愧又註綱目地名者乃一明人案一統志註之者一統志無夀河故云未詳此不足怪獨怪胡三省註通鑑其于地理最稱詳確于敗之于夀河之下亦無註甚矣其難也至新修統志淮安府山川載夀河引十國紀年凡兩部書可謂逺勝明人此今日顧景范黄子鴻饒為之事惜先生不見此兩人捍海塘備載范文正築塘方略真正有用之書我問出何書景范曰從范文正文集堰記一篇文字録來今人逺勝明人鄙言豈無徵又郡志人物缺載頗多如列女則楊國夫人梁氏見梁趙雄所撰韓忠武墓碑在靈巗山下流寓則邴根矩見三國志俱宜補入又禹錫𤣥圭告厥成功孔𫝊以為帝堯蔡𫝊以為告成功于舜舜即堯堯時尚在而舜攝也此明白淺然可見先生疑端必有所起願告我至竄三苖分北丕叙弗即工寔不能定其前後况又有偽書徂征一事雜之乎即吕刑一篇或以皇帝為堯或以為舜亦不能定總之書傳如此甚夥非得理精證確者斷斷不宜下論斷也又後漢河内郡有山陽邑山陽郡則治昌邑荆光武之子也其所封當在此或郡或邑不敢定若必以在山陽乃此地何苦聞西羌有變徙封廣陵止逺之于三百里乎為其或為金鄉之山陽或為河内之山陽方徙之耳至于山陽為此地鄉名亦不可定但不可謂其為縣為郡耳至西漢梁孝王子封為山陽王定陶共王初曽徙山陽王皆不聞在此地何獨于荆而疑之又徧檢東漢諸王或初封或徙封皆是郡或縣無取鄉亭為名者此可為苦辯然有益死罪死罪又昨札云尚有考之未盡處今補上左傳見舞象箾南籥者疏云樂之為樂有歌有舞歌則詠其詞而以聲播之舞則動其容而以曲隨之又曰周禮舞雲門以祀天神云云凡六樂者文之以五聲播之以八音鄭氏註播之言被也是以舞為主而被以音聲又曰禮法歌在堂而舞在庭其寔舞時堂上歌其舞曲也則所云舞止有容當進一解矣又疏云象箾武舞南籥文舞皆文王之樂然則文王其獨兼文武乎此亦禮書未詳者當補之又龜山猶知回䕶干舞即孔疏亦然獨孔𫝊不知盖𫝊與經同出一手也知則不復犯矣蔡𫝊則竟無一字及之其寡昧如此近考得微仲乃啓之次子亦竒又不肖曽考得韓非子五蠧曰當舜之時有苖不服禹将伐之舜曰不可上徳不厚而行武非道也乃修教三年執干戚舞有苖乃服之又考得淮南子繆稱訓曰忠信形于内感動應于外故禹執干戚舞于兩階之間而三苖服此二段皆繹史所未載脱去執千戚兩階舞之事矣查揚州府志通州有軍山而無君山塜墓類亦無春申君似是土人傳聞當要購通州専志詳考也樓山集有精論何不當日逐條標出使小子開光明耶張雲子有書来云人生讀書攻苦得達之九重足矣此語可泣亦晚為先生泣耳又細閲漢地理志泗水有二一出乘氏入淮一出汴縣入泲各自分路揚鑣未可混而為一或班氏不能如水經分為東西流誤合為一乎願先生更加詳核勿為古人所眩此亦大闗係也班氏自註頗畫然不糊塗必是誤認何如如汶水亦有二見水經見漢註泗得毋類是仁山謂泗上可以通河下可以入淮非通淮也晚已撰一段辯之亦據水經云爾漢志泗入泲似誤乃泲入泗説文所謂泗受泲水東入淮是也蔡𫝊泗之上源自泲亦可以達河上源字確否恐誤與仁山同近代有春秋列傳一書係大庾劉節字介夫者重編不知劉節是何時人何等人不曰著而曰重編者何也豈劉之前已有此本乎又春秋議論中有孛琪者又有吕大圭者皆不知其爵里朝代生平乞老社師為我一祥考之又元虞集為趙汸序春秋云近代論筆削有依據無出陳氏右者係陳氏非程氏不知此陳氏何人并望詳示不宣又春秋原非本經麤渉一過遂敢立論放胆極矣不知先生屬辭比事之學如此其精且細也但有一端可疑者謂春秋初有失禮而無僭禮不必逺徵只以史記所載秦襄公祀上帝于西畤其子文公也亦然皆在周平王初非僣禮乎然有可諉者曰未見于春秋經也再以春秋經證之隠公五年九月考仲子之宫初獻六羽則前此用八佾可知矣非僭禮而何乞先生為我釋此一疑則大快矣他端瑣瑣固不足云又昨云苖安得有君子小人晚獨從傍撃節盖搔著我癢處也退而考之吕刑曰唯時苖民匪察于獄之麗㒺擇吉人觀于五刑之中吉人非君子乎此亦妙解書發先生一粲國子學正梅鷟曰征苖誓師贊禹還師等原無此事舜分北三苖與竄三苖于三危已無煩師旅偽作者徒見舜典有此文遂模倣為誓師還兵有苖格諸語前所言即指與霍兀崖書偶因其中有席元山諸公字面遂以為與元山諸公其實與元山别有書陽明所謂草草作答者是也今不復傳矣吳氏疑泰誓為晚出之書自是吳才老棫無疑才老書禆𫝊凡八篇末曰孔傳盖辯古文之非其説寔與朱子相表裏而朱子之疑古文又不一而足焉又吳草廬春秋備忘序曰觀范氏寗𫝊序喜其是非之公觀朱子語録識其優劣之平觀啖助趙匡纂例辯疑服其取舍之當然亦未盡也遍觀宋代諸儒之書始于孫明復劉敞終于趙吕其間各有所長然而不能一也請問趙吕是何人又尊札云春秋有四傳三家三家是那三家此名定于何人俱乞詳示不吝又蔡傳徐之川莫大扵淮徐之浸莫大于沂愚謂淮海惟揚州揚州之域北至淮不過言其疆界所至淮不曽泛濫為患揚州但在徐耳故徐曰其乂此最易了了先生得無過求之耶寧人著有字書五種托力臣繕寫授梓力臣曽寄一様本来果博且精不可及也嘗私願此地縉紳有如馬宛斯其人者文學中有如傅青主顧寧人其人者使後生小子感奮興起紹明古學直追金華嘉定諸先生之遺風豈不盛哉豈不快哉又前札謂不肖虛已亦虚于先生之前耳豈他鄉里小兒所能得其心折哉今亦有不虚者是尚書古文疏證得大闗鍵處傳經的派得于漢書卷篇名目得于註疏然後持此以攻撃句字之脱誤迎刄而解矣此古人先河後海從源及流之學問若沾沾以句字賞其工猶未為盡也何如何如見開送單有仁和吳志伊深快人意遂欲移書都下責君家宗衮之官廷尉者家有名士三十年而不知猶可言也豈竟忘所師承乎然師承為時文原不知古學根柢此或可恕故中止一嘆作字與季貞云安得將杜于皇濬周茂三容姜西溟宸英彭躬菴士望顧景范祖禹劉超宗某顧寧人炎武嚴蓀友䋲祖彭援琴桂顧梁汾貞觀一輩數十人盡登啓事齊集金馬門真可賀野無遺賢矣不肖雖旦夕填溝壑猶含笑語出血誠至性非泛泛故并錄聞又前偶以僣禮一則奉詢未及詳語今敢不避狂瞽之罪而縷陳焉一尊札謂用牲于社常禮也用幣于社變禮也竊以為用牲于社亦未必盡為常禮何以言之周宣王當大旱之時作雲漢之詩曰靡神不舉靡愛斯牲又曰自郊徂宫上下奠瘞靡神不宗又曰祈年孔夙方社不莫集傳曰社祭土神也是宣王固常因旱災而用牲于社矣豈得盡謂為常禮耶謂之為常禮者可通于王制而不可通于毛詩也一尊札謂唯康侯從千載之後斷為鼓社竊以為公羊傳及何休註公羊傳皆以鼓字屬社是連讀者不始于康侯也一尊札謂伐鼓也用牲也于社也于朝也一時並舉而偕作有不可以先後分者竊以為以杜預為不足信則已如以杜預為足信杜預明云諸侯用幣于社請救于上公伐鼓于朝退而自責所謂退而自責者正指諸侯親身而言若一時並舉諸侯將置其身于社乎抑置其身于朝乎豈能化一身而為二人乎若止置其身于社而朝廷之上雖鼓聲淵淵乃虛無諸侯之跡焉吾不知所謂自責者何等也此三則者寔所不安于心若其他屬辭之精比事之切晚雖欲辯之亦烏從而辯之且唯有歎服惟有仰慕而已日来讀尚書至今文古文之别頗覺紫陽草廬諸大儒所疑的不可易安得階前一尺地跪而進其所得乎又與戴唐器書長洲苑對短簿祠自工但作詩則可若講學問長洲苑三字加不得蘇州我唐器兄知之乎請備言之一枚乘説吳王曰不如長洲之苑一左思吳都賦佩長洲之茂苑長洲指廣陵郡東陽縣有長洲澤吳王濞太倉在焉東陽今旴𣅿是也于蘇之長洲縣絶不相渉蘇長洲名縣起于武后萬歳通天元年析吳縣置長洲取越絶書吳越春秋走犬長洲以名縣又漢王莽𫝊臨淮𤓰田儀等為盜賊依阻㑹稽長洲此亦指在蘇州者言非東陽縣也果屬東陽不得冠以㑹稽張籍寄蘇州白二十三使君詩閶門栁色烟中逺茂苑鶯聲雨後新則以長洲茂苑貼蘇州此借用詞人之常不必核寔原有兩途無怪乎昨席上吳儂聞吾兩人之言若㒺聞也真正告子不得於言勿求於心學問雷何思太史以為千古大受用人也又昨云象鐵山依稀記是唐代事無工夫查今趁早凉查出李靖列傳其妻卒詔墳制如衛霍故事築闕象鐵山積石山以旌其功特遣力奉報刻王臨川集作序者不知荆公墓所在可笑極矣荆公晚居金陵死即塟金陵一統志明載之又歸查漢藝文隋經籍新唐藝文三志俱無農書二字直至宋史始有陳旉農書三卷近代則上海徐文定公光啓著農書八本可覓一大部經濟有用書也尚書大傳武王釋箕子囚箕子不忍周之釋走之朝鮮武王聞之因以朝鮮封之又曰箕子既受周之封不得無臣禮故于十三祀来朝然則陳範在来朝之日解亦新妙又今日讀魏叔子歙縣程君墓表首云程氏出周程伯休父後東晉元譚由廣平持節守新安有善政不覺大駭太守安得有持節事因考晉書職官志文獻通考並云持節有三上曰使持節得殺二千石以下中曰持節得殺無官位人下曰假節唯行軍得殺犯令者至太守持節乃唐武徳元年改郡為州改太守為刺史方加持節然則刺史方持節太守斷斷無之莭即今之王命旗也吾兄所謂若輩兒自誇大其逺祖而不知國典朝章者也太子太傅是官非爵也爵則公侯伯子男五等之謂汪苕文謂爵至太子太傅豈不可笑之至耶吾兄每輕魏而重汪殊未允又金石例仍奉上讐對栁道傳有此書序如何不刻可怪可怪偶繙徳政碑式易州刺史田仁琬徳政碑下註靈芝唐之能書者非文人遂證以金石錄絶佳之書可覓一本卷六第一千一百六十五唐易州刺史田仁琬徳政碑下註徐安貞撰蘇靈芝行書果然鄙人不謬吾兄能于金石例瀾翻爛熟文人學者一舉兼得卓然千古矣區區詩人云乎哉明日有人招弟肩輿三十里往㸔桞舖灣梅花因思老愛青春貧愛酒尋花只當作生涯父執余澹心佳句今人能到乎弟眼白今人詩非過也兄自不覺耳不宣又陸去肆兄㳺孔林歸見從祀先儒缺李延平牌位深以為訝余曰此不足訝也遂舉其顛末告之且互相考訂者三日方冩書山左學使令其行文補置主真不枉此一逰然非弟助之膽亦堅剛不来還是講學問講經濟隨地可以及物詩不中用不見刻下一厚本詩集送人有一毫闗係耶董文敏容臺集止題跋四卷佳耳然其論書痛貶趙吳興琴川馮嘉定婁諸公深不以為然又武帝紀恩澤侯表總無若干戸封冠軍侯之説史記霍去病列傳再冠軍以一千六百户封去病為冠軍侯漢書作二千五百戸封冠軍侯無如尊扇上所書數目奈何但即用史記故事對千六百戸冠軍侯區區千六百戶耳何足與二十四考作對逺比趙公三十六年宰輔近同郭令二十四考中書趙公長孫無忌也乆而後知辛稼軒紹興末屢立戰功嘗作九議暨羙芹十論上之皆切中時務酌古陳同父美芹辛稼軒也又昌黎詩蘄州笛竹天下竒註云一統志蘄州今屬湖廣黄州府其地出竹以色瑩者為簟節疎者為笛帶鬚者為杖蘇東坡寄蘄簟與蒲傅正詩云蘭溪美箭不成笛註云蘭溪在蘄州蘄水縣竹所出之地也本是笛材而以為簟耳請吾唐器兄讀昌黎此首全詩較諸唐人已少變若東坡此首全詩讀之不甚好㸔無甚意趣此唐宋之别也何苦苦愛宋人走入邪路永斷正宗戒之哉愚意當將選詩蘇李七首古詩十九首四愁四首魏武帝樂府二首魏文帝芙蓉池作樂府二首雜詩二首陳思王除責躬應詔朔風三四言詩且不讀餘自公讌至情詩二十一首通共五十七首親手録成一帙細加丹鉛熟誦瀾翻有不㧞去胷中宿垢者乎汪苕文詩學范石湖何嘗有一腐句有一熟調然我輩舍古人而偏學他此老杜所謂遞相祖述復先誰愈趨愈下矣可懼哉周宻癸辛雜識或云上已當作十干之已盖古人用日例以十干亦不盡然祭必用亥日見儀禮如上辛上戊之類無用支者若首午尾邜則上旬無已矣愚按沈約宋書曰自魏以下後用三日不以已也請證以王羲之于蘭亭乃晉穆帝永和九年三月三日乃丙辰次日方丁巳宋文帝元嘉十二年三月丙申褉于樂㳺苑正是月之三日亦不用已日昨有疑笛牀二字偶思王徽之泊舟青溪桓伊于岸上過徽之曰聞君善吹笛試為一奏伊已貴顯素聞徽之名便下車據胡牀為作三弄弄畢上車去此笛牀二字之所自来江止菴集草草閲一過真可不刻安得有如黄先生選明文案手為㨂存一二篇俾天下後世人有不得其全集而讀之之恨豈不快哉又與劉超宗書所諭變禮有二一昔無而今有者謂之變禮如用牲于日食是也以對四時常祭而言者亦謂之變禮如日食之災異是也此雖變亦常剖析精微真堪羽翼經傳敢不心折心折但愚謂鼓字連讀不始于康侯公羊何休已先康侯為之其語意原輕非敢謂公羊何休真勝于穀梁范寗也若以春秋大義論公羊之所得自不如穀梁穀梁又不如左氏左氏又不如本文程子所謂以經别傳之真偽此固晚之素心也豈待今日而始曉然哉又諭鼓以助陽非以聲罪竊謂鼓以助陽者其一説也以聲罪者又一説也若謂非以聲罪則小子鳴鼓而攻之謂何且向来第二札謂天子以鼓責勾龍以鼓責勾龍非聲其罪乎不與其説自相背馳乎大抵著一書立一説必處處圎通不至有一毫隔礙而後可何如何如又来札謂魯止有祈穀之郊而無冬至之郊不知此事出何書寔晚所不知者非敢與先生辯也伏乞并初獻六羽義統示望望又来札謂魯不祭地故無方澤竊謂此止據明堂位之文而未嘗參考諸祭統也祭統明云成王康王追念周公之所以勲勞者而欲尊魯故賜之以重祭外祭則郊社是也内祭則大嘗禘是也非魯有方澤之明驗乎又来教謂隐桓以下六七公無僭禮樂事竊謂左傳僖三十年周公閲来聘饗有昌􅍦白黑形鹽周公以為備物辭不敢當文四年衞寗武子来聘宴之賦湛露及彤弓武子不答賦曰其敢干大禮以自取戾杜註雖未詳言然陳氏皆引以為魯僭禮樂之事乞先生更將此三條為我一釋則無容置喙矣敬懇敬懇又丁綝有言能薄功微得鄉亭厚矣豈有堂堂天子之子爵名為王而取鄉亭以為名乎何也建武中此地山陽未名為郡為縣或止以名亭名鄉果光武子荆封山陽王是此地是取鄉亭以為名恐必無此事且光武十一子東海沛濟南阜陵中山楚東平廣陵臨淮琅琊有一不取郡國及縣者乎阜陵原封淮陽王以罪故徙為阜陽王食二縣阜陵即富陵其地下濕即今阜陵湖地然終是縣名也先生篤信古文尚書非真而于酈註反不敢一筆抹殺得無過信分明道元以山陽從廣陵王相近附㑹之耳不可信也又向延陵仲子云有人持奉誠園在貴鄉山右甚堅者愚曰此必誤讀唐瞎子唐詩解矣問何故愚曰唐詩解云奉誠園在安邑坊安邑乃長安坊非山右縣名也有一妙證昌黎馬少監墓誌余以故人稚弟謁北平莊武王于安邑里第其時昌黎舉進士在京師窮不自存故往拜謁之則可證安邑之在長安中矣不識仲子能解此語否要唯先生可言之耳又屢承下問敢不竭其管見以蹈瞞心昧已之譏乎夜来思荆封山陽唯其在今之兖州或懐慶方以西方有警徙居東南廣陵盖當時以兗懐為中原而廣陵則僻在南服也若如今山陽去廣陵三百里耳何取乎其徙封大抵山川有不可改者如鄭樵有言兖州可移而濟河不可移也梁州可改而華陽黑水不可改也此禹貢以山川定州疆界為萬世之書也至扵區區丘垤故蹟似不可信以為據試觀塔兒頭儼然舊治故基土人猶言之鑿鑿以為古淮安在此此豈足信乎不妨故城土城盡屬射陽山陽舊治但不可繋之山陽王荆耳再試觀劉伶臺已見唐詩果真伯倫荷鍤地乎不過以此地山陽附㑹之耳何如何如又舊統志止載唐棠梨涇白水塘常豐堰未及澗河且未及髙家堰踈略可知務要沿革扼要十數語不可多黄河尚可暢言之庭柱長聨佳絶異日可入先生家𫝊耳中但微有議者析薪雖出毛詩左傳與數米而炊從儉之意不合稱柴二字又俗欲取古人家貧負薪以自給易析為負且暗合漢羣臣從官皆負薪寘決河意下即接完國税國字對下童字精功當作工讀書二字反説得濶不如用周禮註倍音佩文曰諷倍文疏作背文即暗誦之説與先生今日尤切朱子嘗稱伏生倍文暗誦亦兼二義愚嘗謂古人學博一句兼二三事合併用之甚多死罪死罪又淮南子洪保馮子山公所著書名與閻子尚書古文疏證辯論而作也其勢如傾山倒海而出却可惜所憑據在逸周書穆天子𫝊又可惜在家語孔叢子偽本竹書紀年尤可惜則在魯詩世學世本毛詩古義耳真繆種流傳不可救藥吾末如之何也已矣向来以春秋純用周正毛詩純用夏正今考之殊不爾曰為改歳非周之歳乎十月之交朔日辛夘非周之月乎維暮之春非周之時乎但不如不改者之多耳先生以為何如又歸檢漢書恵帝紀顔師古注曰諸賜言黄金者皆與之金不言黄者一金與萬錢也可見漢除真金及錢外無别賞賜騐之他處亦然寧人日知錄晚頗有駮正不知先生以為何如洪保主人亦云信古文非真所論難者他語耳正恐信亦不透靈雲䑓中無淮隂侯歩隲逺祖在秦漢之間者有此封號久識之矣陸徳明經典釋文于杜預射陽湖下曰射食亦反又音亦然則又有二音矣射水不知何處此張毅文㑹心處先生亦取之耶又歸檢淮隂侯列傳果有鼓行出井陘口之句鼓行對賦奏最典切但細思冠軍侯三字一連寔字對不得天子之氣且讀者必不肯認作鼓行先取冠軍侯將侯字作封字解愚意改曰鼓行先取冠軍功何如然賦奏句乃相如一人事鼓行韓信事冠軍功霍去病事出一人對兩人也不𦂳嚴近讀載酒園詩話頗悟詩道理近人直是去之萬里之遥又晚疑俄羅斯國必非羅刹國混為一者京師貴人不考故也今讀隋書羅刹國在婆利之東其人極陋朱髪黒身獸牙鷹爪晚親見其國來降人何曾此等形狀婆利國見南史亦見隋書在東州東南海中洲上去廣州二月日行屬南蠻不屬東與北也至俄羅斯當另考以聞錢惟善字思復錢塘人至正辛巳鄉試出羅刹江賦鎻院三千人皆不知錢塘江為曲江思復据枚乗七發引用因此得名遂號曲江居士見列朝詩集甲前此一證也後有所得自呈覽邱劄記卷六
