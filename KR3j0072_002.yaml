body:
  text: 潛邱劄記卷二山陽閻若璩撰釋地餘論地理之說襲謬踵訛固不勝數而一欲鑿空出新反不如舊說之安者顧寧人論幽并營三州在禹貢九州之外是也寧人曰幽在今桑乾河以北至山後諸州并在今石嶺關以北至豐勝二州營在今遼東大寧並有塞外之地舜蓋至此始有先儒謂以冀青地廣而分者殆非余同時客太原面質正曰此不過從肇者始也臆度耳其實周禮職方氏并州其澤藪曰昭餘祁昭餘祁在今介休縣東北三十二里俗名塢城泊吾與君所共遊厯者非石嶺關以南乎且亦知先儒之苦心釋經處乎知分冀東恆山之地為并州則以周并州鎮曰恆山故知分冀東西醫無閭之地為幽州則以周幽州鎮曰醫無閭故又知分青東北遼東等處為營州則以爾雅釋地齊曰營州故也不然微周禮爾雅二書欲於禹九州外枚舉舜三州之名且不可得况疆理所至哉舜本紀稱其地北發息慎息慎即肅慎為今寧古塔去京師三千二百四十里宋許亢宗奉使行程録自雄州起直至金所都㑹寧府二千七百五十里除却燕山府以南二百四十里止二千五百一十里與此不合然亢宗言直至又言彼中行程無里堠但以行轍一日輒記為里數故與今不同下訖三代武王通之來貢楛矢成王伐之遂來賀况在唐虞盛世其為營州之地無疑尚得謂非以境界太逺始别置之哉又按鄭康成云舜以青州越海分置營州晉地理志並同此足補注疏之闕冀之分而并也幽也既以地廣而帝都所寓民物號稱阜繁亦以人衆說者又謂外厚藩屏而內尊王畿尤其深逺之意青之分而營也則不獨以地廣實以吏民有涉海之險故别置為州可以從陸漢光武以遼東等屬青州後還幽州與明嘉靖十三年改遼陽附順天鄉試者略同然則古今情形亦不相逺云近有人引程大昌注杜詩潼關云西征賦遡黃巷以濟潼至唐始於其地立關余每讀此失笑獨不記後出師表殆死潼關語乎通典華隂縣注云有潼關即左氏桃林塞秦函谷關在漢𢎞農郡𢎞農縣即今陕郡靈寶縣界武帝元鼎三年徙於新安縣界至後漢獻帝初平元年董卓脅帝西幸入函谷關自此以前其關並在新安其後二十一年為建安十六年曹公破馬超於潼關即是中間徙於今所國之巨防不為細事史官闕載斯亦失之史記止言老子去周至關關令尹喜曰子將隱矣強為我著書書成而去不言關為何名張守節正義引抱朴子作散關又曰或以為函谷關余以列仙傳之流沙之西髙士傳去入大秦過西關證之散關洵是故王勃散關晨度詩白馬髙談去青牛真氣來然則杜詩東來紫氣滿函關得毋以散字仄聲易函字以合黏乎余曰非也上句王母指楊貴妃曽為女道士下句則用田同秀事天寶元年田同秀言見𤣥元皇帝於丹鳯門空中告以我藏靈符在尹喜故宅上遣使於故函谷關尹喜臺旁求得之皆借古事以詠今諷刺隱然或曰然則函谷關於老子絶無所與所謂老聃西度田文東出皆此關者其說非歟余曰亦未盡非趙景真書昔者李叟入秦及關而嘆此關則函谷關苐無青牛紫氣之事耳酈道元注必以尹喜候氣當於西入關而不於西出關者過矣客有遺余以揚州府志者偶抽一帙東漢名宦曰歐陽歙揚州牧張禹揚州刺史告之曰東漢揚州非今之揚州也今之揚州在東漢為廣陵郡屬徐州西晉猶然此後僑置更易不一隋開皇九年方於此置揚州總管府故煬帝泛龍舟曲云借問揚州在何處淮南江北海西頭其分畫疆域之精無踰此詩客曰西漢黃霸揚州刺史亦不當祀於此乎余曰曽亦疑及漢地理志於廣陵國云屬徐州而武帝賜廣陵王䇿云古人有言曰大江之南五湖之間其人輕心揚州保彊三代要服不及以正却又以廣陵為揚州意者䇿文所引乃古人成語而今王之制則屬徐州耳近修山陽縣志有以此地何由得名來問者余曰郡名山陽始晉安帝義熙中土斷分廣陵立山陽者僑置之名不但云郡為僑置即所治之縣名與之同且又同時立亦應為僑置後考宋書州郡志謂以境內地名得名恰與僑置之郡巧相符合亦異事曽問人地名為何俱不能答考諸三國志蔣濟傳文帝欲燒船於山陽池中通鑑池作湖即精湖戴延之西征記山陽津名池也湖也津也一也蓋以水名為縣名者故孔衍為廣陵郡石勒常騎至山陽桓溫伐燕回屯散卒於山陽是時未置郡縣山陽地名已著聞通典不知謂吳王濞反山陽王率衆於此拒之因名濞反時漢無山陽王山陽王立在後此十年晉地理志分廣陵郡之建陵臨江如臯寧海蒲濤五縣置山陽郡不知此分與海陵郡者誤繫山陽山陽别領四縣見宋志善乎沈約言名號聚易境土屢分尋校推求未易精悉斯可為知修志之難者矣有以小學書引顔氏家訓此乃恆代之遺風乎問者余曰拓拔魏都平城縣縣在今大同府治東五里址猶存縣屬代郡郡屬恆州所云恆代遺風謂是魏氏之舊俗耳通典以厯代郡縣析於禹九州之中甚善獨謂自嶺而南當唐虞三代為蠻夷之國謂之南越於是特立南越一目以與上九州别併譏晉書隋書皆謂交廣二州之地謂禹貢揚州之域非是余請得而折之曰南越尉他傳秦以併天下略定揚越張晏曰揚州之南越也顔師古注漢書本揚州之分故曰揚粵置桂林南海象郡此三郡盡有今廣東廣西交趾之境漢武帝平為七郡名交州三國吳分交州置廣州晉滅吳因之下逮隋二史並以交州廣州為禹揚州新唐史亦然豈無所根據者哉至謂九州封域皆以鄰接相屬五嶺之南果禹跡則屬荆不應捨荆而别屬揚斯又不然塞上嶺又名大庾嶺者在南安府城西南無論今入粵正道漢樓船將軍出豫章下橫浦即此豈是鑿空余嘗謂東漸於海西被於流沙東西皆有地名而朔南暨南北却無欲以舜本紀北發息慎南撫交趾二地補注之正太史所謂書缺有間矣其軼乃時時見於他說是也息慎既為營州如是其逺則揚州之有交趾亦復何疑且不獨舜撫顓頊已南至於交趾矣或曰子於上世幅員若是其侈言之何與余曰後代儒生止緣見秦漢之君務勤逺略開地斥境快其心志以為聖人必不爾不知聖人乃自然德化所感人盡來王非有心者觀顓頊本紀動靜之物大小之神日月所照莫不砥屬嚳本紀日月所照風雨所至莫不從服豈後世德不及逺乃紀於近者所可髣佛其萬一與皇華紀聞曰韶州府城東北八十里有韶石相傳帝舜南巡奏樂此山因有雙闕毬門鳯閣等名今遂稱韶州為虞城究其始不見於傳記余謂特不見水經注耳吾友胡朏明既主通典兼持此說作禹貢錐指因謂嶺南虞舜聲迹所不及余曽靣質正曰韶州之更名也始自唐貞觀元年計其時圖經應有舜嘗奏樂於此之說不然昌黎酬張韶州端公詩云暫欲繫船韶石下上賔虞舜整冠裾豈鑿空附㑹者子所據僧一行山河之象存乎兩戒云至於衡陽乃東循嶺徼達東甌閩中是謂南紀以限蠻夷故星傳謂南戒為越門東甌今溫州及台閩中今福建明不及嶺之南余謂下文一行不云自江源循嶺徼南東及海為蠻越乎又云逾嶺徼而南為東甌東似當作西謂駱越别種者又云南逾嶺徼為越分故厯斥漢之郡若鬱林合浦蒼梧南海珠崖唐之州若富昭象龔繡容白廉等所包甚廣不得執一說以相難也復據昌黎送廖道士序中州清淑之氣於嶺焉窮最髙而橫絶南北者嶺此即酈注引古語五嶺者天地以隔內外意也余謂昌黎在潮州不又云禹跡所掩揚州之近地乎猶且不謂之逺蔡澤傳吳起為楚南收揚越吳起傳作百越貨殖傳與江南大同俗而揚越多焉下即云畨禺一都㑹皆足證不史遷昌黎是信而徒據杜君卿何也且堯典云宅南交證以舜本紀南撫交趾顓頊本紀南至於交趾則交為交趾洵有如小司馬所注者不復疑子讀堯典如是之濶而讀禹貢乃頓爾隘耶朏明不覺嘆曰吾書刋矣不及追改奈何楚在春秋地雖廣不瀕於海屈完曰寡人處南海解者曰對上北海之文以所近者言也而子囊謂共王赫赫楚國而君臨之撫有蠻夷奄征南海以屬諸夏南海今廣州府治為當日百越地雖未屬楚要為楚兵力之所及鄭伯謂莊王其俘諸江南以實海濵亦唯命此句具有兩層義人多未析如楚文王滅羅徙羅子於長沙故長沙有汨羅鄭若滅得徙於楚之南徼為江南此一義也實海濵楚世家作賔之南海古以與字通用言不得徙楚境內即填實於南越之地為濵海之民此又一義也亦見楚號令及於南海逮後始皇二十五年王翦悉定荆江南地因南征百越之君猶前志也夫通典謂禹貢物産貢賦職方山藪川浸皆不及五嶺之外以知嶺南地非九州之境說尤不然今嶺南多金銀非揚所貢之金乎多孔翠犀象非揚所貢之齒革及羽毛乎多蕉多木綿非所貢之卉服織貝乎君卿曽官節度於嶺南寧不見之耶至職方川浸原不及海而宣王時江漢之詩詠召穆公虎之成功曰于疆于里至於南海豈得捨今祠祀之南海而他有所屬哉梁元帝法寶聨璧序云北平堯栁楊升菴賞其新而未詳所出曽遍訪之亦無解者近方悟堯典宅西曰昧谷康成古文作栁谷虞翻所見鄭氏本是卯字曰古大篆卯柳同字此栁谷也王伯厚謂魏明帝時張掖栁谷口水溢涌寶石負圖即其地余按隋地理志於張掖縣注云有大栁谷張掖為今甘州衛正在西北故曰北平堯栁上句南通舜玉升菴誤記作舜梧以為舜梧堯栁極工陳耀文又以舜蒼梧非吉祥善事余因竄改之曰東平舜蒲西通堯栁杜詩還如何遜在揚州者遜為建安王偉記室偉天監六年遷使持節都督揚南徐二州諸軍事右軍將軍揚州刺史七年以疾表解州遜掌其書記正在揚州故曰何遜在揚州自晉以來揚州刺史治丹陽郡郡治建鄴縣為今江寧府於廣陵迥不相涉若徐湛之出為南兖州刺史此却在廣陵起風亭月觀吹臺琴室亦偶與後來遜咏早梅詩枝橫却月觀花繞凌風臺臺觀之名略合豈得便附㑹為一梁沿晉制州治並同劉穆之所謂揚州根本所係不可假人又謂神州治本是豈廣陵足當之乎杜注漢家山東二百州山東者太行山之東也殊非從來惟胡三省於通鑑秦孝公時河山以東彊國六注云河自龍門上口南抵華隂而東流秦國在河之西山自鳥鼠同穴連延為長安南山至於泰華秦國在山之西韓魏趙齊楚燕六國皆在河山以東為得其解余參以賈誼言所謂建武關函谷臨晉關者大抵為備山東諸侯則可見自秦之外皆謂之山東太史公自序蕭何鎮撫山西張守節注謂華山之西也趙充國辛慶忌傳贊曰秦漢以來山東出相山西出將山西班固明言天水隴西安定北地處藝迫近羌胡故秦時云知山西益知其為山東矣白詩七月七日長生殿夜半無人私語時范元實謂長生殿乃齊戒之所非私語地若改作飛霜殿則吻合矣蓋長安志天寶六載改溫泉為華清宫殿曰九龍以待上浴曰飛霜以奉御寢曰長生以備齊祀楊升菴又引津陽門詩金沙洞口長生殿玉蕊峰頭王母祠以實其駁正余謂胡三省通鑑卷二百七長生院注云院即長生殿明年五王誅二張進至太后所寢長生殿同此處也蓋唐寢殿皆謂之長生殿此武后寢疾之長生殿洛陽宫寢殿也肅宗大漸越王係授甲長生殿長安大明宫之寢殿也白居易長恨歌所謂長生殿則華清宫之寢殿也此殿本名飛霜蓋同一長生殿也學者讀顧况宿昭應詩武帝祈靈太乙壇新豐樹色繞千官那知今夜長生殿獨閉空山月影寒當知為齊宿之殿李義山驪山有感詩驪岫飛泉泛暖香九龍呵護玉蓮房平明每幸長生殿不從金輿惟壽王當知為寢宿之殿通鑑地理通釋曰碣石凡有三騶衍如燕昭王築碣石宫身親往師之此碣石特宫名耳在幽州薊縣西三十里寧臺之東非山也秦築長城所起自碣石此碣石在髙麗界中當名為左碣石其在平州南三十餘里者即古大河入海處為禹貢之碣石亦曰右碣石其說可為精矣或獻疑曰後漢書常山國九門縣劉昭補注曰碣石山戰國䇿云在縣界史記蘇秦列傳索隱曰戰國䇿碣石山在常山九門縣不又一碣石乎王氏說尚有未盡余曰九門縣自西漢五代猶沿宋開寶六年始省入藁城今藁城縣西北二十五里有九門城四面五百餘里皆平地求一部婁塊阜以當所謂碣石之山亦不可得故康成云今驗九門無此山也康成戒子書吾嘗遊學往來幽并兖豫之域蓋亦以目驗知之王伯厚生長晚宋足不曽至中原即以信康成者削國䇿不知古人撰著屹如堅壘豈易攻與黃子鴻篤信水經注者初晤碧山堂問曰後漢志溫縣濟水出王莽時大旱遂枯絶是河南無濟今且千六百七十餘年矣何酈道元言之詳且析也子鴻曰新莽時雖枯後復見酈氏所謂其後水流徑通津渠勢改尋梁脉水不與昔同是也祗緣杜君卿不信水經專憑司馬彪志竊以彪不過紀一時之災變耳非謂永不截河南過也君卿云云遂真覺河南無濟疑誤到今今尚有宗主其說者余曰枯而復通既聞命矣敢問除酈注外抑别有徴乎子鴻曰未聞余退而考杜預釋例云濟水自滎陽卷縣東經陳留至濟隂北經髙平東平至濟北東北經濟南至樂安博昌縣入海郭璞山海經注云今濟水自滎陽卷縣東經陳留至濟隂北東北至髙平東北經濟南至樂安博昌縣入海張湛列子注云濟水出王屋山為沇水東經溫為濟水下入黃河十餘里南渡河為滎澤又經濟隂等九郡而入海萃此三說以覆子鴻曰酈注經余更注酈吾與子同為善長之忠臣何如子鴻喜獲所未聞復難余今不見河南有濟畢竟復枯於何代余曰諾復考得後漢書王景傳濟渠下章懷太子賢注云濟水出今洛州濟源縣西北東流經溫縣入河度河東南入鄭州又東入滑曹鄆濟齊青等州入海即此渠也王莽末旱因枯涸但入河內而已似不知中有復通之事合以許敬宗對髙宗濟潛流屢絶是自唐以前濟已復枯直至今矣或問北嶽祀典畢竟該在貴省渾源州抑仍曲陽耶余曰曲陽是也萬厯十六年大同巡撫胡來貢疏請改北嶽沈文端鯉為宗伯覆疏詳駁此駁出足以塞異議者之口矣苐惜其引史僅及漢宣帝未上及武帝元鼎三年常山王徙然後北嶽在天子郡內天漢三年泰山修封還過祠常山瘞𤣥玉二事引經亦僅及周官禹貢余為詳補曰舜典十有一月朔巡守至於北嶽傳曰北嶽恆山禹貢太行恆山疏曰恆山在上曲陽西北爾雅兼殷制釋山曰河北恆周禮職方氏正北曰并州山鎮曰恆山注曰恆山在上曲陽是虞夏殷周異代同揆則舜當日蚤覲北諸侯於今曲陽大茂山之下非山經所稱今渾源之北嶽水經所稱之𤣥嶽厯厯可知豈容議議之者以定鼎於燕曲陽在南渾源少北改而祠之於方位宜余謂則有孔頴達毛詩嵩髙之疏在曰若必據巳所都以定方位則五嶽之名無代不改何則軒居上谷處恆山之西舜居蒲坂在華隂之北豈當據巳所在改嶽祀乎余嘗愛王導云古之帝王不必以豐儉移都此名相之言也孔頴達云天子不據巳所都以定方嶽此名儒之言也金世宗大定間或言今既都燕當别議五嶽名不得仍前代太常卿范拱輒援嵩髙疏數語以對後不復改明以來之人獨未讀金史乎因思嵩髙維嶽非當時以太室山為嶽乃詩人借嶽來贊美之曰有嵩然而髙者維是四嶽之山其山髙大上至於天維是至天之大嶽降其神靈和氣以生甫國之侯及申國之伯爾雅撰於三百篇後緣此遂實指嵩髙為中嶽太史公又出於爾雅後并補注堯典曰此中嶽嵩髙也是殆忘却禹貢之太嶽矣將堯有二中嶽耶漢武登禮太室易曰崈髙中嶽名益顯皆為爾雅所誤者或曰然則周竟無中嶽乎余曰周仍以唐虞時霍山為中嶽矣觀職方河內曰冀州山鎮曰霍山可知矣蓋自有宇宙便有此山黃帝正名百物早已定五嶽之稱禹主名山川又從而奠之下訖周秦悉不敢移豈有如武帝以衡山逺移南嶽之祀於灊霍山者乎或言如子言周不曽以岍為西嶽岍何得有嶽名余曰職方河西曰雍州山鎮曰嶽山蚤已得嶽之名豈待周移嶽於此而後云爾乎漢既移南嶽唐肅宗在鳯翔亦曽改岍陽吳山為西嶽以祈靈助要皆後王事余最愛康成注大司樂四鎮五嶽取諸職方九州之山而遍足少嫌其以嶽為西嶽不以霍山為中又嫌其宗伯注仍襲爾雅雜以嵩髙自忘却大司樂注殆由未善於讀嵩髙之詩也哉秀水徐善敬可為人撰左傳地名訖問余成二年鞍之戰杜注止云齊地穀梁傳則云鞍去國五百里恐非以下文有華不注山山下有華泉證之鞍似去此不逺當屬今厯城縣地余曰通典濟州平隂縣注云左傳齊晉戰鞍故城在縣東括地志寰宇記同蓋唐世鞍故城尚存故杜以為據余意鞍在今平隂東作四五十里其去華不注山亦一百三四十里朝而戰於鞍勝而逐之一百三四十里之山下且三周焉晉人之餘勇真可賈哉齊奚足云蓋古駟駕一車車僅三人御復得其法故取道致逺而氣力有餘今人不明乎此徒以平隂屬兖州厯城屬濟南中隔長清縣境如是其逺豈能一日通作戰場茲所以見通典亦未足信與羊流店晋羊叔子故里在新泰縣西北六十里南北孔道也余庚午春經此問叔子之後裔有存者往尋其祖墓隆然髙阜者三即傳出折臂三公之所復往尋其居遺址隱然若城郭綿亘八里許因歎叔子以上九世皆二千石卿校可為東漢第一世家當時聚族而處居以積久日加闢逺又蔡雍亡命江海逺跡吳㑹往來依太山羊氏以此地為淵藪孰敢過問之種種皆與史傳關合獨後漢書羊續太山平陽人平陽即西漢之東平陽晉為新泰縣晉書叔子却屬太山南城人南城原魯南武城晉地志亦三字名故城在今費縣西南九十里距新泰二百四五十里意新泰叔子之祖貫巳則占籍南城耳觀武帝咸寧中詔以泰山之南武陽牟南城梁父平陽五縣置南城郡封叔子南城侯以其為南城人也叔子且死從弟琇述素志求葬於先人墓次狐死正邱首正欲葬其隆然高阜之旁也茲撰一統志繫續於新泰人物可也叔子以孫從祖奈晉書何且新泰縣建置沿革並未見何年改南城一筆人物豈有無根者哉要須别繫叔子於費縣人物不必拘元和志然後可黃子鴻言趙奢解閼與之圍閼與凡有四水經注梁榆水徑梁榆城南即閼與故城也趙奢破秦於此盧諶征艱賦云訪梁榆之虛鄣弔閼與之舊平梁榆城在今遼州和順縣括地志閼與聚落今名烏蘇城在潞州銅鞮縣西北二十里趙奢破秦軍處銅鞮今沁州郡國志上黨涅縣有閼與聚劉昭注云史記趙奢破秦兵閼與涅在今武鄉縣隋地理志武安縣有閼與山元和志閼與山在縣西南五十里即趙奢拒秦處武安屬今彰德府磁州東海公曰若在武安去邯鄲僅六十里何須奢卷甲而趨之二日一夜至乎當在貴省潞州者近是余曰然奢傳云秦伐韓軍於閼與閼與乃韓邑自屬上黨一帶廉頗樂乘並言其道逺閼與去邯鄲四百里故奢言道逺險狹譬鼠鬭穴中以閼與必穿太行山過而沁州武鄉亦多叢山也果在武安豈容作斯語越明日告子鴻曰子抑知止有二閼與乎一為韓之閼與一為趙之閼與子鴻驚問焉趙奢列傳秦伐韓軍於閼與趙世家惠文王二十九年秦韓相攻而圍閼與此韓之閼與也魏世家哀王八年昔者魏伐趙拔閼與秦本紀昭襄王三十八年胡傷攻趙閼與王翦列傳始皇十一年翦將攻趙閼與破之此趙之閼與也韓閼與當并沁州與武鄉者為一何者涅故城在武鄉縣西五十五里而武鄉在沁州東北六十里則涅在沁州之北矣閼與又在涅縣西則在沁州西北可知相距幾何正屬一邑趙閼與的在和順縣觀始皇本紀十一年王翦攻閼與橑楊二邑比鄰橑楊今橑州和順距本州九十里若到沁州閼與城幾二百餘里各為一邑可知至武安之有閼與則是唐人誤㑹史遷文義見武安西南有山蒙以閼與之名山豈有口自鳴曰我非閼與也哉然史記實有疏處蓋秦伐韓軍於閼與此一枝兵也秦軍軍武安西鼓噪屋瓦盡振此又一枝兵也秦當日蠶食三晉三晉無歲不被兵所在多有遷若作時秦軍有軍武安西者自明軍中侯有一人言急救武安奢立斬之非斬其犯令乃斬其妄言惑衆心也奢受命救閼與不救武安縱解得武安之圍猶非韓昭侯曰非不惡寒也以為侵官之害甚於寒七國悉遵此法秦間來入乃從閼與軍至者間還報秦將輒大喜曰夫去國三十里而軍不行乃增壘閼與非趙地也此句亦妙蓋閼與原韓地非關邯鄲奢自不應來救故懈而不設備奢遂窮日夜力趨至據山以擊破之山自在今沁州武鄉間此間豈少山哉括地志固已疑山在洺州謂其太近恐潞州閼與聚城是所距據處真可謂先得我心世稱魏王泰括地志為首於兹益信所云閼與有四訛者削之僅存其三析者併之僅存其二混者别之則孰為韓孰為趙顯顯然在吾目矣故曰閼與有二復越明日告子鴻曰子既知二閼與矣抑知二閼與皆為趙奢敗秦軍之地乎子鴻益驚余曰戰國䇿趙背秦秦王大怒令衛胡易伐趙攻閼與趙奢將救之魏令公子咎以鋭師居安邑以挾秦秦敗於閼與此即秦本紀昭襄王三十八年中更胡傷即國策衛胡易攻趙閼與不能取之事秦史諱其敗績曰不能取國䇿承趙史所書直曰秦敗於閼與下文曰大敗秦師亦足徴國史書法互異處水經注以梁榆城為奢破秦於此亦是但移却惠文王前一年二十九年事於此則誤道元且勿論史遷生當六國未逺時其作年表於趙惠文王二十九年曰秦拔我閼與趙奢將擊秦大敗之三十年曰秦擊我閼與城不拔於前閼與不曰韓曰趙更混而并之為一閼與然則地理之學真難言矣哉憶庚午重九病新愈後東海公招登髙莫釐峯酒中云古人之事應無不可考者縱無正文亦隱在書縫中要須細心人一搜出耳舉坐默然顧向余曰某此論為濟水發枯而復通畢竟在何時子其為我考之余曰唯王景傳云初平帝時河汴決壞未及得修建武十年陽武令張汜上言河決積久日月侵毁濟渠所漂數十許縣逮後三十五年汴渠成明帝巡行下詔曰河汴分流復其舊迹陶丘之北漸就壤墳此汴壞而濟亦壞汴治而濟亦治之徴也又考晉書傅祗傳武帝時為滎陽太守自魏黃初大水後河濟泛溢鄧艾常著濟河論開石門而通之至是復侵壞祗乃造沈萊堰兖豫無水患郤超傳太和中桓溫將伐慕容氏引軍自濟入河超諌曰清水入河無通運理毛穆之傳溫使穆之鑿巨野百餘里引汶㑹於濟此豈竟枯絶者哉大抵王莽世天災雖甚然皆不逺而復如王橫言天嘗連雨東北風海水溢西南出寖數百里九河地已為海所漸矣今九河故迹固具在酈氏言濟當王莽之世川瀆枯竭後水流徑通余謂此班氏注於垣縣云王屋山沇水出東南至武德入河軼出滎陽北地中又東至琅槐入海過郡九行千八百四十里蓋以目驗者言也祗緣司馬彪下語太重若改遂枯竭為㑹枯絶則妙妙耳輒録以覆自周官屢言天下土地之圖九州之圖及地圖圖於地理為尤切矣班固撰地理志一則曰秦地圖再則曰秦地圖書故蕭何入咸陽盡收丞相御史圖書藏之帝具知天下厄塞戶口多少彊弱處民所疾苦者以得此圖書也光武帝至廣阿舍城樓上披輿地圖指示鄧禹曰天下郡國如是馬援曉勸隗囂亦曰披輿地圖見天下郡國百有六所武帝封三王御史奏輿地圖請所立國名光武封十子為公羣臣請大司空上輿地圖明帝封皇子悉半諸國案地圖章帝則篤愛諸弟案輿地圖令諸國戶口皆等漢使窮河源莫知何所出山曰昆侖天子按古圖書而名云漢藩諌誅閩越曰以地圖察其山川要塞相去寸數而間獨數百千里漢相私國土多租四百頃曰以平陵伯為界太守更郡故圖而正之李陵至浚稽山舉圖所過山川地形遣騎以聞趙充國曰兵難隃度臣願馳至金城圖上方略李恂使幽州所過皆圖寫山川屯田聚落悉奏上齊人延年上言可案圖書觀地形令水工凖髙下以開河明帝引見王景賜以山海經河渠書禹貢圖俾修汴渠渠卒成即謀不軌者如淮南王安曰夜按輿地圖部署兵所從入江都王建具天下之輿地及軍陳圖至張千秋口對兵事畫地成圖馬援聚米為山谷指畫形勢臧旻口陳西域百餘國城狀手畫地形皆得圖之髣佛者猶動人如是圖詎不重哉晉裴秀曰周秦地圖祕書殆絶僅有漢氏及括地諸雜圖粗具形似不為精審於是作禹貢地域圖今亦不可得見矣見者元道士朱思本輿圖所謂蓋其平生之志而十年之力者明人轉相增竄名以巳圖漸失其本真獨計里畫方之法猶遵若王律余謂亦自唐賈耽來也舊書云其令工人畫海內華裔圖一軸廣三尺從三丈三尺率以一寸折成百里新書謂以寸為百里表獻於上曰縮四極於纎縞分百郡於作繢宇宙雖廣舒之不盈庭舟車所通覽之咸在目讀之真令人爽然隋宇文愷曰裴秀輿地以二寸為千里余謂窮經者須知地理元董鼎注蔡書傳云西伯戡黎其國蓋在黎陽之地而非上黨壺關之黎武王伐商兵渡孟津道過黎陽先戡黎而後至紂都如齊桓伐楚先潰蔡而遂入楚境也引吳才老戡黎伐紂時事為證余按紂都朝歌今在衛輝府淇縣北黎陽故城在大名府濬縣西南三里武王以正月二十八日次孟津明日己未至癸亥五日孟津至朝歌四百餘里故須日行八十里有竒然僅及商郊而止所以者何赴敵宜速不拘日三十里成法也牧野跨衛輝之汲淇兩縣界距紂都十有七里若黎陽則又自朝歌東出七十里豈得道先經此且武王於紂聲罪致討名其為殘士女歡迎豈同齊桓以諸侯之師侵蔡蔡潰遂伐楚兵行詭道者比乎儒生不知兵復不諳地理其舛錯如是禹貢蔡傳訛者莫過九河苞淪於海且託之酈道元不知道元水經注凡三見皆指碣石入海未一及九河云九河者乃王莽時玉橫一家之言未詳考驗者兹欲正其訛惟取孔頴達書疏元于欽齊乘二條補於九河既道之下詳四書釋地續又按蔡傳引爾雅九河六曰簡潔爾雅本作潔與簡各為一河河以一字名者李巡曰簡大也潔苦也河水多山石治之苦潔唐孔氏宋邢氏疏並同即朱子孟子集注亦曰曰簡曰潔然已訛為潔矣按浮于濟漯達于河孔頴達疏云從漯入濟自濟入河上句真亂道唐髙宗問許敬宗曰書稱浮於濟漯今濟與漯斷不相屬敬宗對曰沇濟自溫入河伏地南出為滎澤又伏而出曹濮之間汶水從入之故書又言浮汶達濟不言合漯者漯自東武陽至千乘入海也新唐書亦不通地理沇濟自溫入河作今自漯至溫而入河夫髙宗灼知濟與漯斷則此至溫入河乃濟水非漯水明矣敬宗雖姦敢靣欺以必不然之水道乎且其學素號博矣明屬宋景文亂竄不及其原對之文然敬宗之所可議者有二一是不正解禹貢經文以告君一是言伏地南出為滎澤不深明乎濟水之故余嘗按漢地理志河東郡垣縣沇水所出東南至武德入河軼出滎陽北地中又東至琅槐入海東郡東武陽縣禹貢漯水出東北至千乘入海又按水經注河水自滎陽黎陽濮陽鄄城又東至東武陽漯水出焉又東北至臨邑有四瀆津東分濟亦曰泲水受河也又東北至髙唐漯水注之又有南北二濟水皆自滎陽分河東北流至臨邑有四瀆津通於河此二說補於下曰大河水自滎陽分流為濟又東北至武陽分流為漯又東至臨邑復與濟通二水源流雖皆與大河相通然濟在河南漯在河北二水不能自通唐髙宗云濟與漯斷是也禹貢所云蓋謂兖州之貢或浮於濟則自滎陽達河或浮於漯則自武陽達河二道皆達於河耳至既東為濟入于河非是潛伏地中乃穿河腹中行不至如蔡傳入河穴地伏流絶河之說曽有人伏水底見渾河中有清流一道直貫之者此濟也故古文每言如河濟之不相亂余親見渭水至清以涇而濁濟水至清却不以河而濁蓋水各有性濟之性則獨徑也故語云徑莫如濟曲莫如漢溢出南岸為滎仍然至清自滎澤至定陶約四百四十里中有濟陽城今在長垣縣界者須行過此地而伏伏而旋出於陶邱之北禹貢九叙導水皆無出字獨至此下一出字豈無故明係伏而復見斷而復續或曰濟陽至陶邱百四十里而近此百四十里之間便有伏而復見之事與余曰括地志沇水出王屋山頂崖下石泉停而不流深不測既見而伏至濟源西北二里平地其源重發而東南流此不過八十里耳見而伏伏而又見况將倍此之地乎後代祗緣王莽末濟瀆曽枯不見有溢為滎又烏知陶邱北有濟復出之事哉記載闕如惟許敬宗知之曰伏而出曹濮之間新書亦曰洑而至曹濮散出於地合而東殆善㑹經㫖新書又載其對髙宗曰古者五行皆有官水官不失職則能辨味與色潛而出合而更分皆能識之余謂潛而出即東出於陶邱北之注腳也合而分即入於河溢為滎之注腳也胡朏明問滎字說文曰絶小水也何義余曰爾雅正絶流曰亂邢昺疏正直也孫炎所謂橫渡是也濟水截河南過為滎故以絶字解滎至小水二字則有唐髙宗許敬宗問答在髙宗曰天下洪流巨谷不載祀典濟甚細而在四瀆何哉敬宗曰瀆之言獨也不因餘水獨能赴海者也濟潛流屢絶狀雖微細獨而尊也此可以為其注腳矣顧景范川瀆異同力詆三伏三見之說出近代俗儒漢唐迄宋諸儒無主是說者余謂至溫入河自不得言一伏特再伏再見耳又曰出者折旋之間因邱為隱見耳濟初發源或有伏見之分至截河而南之後未曽伏而復出經文固已明言之曰浮於汶達于濟又曰浮於濟漯達于河豈有伏見不常而可為轉輸之道者哉殊可稱偉論然以愚斷之兖州貢道浮濟必經陶邱即青州貢道浮汶者亦由壽張縣安民亭入濟一百五六十里至陶邱北向所云浮於淮泗當作達于菏浮菏者亦由乘氏縣入濟五十里至陶邱北皆至此而止然後舍舟登陸至濟陽城西復登舟以至滎陽入于河此當日貢道也或曰果如是則兖州貢道當如荆梁二州用逾字曰浮于濟復逾于濟達于河不得直接以因水入水之達字矣余曰固有說荆之漢也洛也二水而異名者也本不相通貢道須此故曰逾于洛梁之沔也渭也亦二水而異名者也本不相通貢道須此故曰逾于渭若兖州之濟本屬一水雖中少間阻無復異名故經文亦不屑屑分疏之且不有浮于漯在連類而及之因從而省文者乎顧氏苐見明永樂十三年㑹通河成漕舟浮江涉淮泝河絶濟而北達于漳衛輸之太倉無復有陸運之苦因亦上疑濟水此何異元行海運習為坦途明人有更講求其說者輒搖手相戒幾同談虎嘗考唐六典東都曰含嘉倉自含嘉倉轉運以實京之太倉自洛至陕運于陸自陕至京運于水李泌自集津至三門鑿山開車道以避底柱之險宋都大梁四方皆可由水以直抵而開寶八年乃擇幹彊之臣在京分掌水陸路發運事明永樂之初亦經水與陸交運故牒猶存不必溺於今而議古且陶邱不過兩邱相重纍耳形甚微非比髙山巨嶺足以蔽虧濟水致忽隱而忽見如顧氏解余謂縱能障蔽濟流經文當作東出於陶邱南不當曰東出于陶邱北蓋出者明係伏地至此復見之名也余是以篤信經文參諸古今運道之變一水直達者少著其論如此胡朏明聞余論復出一說以助之曰虞夏貢物與後代漕粟不同當時甸服之中納總銍秸粟米其食取諸冀州而已足餘八州所貢初無繁重難致之物即以兖言之曰漆絲織文而已青州所貢較多亦不過曰鹽絺海物絲枲鉛松怪石檿絲而已他州倣此要非繁重難致者豈惟虞夏周禮大宰以九貢致邦國之用一祀貢二嬪貢三器貢四幣貢五材貢六貨貢七服貢八斿貢九物貢度與虞夏不相逺豈有漕粟數百萬石餉京師如漢唐以下之所行者哉宋史食貨志言川廣所貢之物亦皆輕約易齎故水陸兼運由是推之虞夏貢物間有陸運人必不以為苦濟水斷續何害其為貢道哉孔頴達雖亂道不至如蔡傳之甚疏云計沔在渭南五百餘里抵沔須陸行而北入渭此真禹跡貢道也蔡傳引漢武帝時人有上書欲通褒斜道及漕事下張湯問之云褒水通沔斜水通渭皆可以漕從南陽上沔入褒褒絶水至斜間百餘里以車轉從斜下渭如此則漢中穀可致經言沔渭而不言褒斜者因大以見小也案漢溝洫志上書人言今穿褒斜道少阪近四百里而褒水通沔斜水通渭皆可以行船漕則禹之時褒雖出衙領山入沔算不得與沔通不可以行漕故斜亦出衙領山北入渭算不得與渭通不可以行漕故經文止言沔渭不及褒斜當日貢道原無須此二水也非屬省文顔師古曰褒斜二谷名其中皆各自有水耳正指漢武未穿道以前言蔡氏不讀全本漢書似從一節本書録來謂因大以見小其臆解有如此者蔡傳載潏水李氏曰禹鑿龍門起于唐張仁願所築東受降城之東自北而南至韓城北安國嶺盡案東受降城在今朔州北三百五十里本漢定襄郡之成樂縣去禹貢龍門一千五百餘里禹輕百姓力竟至此乎真正妄談不足與辨蔡傳又云舊說相傳禹鑿龍門而不詳其所以鑿余謂尸子古者龍門未開吕梁未鑿河出於孟門之上大溢逆流無有邱阜髙陵盡皆滅之名曰鴻水此即欲鑿之由賈讓奏昔大禹治水山陵當路者毁之故鑿龍門辟伊闕析底柱破碣石墮斷天地之性此即當鑿之故水經注孟門即龍門之上口也實謂黃河之巨厄此石經始禹鑿河中潄廣夾岸崇深傾崖反捍巨石臨危若墜復倚古之人有言水非石鑿而能入石信哉其中水流交衝鼓若山騰濬波頽疊迄於下口又云梁山即經所謂龍門矣魏土地記曰梁山北有龍門山大禹所鑿通孟津河口廣八十步巖際鐫迹遺功尚存元和郡縣志孟門山俗名石槽實為黃河巨厄今案河中有山鑿中如䄚束流懸注七十餘尺此皆詳其鑿之之跡曷云不詳大抵此等書蔡氏並未寓目即見亦不復能記憶荀卿嘗謂陋也者天下之公患也余則謂陋也者儒生之公患也顧氏肇域記左傳桓二年其弟以千畝之戰生杜注以為西河介休縣南有地名千畝非也穆侯時晉境不得至介休當以趙世家注引括地志嶽陽縣北九十里有千畝原為是余謂當日千畝之戰或在嶽陽或在介休誠不敢定但謂晉境不得至介休則有辨晉世家叔虞封于唐方百里其子燮改曰晉曽孫成侯徙曲沃八世孫穆侯徙絳不言何代徙都翼則徙翼當在昭侯前穆侯徙絳之後中間可知入春秋六年晉逆翼侯納諸卾謂之卾侯鄂索隱曰今在大夏大夏者吾鄉太原縣也又後十三年曲沃滅翼王立哀侯之弟緡於晉晉亦太原縣太原至翼城六百五十里中道必由介休當日盡屬晉方得兩侯分立肇域記非是余於是獨歎晉啓封百里逮成侯時何啻五倍王綱不振兼國侵小不待入春秋而已然矣可不懼哉又按周語宣王即位不藉千畝虢文公諫王弗聽此千畝乃周之藉田離鎬京應不甚逺末云三十九年戰於千畝王師敗績于姜氏之戎左傳繫此事絶有深意蓋自元年至今將四十載天子既不躬耕百姓又不敢耕竟久成舄鹵不毛之地惟堪作戰場故王及戎戰于此因悟趙世家周宣王時伐戎及千畝戰奄父脫王正此地括地志以晉州嶽陽縣北千畝原當之不應去鎬京如是其逺殆非也噫安得盡舉經傳子史注地理誤者一一釐正之哉按寇有來路亦有去路其逐而出之也即從其來路必不引入我門庭之內别從一路以出者玁狁侵鎬及方至於涇陽鎬等三地名皆在雍州則太原地名亦即在雍州近代說詩者指原州言然原州乃今固原州舊髙平鎮後魏孝明帝正光五年置原州蓋取髙平曰原為名此地未必以此名惟鄭注禹貢原隰底績云詩度其隰原即此原隰其地在豳近是要髙平曰原秦中地靣以原名者至不可勝數今亦不能定指何地也來歸自鎬劉向曰千里之鎬顔師古注非豐鎬之鎬至于太原余亦謂雍州之太原必非周并州之太原也更有證者宣王既喪南國之師料民於太原太原與詩同一地若是晉陽周已封唐叔虞為侯國天子豈得料其民乎仲山父諫不謂其少而大料之是示以寡少諸侯避之其非屬甸侯之地可知既知國語益知詩矣治梁及岐孔安國傳梁岐二山在雍州朝以道本水經注作吕梁狐岐改入冀州今亦未論其確與否苐蔡傳云梁在石州離石縣東北是今汾州府永寧州東北一百里之吕梁山本名骨脊山者去黃河一百五十餘里岐在汾州介休縣今却在孝義縣西八十里盤村原山名狐岐者去黃河二百三四十里謂堯時洪水懷襄大河泛濫至此二山下須禹治之則可蔡氏竟認為古河徑之險厄與龍門一般二山河水所經治之所以開河道也不幾眯目而道黑白者乎雖生長東南誤不應至此蔡傳當云狐岐之山勝水所出東流合文水又東南入汾汴今作東北誤春秋正義曰堯治平陽舜治蒲坂禹治安邑今夏縣西北五十里三都相去各二百餘里皆在冀州余亦謂晉入春秋前後四都相去亦只在平陽府百五十里之內晉孝侯號翼侯翼故城在翼城縣東南三十五里曲沃武公滅翼以一軍為晉侯史記云始都晉國晉國即其始封之曲沃他日號稱宗邑者在今聞喜縣東北去翼都約一百五十里子獻公城絳史記云獻公始都絳即今太平縣南二十五里故晉城是余親厯其地遺址宛然方悟從前說盡錯東去翼都約一百里也越七世至景公十五年遷於新田在曲沃縣南二里正有汾水澮水西北去故晉城僅五十里耳此四都者至今人民繁庶資産富饒西北諸州邑莫有過焉豈非霸國之餘烈哉鄭康成言周時九河齊桓公塞之同為一河今河間弓髙以東至平原鬲津往往有其遺處蓋據尚書中候春秋寶乾圖之文云爾蔡傳駁之謂曲防齊所禁塞河宜非桓公所為亦自尋好話頭其實葵邱五命特以約束諸侯躬自犯者多矣奚有於河惟于欽齊乘曰河至大陸趨海勢大土平自播為九禹因而疏之非禹鑿之而為九也禹後厯商周至齊桓時千五百餘年支流漸絶經流獨行其勢必然非齊桓塞八流以自廣也論最確余因思齊桓卒於襄王九年戊寅至定王五年己未甫四十二年而周譜云定王五年河徙水經注周定王五年河徙故瀆蓋下流既壅水行不快上流乃決理所宜然河之患始此矣善乎朱子有言禹治水只是從低處下手下靣之水盡殺則上靣之水漸平得之矣前謂鑿空出新不若舊說之安者尤莫甚近日碣石入海之說陽信有劉世偉者著論曰海豐縣北六十里有馬谷山一名大山髙三里周六七里疑即古之碣石為河入海處夫事無所證當求之跡跡有不明當度之理以跡而論九河故道咸屬齊鬲津等三河在縣之界而碣石不當復在他境以理而論禹之治水行所無事齊地汙下濵海以禹之智不從此入而反轉繞千里之外乃自平州而入海耶况平州地形髙此山既在九河之下又巍然獨出於勃海之上為碣石似無疑顧寧人賞其新東海公載入一統志中余曽正告之曰九河見兖州碣石則在冀州皆禹貢明文未易可移果如世偉言當移碣石為兖州之山矣古九河闊二百餘里長約四百里其為逆河之地者亦須長闊相等方外受海水之潮汐入內容河水之九𣲖注今馬谷山之旁與上何處著此一片地耶果爾當刪禹貢同為逆河四字以入于海接上又北播為九河然後可東海公不覺笑余曰無論經聊以史證之蘇秦說燕曰南有碣石之饒秦始皇三十二年之碣石使燕人盧生求羡門髙誓刻碣石門二世元年春東行郡縣李斯從到碣石刻始皇所立刻石封禪書並海上北至碣石巡遼西貨殖傳夫燕勃碣之間一都㑹也尚得謂碣石不在昔平州今昌黎等縣處耶永平府志已進呈未及正之云山西名司自太行山而山東人無解者曽與黃子鴻討論訖歎曰山東之名起于金本宋之京東東路京東西路金以都既不在汴易京為山而不知山字無著也湖廣之名起于元本宋荆湖北路荆湖南路止當沿其故稱不必如孫休分交州置廣州名以廣蓋廣字涉虛也曽問局中諸公以何謂四至何謂八到多笑而不答反以詰余余曰東至某地若干里南至某地若干里西至某地若干里北至某地若干里謂之四至東南到某地若干里西南到某地若干里西北到某地若干里東北到某地若干里此謂之八到惟杜氏通典係刻本宛然可考若元和郡縣志太平寰宇記繕寫本多訛或原有不備者矣按一統志有關隘一項下載至某鋪或某集某鎮在縣東若干里又若干里為某鋪乂若干里為某鋪達其縣界最有益或病其碎且名不雅馴者余曰昔宋紹興三十一年金主率大軍臨西采石楊林渡初奏言已犯采石而不言東西朝廷大驚次報言已到楊林而不言楊林渡莫知其在江之南北益懼求當塗厯陽人問楊林所在言楊林西采石之渡口也於是憂疑少定余謂使當日諸州所上閏年圖備載村鎮及津渡之處可一檢而知不必外訊諸人矣有碣石叢談郭造卿著者疏碣石山所在既小誤復未盡余為補正之曰前漢志右北平郡驪城縣有大碣石山後漢志遼西郡臨渝縣有碣石山文頴漢書注碣石山在遼西絫縣魏收地形志肥如縣有碣石山隋志盧龍縣有碣石山唐志平州石城縣有碣石山明一統志碣石山在昌黎縣西北二十里諸縣或省或改則今之盧龍撫寧昌黎及灤州界耳此山綿跨四地故班固曰大碣石山今人苐因天橋柱屬諸昌黎隘矣又唐志營州栁城縣有東北鎮醫巫閭山祠又東有碣石山碣石凡有四齊都賦云海旁出為渤今海自山東登州成山折而西徑寧海州福山蓬萊招逺縣又西徑萊州掖縣昌邑濰縣又西徑青州壽光樂安諸城縣北界折而西北徑濟南利津霑化海豐縣又北徑直𨽻河間鹽山滄州靜海縣東界又北至天津衛折而東徑順天寶坻豐潤縣又東徑永平灤州樂亭盧龍昌黎縣又東出山海關徑遼東寧逺廣寧衛南界折而南徑海蓋復金四衛西界又折而東徑金州南界有旅順口南與登州海口相對皆謂之渤海厯覽太史公書如河渠書同為逆河入于渤海謂永平府之渤海也封禪書四曰隂主祠三山五曰陽主祀之罘六曰月主祀之萊山皆在齊北並渤海謂登萊兩府之渤海也蘇秦列傳說齊宣王未嘗倍泰山絶清河涉渤海張守節正義曰渤海滄州也則指天津衛之海言朝鮮列傳遣樓船將軍楊僕從齊浮渤海至王險王險城名非海之在遼東而何皆渤海也奈何有臣瓚者徒知漢以渤海名郡遂狹視渤海謂禹貢河入海乃在碣石武帝元光三年河移徙東郡更注渤海禹時不注也若以太史公增禹貢原文一渤字為誤不知非誤也正謂碣石邊之渤海也或曰亦别有證乎余曰莫妙于太史公天官書中國山川東北流其維首在隴蜀尾沒于渤碣班固增其文曰尾沒于渤海碣石益復明顯是禹貢自碣石入海遷與固同出一口者也又按武帝紀元光三年春河水徙從頓邱東南流入渤海頓邱漢縣名在今大名府清豐縣其東南則今曹州濟寧州之境溝洫志元光中河決于瓠子東南注巨野通于淮泗是也至于渤海却在頓邱東北千里豈能東南流入之乎案文當於東南二字截住作句謂河水所徙之處在頓邱東南一帶而流入於海則自東北至直沽直沽今天津衛是所以地理志金城郡河關縣注云河水行塞外東北入塞內至章武入海章武元和志為魯城縣在滄州北百里西去大海九十里此河水所徙之新道非禹貢故道或曰抑别有證乎余曰莫妙於地理志魏郡鄴縣注云故大河在東北入海北入海者至右北平郡酈城之揭石山入海非章武也或曰章武亦可稱北海然而溝洫志同為逆河入于渤海與河渠書同天文志尾沒于渤海碣石益加增釋是禹河入海在碣石固與遷真同出一口者也通鑑書河水徙從頓邱東南流刪入渤海三字說見考異渤海一誤於臣瓚再誤於頴達三則余尚書古文疏證第二卷所論是亦不復削去惟就頴達疏有云安國傳同合為一大河入于渤海渤海之郡當以此海為名計渤海北距碣石五百餘里河入海處逺在碣石之南禹行碣石不得入於河蓋逺行通水之處北盡冀州之境然後南回於河而逆上也亦是誤認河從章武入海不得復至碣石謹據經文正之夾右碣石入于河安國傳禹夾行此山之右而入于河逆上也則河入海順流而下亦即在此處可知證一禹導山固在相視其源委脉絡實以治山旁諸水使皆入海而諸水合為大河果至直沽入海則至於碣石四字為衍文證二導河北播為九尾合為一不加至碣石字入於海者蒙上文也省文也安國傳所為互相備也遽以無是三字而謂河入海不在碣石何異癡人說夢證三且碣石不能入河是海島之夷以皮服來貢者僅夾碣石山畔須西上數百里而後達河經文何不見有西字以合荆州南河雍州西河之例乎蓋河口碣石斷無疑也後代言水道之可信者莫如酈道元一則曰河之入海舊在碣石今川流可導非禹瀆也再則曰碣石山在臨渝縣南大禹鑿其石右夾而納河余謂賈讓治河䇿昔大禹治水山陵當路者毁之析底柱破碣石鑿即破也酈注有本如此今人不能取徴乎此復舍神聖經文而苐指晚近流𣲖之分合水道之通塞地名之同異以立說别解可也吾未見其可與論禹迹矣又按中國山川東北流其維首在隴蜀尾沒于渤碣僅十有八字能將禹貢導岍及岐至至于碣石入于海導河積石至同為逆河入于海兩節九十一字吸取殆盡無復遺義史記昔人稱其明于山川條例得禹貢遺法兹豈惟條例且縮萬里于尺寸之間可舒三言為千百言而未有既者矣宋史河渠志元祐三年王存奏自古惟有導河塞河導河者順水勢自髙導令就下塞河者為河堤決修塞令入河身不聞幹引大河令就髙行流也於是收回回河詔書然亦不盡然者太史公不於禹貢北字下過降水之上增其文曰載之髙地乎蓋過降水至於大陸播為九河耳王橫曰禹之行河水本隨西山下東北去又曰使緣西山足乘髙地而東北入海乃無水災杜佑曰西山則太行原文有恆山二字疑衍也余因悟河行平地易散漫無力惟一邉就西山踵趾以為岸又一邊築土為堤髙數丈許載河以行方建瓴而下但折而向東北以至大陸復播為九以趨于渤碣賈讓䇿河西薄大山東薄金堤正指此誰謂金隄非禹作乎又誰謂河北有鯀堤而無禹隄乎宋李垂導河形勝書推禹故道其水勢出大伾上陽太行之間上陽樂史謂即枉人山要東則大伾上陽西則太行與賈讓所奏無異治河者當識此變處局中復有為新論者以河自直沽入海不得逺至碣石之旁後漢志不從天官書說有二一說曰滹沱􅋤易桑乾濡潞皆為大川從直沽入于海橫接大河北注之路大河豈能自河間以北繞出漁陽北平之界抵碣石而入海乎故知亦從直沽入海也余曰詳考水道惟滹沱桑乾易潞入直沽而濡水流不逺輒合易􅋤水雖長然亦至長城注易長城在新安安肅界也不自達海止當舉四水耳并及􅋤濡者非一說曰蘇轍言燕薊地髙水皆南流大河豈獨能北注不就近入直沽之海而仰從碣石之海以入乎余曰蘇子由無此言宋河渠志載蘇轍疏臣聞契丹之河自北南注以入於海蓋地形北髙此或指沽河濡水大遼水從塞外來者南入于海而言非上四水之謂余常讀漢志濁漳入清漳清漳東北至阜城入大河阜城在今阜城縣東二十里此已與禹貢漳入河處不合蓋河既徙後之新道也水經清漳入于濁漳濁漳東北過平舒縣南東入海平舒乃東平舒今霸州大城縣此又河既徙班氏以後之新道也唐人見漳能獨達海遂請以為瀆宋志神宗熙寧三年前漳變徙復入大河元志無漳金志雖有不聞其變徙明初忽入衛今且附滹沱而入海不自達海矣其變遷不常如此安知大禹時河直北注碣石之海而滹沱也桑乾也易也潞也不先入于河而河挾以入碣石乎不謂河能統川而反疑川能阻河是枝水加於經水矣不從河未徙之前求禹跡而妄意禹跡于屢徙久湮之日是漳水終古在鄴縣矣且尤可證者山海經碣石之山繩水出焉而東流注於河河果止于直沽碣石旁焉得有河碣石旁有河為海口又奚疑是不獨前所稱經證而已或曰瀕海地將不髙乎余因親至瀕海一帶兼咨土人比之腹內特髙故濬治海口亦宜倍深不然內低外髙難乎水之東注矣曽謂神禹當日智不及此而不濬深海口以任大河百川之㴞㴞東逝也哉一統志在京師輒進呈者為保定府內多載及水利有已施行者有未行者允稱有用之書余續得二事一出河汾燕閒録一出湧幢小品陸文裕深曰晋水澗行類閩越而悍濁怒號特甚雖步可越處輒起濤頭作淜湃源至髙故也夏秋間為害不細以無堰堨之具爾某行三晉諸山間嘗欲命緣水之地聚諸亂石倣閩越作灘自源而下審地髙低以為疏密則晉水皆利也有司既不暇及而晉人簡惰亦復不知所事甚為可恨閩諺云水無一㸃不為利誠然亦由其先有豪傑之士作興後來因而修舉遂成永世之業故某謂閩水之為利者盈科後進晉水之不為利者建瓴而下爾朱文肅國禎曰隄之功莫利於下鄉之田尤莫利於上鄉辛丑某南歸經磁州遍野皆有水溝深不盈二三寸濶可經尺縱橫曲折隨地各因其便輿馬可跨而過禾黍蔚然異之問輿夫水何自來遙指西山曰此泉源也又問泉源那得平流則先任知州劉徴國從泉下築隄障之髙丈許隄髙泉與俱髙因地引而下大約髙一尺可灌十里一州遂為樂土余因歎此即青烏家急脉緩受緩脉急受之法也先參議起家湖司李與朱交好朱亦曽口述手畫其事云顧寧人謂代凡三遷春秋末趙襄子所言代則今之蔚州乃古代國也漢髙帝立子恆為代王都晉陽後遷中都晉陽今太原縣中都今平遙縣皆非今代州今代州之名自隋開皇五年始固巳不知漢光武以盧芳為代王居髙栁髙栁故城在唐雲州定襄縣晉愍帝以猗盧為代王城盛樂為北都修故平城為南都拓拔圭立為代王都雲中在朔州北三百餘里後徙都平城置代尹是代尚有四不止如寧人云三遷也按江西之名有三顧寧人僅知其二謂六朝以前之稱江西者並在秦郡今六合厯陽今和州廬江今廬州府之境蓋大江自厯陽斜北下京口故有東西之名唐乾元後則以江南西道省其文曰江西乃今豫章等處是不知三國志吳主傳曹公恐江濵郡縣為權所略徴令內移民轉相驚廣陵等戶十餘萬皆東渡江江西遂虛南史文學祖皓傳大同中為江都令後拜廣陵太守侯景陷臺城皓在城中將見害乃逃歸江西百姓感其遺惠每相蔽匿是今揚州亦名江西他日以語王慈峨入其府志中亦一典證也元史河渠志至正十一年賈魯治河工畢歐陽元製河平碑以旌勞績云云先是歲庚寅河南北童謡云石人一隻眼挑動黃河天下反及魯治河果於黃陵岡得石人一眼而汝頴之妖寇乘時而起議者往往以為天下之亂皆由賈魯治河之役勞民動衆之所致殊不知元之所以亡者實基於上下因循狃於宴安之習紀綱廢弛風俗偷薄其致亂之階非一朝一夕之故所由來久矣不此之察乃獨歸咎於是役是徒以成敗論事非通論也設使賈魯不興是役天下之亂詎無從而起乎朱子不甚嫻地學又臆解字義故陳風防有鵲巢毛傳云防邑也劉昭引博物記云卭地在陳國陳縣北防亭在焉孔頴達疏云以鵲之為鳥畏人而近人非邑有樹木則鵲不應巢焉故知防是邑也此與隄防之解絶不相蒙而詩集傳乃云防人所築以捍水者然則臧氏食邑在今費縣西北六十里亦捍水者乎不特此也詩王風集傳云甫即吕也今未知其國之所在計亦不逺於申許請證以潛夫論炎帝苖胄四嶽伯夷或封于申城在南陽宛北序山之下故詩云亹亹申伯于邑于序宛西三十里有吕更證齊太公世家注徐廣曰吕在南陽宛縣西又司馬貞曰地理志申在南陽宛縣申伯之國吕亦在宛縣之西也三證酈注淯水條宛西吕城四嶽佐禹治水虞夏之際受封于吕所以括地志最可信者云故申城在鄧州南陽縣北三十里故吕城在鄧州南陽縣西四十里然則兩國相距四十八里有竒其密邇明析至此而朱子不知蓋緣誤本通典謂申在今鄧州信陽軍之境申既不確吕遂茫然宜哉晉懊儂歌云江陵去揚州三千三百里已行一千三所有二千在晉揚州刺史平吳後徙治建業為今江寧府治據明一統志相距二千七百二十五里歌不合及讀宋書州郡志江陵縣去京都水三千三百八十里故宋襄陽樂亦云江陵三千三西塞陌中央是也西塞山名在今大冶縣東此則古今路有不同非里數異也唐杭州勝果寺在鳯凰山之右僧處默詩云到江吳地盡隔岸越山多與春秋時吳越分界不合及讀㑹稽典録朱育曰漢順帝永建四年歲在己巳劉府君上書浙江之北以為吳郡㑹稽還治山隂詩蓋用此事界畫宛然非謂唐之制正爾也枚乘七發云將以八月之望與諸侯逺方交游兄弟並往觀濤乎廣陵之曲江近解者多知以曲江為浙江八月之望即俗所云潮生日濤最迅猛閣郡往觀之事然終無以為廣陵二字解案李善曰枚乘事梁孝王恐孝王反故作七發以諌之孝王薨於景帝中六年丁酉則此七作於丁酉前考爾時㑹稽郡省併入江都國是江都之所統不獨至錢塘江且逺至今建寧福州古名冶縣者其疆域如此作者本欲云江都之曲江但以二江字相犯易古地名曰廣陵唐代尚詞章兼嫻地志故李善據文勢已云赤岸當在逺方非指廣陵李太白送友人尋越中山水云濤白雪山來又云八月枚乘筆孟浩然初下浙江舟中口號云八月觀潮罷僧皎然送劉司法之越州云八月欲觀濤至昌黎謂李翺觀濤江翺亦自言暮宿濤江皆錢塘江也其疑似而誤翻在南齊書州郡志山謙之南徐州記耳大抵讀古者須考作之時日談地者須考代有沿革方克決其所由然余實因讀班氏自注發寤於中以告吾友黃俞邰俞邰慫慂宜立草一說以曉學者忽忽十有三年病懶未就兹又因竹垞文類與越闓書辨僅得其半故特為補之并為正之云爾按禹貢沿于江海達于淮泗揚州貢道由江順流入海由海逆流入淮入泗是禹時江淮决不相通明矣其通之者在哀九年吳城䢴溝通江淮杜注于䢴江築城穿溝東北通射陽湖西北至末口入淮以通糧道然亦是引江入淮與孟子排淮入江水道尚相反隋開皇七年將伐陳韓擒虎于揚州開山陽瀆以通漕大業元年以䢴溝水道屈曲發民濬治自山陽至揚子入江渠廣四十步孟子之言蓋至是始驗所以唐白居易詞汴水流泗水流流到瓜州古渡頭是也近河臣疏云孟子大賢去禹僅千餘年必不為無據之言况舊迹至今可考以盱眙縣治東二十里有聖人山山有禹王河一名古河土人咸稱大禹治水導淮入江故道為據余考之明一統志盱眙縣山川有新河在彭城鄉宋發運使蔣之竒開浚以避淮流之險猶未詳及讀宋史蔣之竒列傳元豐六年之竒擢江淮荆浙發運副使請鑿龜山左肘至洪澤為新河以避淮險自是無覆溺之患詔增二秩升發運使河渠志元豐六年正月戊辰開龜山運河二月乙未告成長五十七里濶十五丈深一丈五尺初發運使許元自淮隂開新河屬之洪澤避長淮之險凡四十九里久而淺澀熙寧四年皮公弼請復濬治起十一月壬寅盡明年正月丁酉而畢人便之至是發運使羅拯復欲自洪澤而上鑿龜山裏河以達于淮帝深然之㑹發運二字當作副使蔣之竒入對建言上有清汴下有洪澤而風浪之險止百里淮邇歲溺公私之載不可計凡諸道轉輸涉湖行江已數千里而覆敗於此百里間良為可惜宜自龜山蛇浦下屬洪澤鑿左肋為復河取淮為源不置堰閘可免風濤覆溺之患帝遣都水監丞陳祐甫經度祐甫言往年田棐任淮南提刑常言開河之利其後淮隂至洪澤竟開新河獨洪澤以上未克興役今既不用閘蓄水惟隨淮靣髙下開深河底引淮通流形勢為便但工費浩大帝曰費雖大利亦溥矣祐甫曰異時淮中歲失百七十艘若捐數年所損之費足濟此役帝曰捐費尚小如人命何乃調夫十萬開治既成命之竒撰記刻石龜山後建中靖國初之竒同知樞密院奏淮水浸淫衝刷堤岸漸成墊缺請下發運司及時修築自是歲以為常乃知疏所謂聖人山者即盱眙縣東北龜山也下有禹王河即蔣之竒元豐六年所開龜山運河也一名古河又即一統志所載之新河豈可以土俗無稽之言而據為金條玉律哉又豈可以孟子一時之誤記而謂禹貢為不足信哉曩嘗聞諸先輩言江髙而淮下禹必自淮浦入海者正行其所無事以下為趨也今欲從瓜埠入江無論謝家鍾家曽家岡及分水嶺為所畫斷勢必燒山鑿道且江受淮水而地形實髙淮水趨江而形實窊下奈何疏又云循沿河形細閲有現在河形淤涸成田者有溪流溝澗寬窄不一者有山岡平陸髙低不等者疏巳自言有山岡禹時導淮入江不虞此山岡阻塞乎抑此山岡乃陡生於禹治水之後乎自相矛盾莫此為甚至淮徑入江不復濟淮揚運道不數年而國計民生交受其病有不可言者則人所共曉不復贅云郡國志云凡縣名先書者郡所治也此惟東漢時則然而西漢不爾然亦有郡國下所書之第一縣即為郡國之治者若南郡之江陵縣是也南郡先書江陵縣縣即郡治以郊祀志知之天水郡先書平襄縣縣即郡治以五行志知之南陽郡先書宛縣縣即郡治以地理志翟方進及王莽傳知之潁川郡先書陽翟縣縣古為韓都今為郡治廣陽國髙帝燕國先書薊縣縣古為召公都今為國治俱以地理志知之楚國先書彭城縣縣即國治以楚元王交及龔勝傳知之趙國先書邯鄲縣縣即國治以趙幽王友及趙敬肅王彭祖傳知之齊郡先書臨淄縣縣即郡治以齊悼惠王子及主父偃傳知之河南郡先書雒陽縣縣即郡治以伍被及賈誼及酷吏游俠傳知之廣陵國景帝四年更名江都先書廣陵縣縣即國治以江都易王非及廣陵厲王胥傳知之山陽郡武帝天漢四年更為昌邑國先書昌邑縣縣即國治以昌邑哀王髆傳知之㑹稽郡先書吳縣縣即郡志以嚴助朱買臣及梅福傳知之九江郡先書夀春縣縣即郡治以梅福傳知之東海郡先書郯縣縣即郡治以于定國及尹翁歸傳知之沛郡先書相縣縣即郡治以薛廣德傳知之蜀郡先書成都縣縣即郡治以王貢兩龔鮑傳序及循吏傳知之上黨郡先書長子縣縣即郡治以鮑宣傳知之東郡先書濮陽縣縣即郡治以王尊及翟方進傳知之東平國先書無鹽縣縣即國治以東平思王宇及翟方進傳知之魯國先書魯縣縣即國治以孔光傳知之巴郡先書江州縣縣即郡治以揚雄傳注知之涿郡先書涿縣縣即郡治以酷吏傳知之犍為郡先書僰道縣牂柯郡先書故且蘭縣越嶲郡先書卭都縣益州郡先書滇池縣縣俱為郡治以西南夷傳知之至梁國先書碭縣却不為治治于睢陽縣以梁孝王武傳知之蓋吳越七國反梁王城守睢陽後廣睢陽城七十里大治宫室王國以內史治其民而梁內史韓安國從王於睢陽非以睢陽為治而何左馮翊先書髙陵縣亦不為治治長安城中以趙廣漢傳及景帝紀注百官公卿表注知之而韓延壽傳云延壽為左馮翊出行縣至髙陵證最分明汝南郡先書平輿縣却不為治治上蔡縣以翟方進傳知之其傳首叙次與賈誼傳正同㑹具以告友人友人以為聞所未聞遍考顧寧人顧景范黃子鴻撰著兩漢並同都未解此此而不解何以談地理或以髙帝紀南陽守齮戰敗于犨東走保城守宛宛為南陽郡治陳勝傳秦嘉等將兵圍東海守于郯郯為東海郡治項籍傳初起兵吳吳為㑹稽郡守治此三者何不引而引嚴助朱買臣等傳為何余曰此秦制非所論於漢也抑知秦與漢有不同乎如梁國在秦為碭郡治碭縣故沛公軍碭遂以沛公為碭郡長長即守也至漢改為梁國便治睢陽河南郡在秦為三川郡治滎陽縣故李由為三川守守滎陽宋白以為是時治此至漢改為河南郡便治雒陽安得謂秦制如此沿而下之漢與之同又安得以東漢制如此溯而上之必西漢已然與或又以郡國一百三據上所考先書縣不為治者僅三而為治者二十有六安知餘七十四不復同余曰生千載下而仰論千載上事茍非典籍具存證佐明白固不可憑私臆度也譬如有物十焉吾數其九悉同而其一未數者安知不忽異郡國治所亦爾且吾之著書也寧質毋夸寧拘毋達寧闕人之所共信毋徇巳之所獨疑此平生志也漢書注引茂陵中書有云象郡治臨塵去長安萬七千五百里珠崖郡治瞫都去長安七千三百二十四里沈黎郡治莋都去長安三千三百三十五里領縣二十一臨屯郡治東暆縣去長安六千一百三十八里十五縣真畨郡治霅縣去長安七千六百四十里十五縣治所厯厯今不備知百三郡國之治者以此書亡也噫放失舊聞豈獨地理一事為然哉唐人地理之學的有源委去西漢未遙元和志曰什賁故城在夏州朔方縣理北案理即治字元和志避唐髙宗諱也即漢朔方縣之故城漢武帝元朔二年收河南地置朔方郡使校尉蘇建築則朔方郡治朔方縣縣居班志之第二其第一縣為三封固注云元狩三年城也勝州榆林縣本漢沙南縣地漢雲中郡故城在縣東北四十里則雲中郡治沙南縣縣居班志之第八長垣故城一名倉垣城在汴州開封縣北二十里漢陳留太守所理縣居班志之第十四漢景帝二年以前濟南郡為國時理厯城縣縣居班志之第十一淄州髙宛縣本漢舊縣作宛漢千乘國故城在縣北二十五里則千乘郡治髙宛縣縣居班志之第十四漢中郡自漢已還多理南鄭髙帝都之縣居班志之第三故漢所理江夏郡前書多言在安陸今安州雲夢縣東南四里有古城縣居班志之第八漢改秦黔中為武陵郡移理義陵今辰州溆浦縣是縣居班志之第十即昭帝時犍為郡自僰道移理武陽今眉州彭山縣西北五里有犍為故城猶厯可考縣居班志之第三其不即治第一縣於兹益驗其不與東漢郡治相同於兹又驗即治第一縣則東郡理濮陽縣東萊郡理掖縣膠東國理即墨縣西河郡理富昌縣常山郡理元氏縣丹陽郡理宛陵縣餘與下酈注同者不録又按元和志容有誤如以汝南郡治平輿河內郡治懷自相抵牾如以朔方郡治三封陳留郡治陳留之類酈道元則近而加核矣水經注曰漢武帝元朔二年開朔方郡治窳渾縣縣居班志之第六又云元朔二年取河南地為朔方郡築朔方城王莽曰武符似又以此城為郡治縣居班志之第二漢髙帝元年為殷國二年為河內郡治野王縣縣居班志之第十三唐縣中山郡治漢髙祖立縣居班志之第四無終縣秦置右北平郡治田疇傳舊北平郡治在平岡漢李廣為郡於此縣居班志之第二漢武帝元鼎二年改為天水郡似指隴西郡言治上邽縣縣居班志之第二上蔡縣漢髙祖四年置汝南郡居班志之第二十四其第一縣平輿云東漢汝南郡治睢陽縣漢髙祖五年為梁國縣居班志之第八其第一縣碭曰秦立碭郡秦始皇即句踐故都為琅邪郡漢因之班志於琅邪縣下注句踐嘗治此則琅邪郡治琅邪縣縣居班志之第十二秦惠王置漢中郡南鄭縣即郡治漢因之縣居班志之第三其第一縣西城則云屬縣也漢武帝蜀郡初治廣漢之雒縣元鼎二年始徙治成都雒縣居班志之第四漢髙祖六年分巴蜀治廣漢郡於乘鄉王莽曰廣信即廣漢縣縣居班志之第六漢髙帝六年置江夏郡治安陸縣縣居班志之第八漢武帝元鼎六年置合浦郡治合浦縣縣居班志之第三漢武帝元鼎六年開日南郡治西捲縣縣居班志之第四泉陵縣零陵郡治漢武帝元鼎六年分置縣縣居班志之第八漢武帝太初四年以休屠王地置武威縣為武威郡縣居班志之第三而即治書先第一縣者則隴西郡之狄道縣也金城郡之允吾縣也安定郡之髙平縣也五原郡之九原縣也雁門郡之善無縣也上郡之膚施縣也𢎞農郡之𢎞農縣也千乘郡之千乘縣也平原郡之平原縣也太原郡之晉陽縣也河東郡之安邑縣也濟隂郡之定陶縣也濟南郡之東平陵縣也山陽郡之昌邑縣也臨淮郡之徐縣也清河郡之清陽縣也魏郡之鄴縣也趙國之邯鄲縣也巨鹿郡之巨鹿縣也信都國之信都縣也河間國之樂成縣也涿郡之涿縣也上谷郡之沮陽縣也廣陽國之薊縣也漁陽郡之漁陽縣也遼東郡之襄平縣也𤣥菟郡之髙句驪縣也樂浪郡之朝鮮縣也河南郡之雒陽縣也武都郡之武都縣也潁川郡之陽翟縣也淮陽國之陳縣也楚國之彭城縣也沛郡之相縣也泰山郡之奉髙縣也東平國之無鹽縣也淄川國之劇縣也齊郡之臨淄縣也髙密國之髙密縣也九江郡之壽春邑縣也廣陵國之廣陵縣也南陽郡之宛縣也六安國之六安縣也蜀郡之成都縣也巴郡之江州縣也南郡之江陵縣也越嶲郡之卭都縣也益州郡之滇池縣也牂柯郡之故且蘭縣也鬱林郡之布山縣也九真郡之胥浦縣也交址郡之羸􅖮縣也蒼梧郡之廣信縣也南海郡之番禺縣也長沙國之臨湘縣也桂陽郡之彬縣也豫章郡之南昌縣也至云舊朔方郡治臨戎舊定襄郡治善無故河內郡治懷舊代郡治髙栁故天水郡治冀故琅邪郡治開陽並指東漢而言驗諸司馬彪志而一一相同矣舊唐書地理志亦及漢郡治所除誤者復者不録録其三曰渤海郡即治浮陽縣張掖郡即治觻得縣酒泉郡即治祿福縣云余告徐司寇健菴曰郡縣始自秦作輿地表自當以秦縣名之可考者實之不獨以郡曰子能知秦四十郡所治之縣乎曰雖不能盡知要可考者秦內史則治咸陽縣也漢更名渭城漢內史治長安城中三川郡治雒陽縣或曰滎陽潁川郡治陽翟縣南陽郡治宛縣邯鄲郡治邯鄲縣巨鹿郡治巨鹿縣上黨郡治長子縣太原郡治晉陽縣雲中郡治逺服縣漢曰雲中或曰王莽始更漢雲中縣為逺服然焉知莽非本秦舊乎九原郡治九原縣河東郡治安邑縣東郡治濮陽縣碭郡治碭縣一曰睢陽上郡治膚施縣上谷郡治沮陽縣漁陽郡治漁陽縣代郡治髙栁縣與東漢同與西漢異觀西漢西部都尉治髙栁不為郡守治可知右北平郡治無終縣遼西郡治陽樂縣遼東郡治襄平縣南郡治江陵縣漢中郡治南鄭縣黔中郡治沅陵縣故郡城在唐辰州沅陵縣西二十里長沙郡治青陽縣漢曰臨湘薛郡治魯縣泗水郡治沛縣漢更名沛郡更治相九江郡治夀春縣鄣郡治鄣縣漢以郡去而名其縣曰故鄣丹陽郡所領唐湖州長城縣西八十里有鄣郡故城㑹稽郡治吳縣齊郡治臨淄縣琅邪郡治琅邪縣巴郡治江州縣蜀郡治成都縣元和志其理本在青衣閩中郡治回浦縣東漢更名章安南海郡治番禺縣象郡治象林縣漢更名日南郡便治西捲不可考者雁門隴西北地桂林郡治耳曰奈四省已進呈不及追補何余曰李吉甫元和六年復相八年上元和郡縣圖志內載巳所嘗建白者四事詔更置宥州則在九年五月計此工成又須兩三月是距其十月薨相位日無幾書進御彌久猶不憚繕寫增續古大臣之用心不以小嫌而掩國計宋司馬公成通鑑後知有抵牾終以未請㫖不敢更此亦足見文網之密議論之苛宋甚於唐矣張守節云蔚州飛狐縣北百五十里有秦漢故郡飛狐漢廣昌縣地則漢代郡治廣昌縣秦亦爾上云治髙栁者恐誤胡身之注通鑑地理號稱佳者然亦不知西漢第一縣非必郡治如云班志襄平縣遼東郡治所猶可而云漢中郡治西城縣豈可乎又云漢五原之郡即秦九原郡治稒陽縣不知班志明言東部都尉治稒陽郡太守不與都尉同一治所齊孝王孫澤謀發兵臨淄殺青州刺史雋不疑此自青州刺史適在臨淄非必治所胡氏乃云臨淄青州刺史治豈不知西漢刺史稱傳車居無常治不比東漢者乎又云龔勝楚人史逸其所居縣勝本傳首言楚人中言勝既歸鄉里又言王莽使者與郡太守縣長吏等入勝里末即補出勝居彭城廉里文字針線密如此是不獨所居縣且標名其里胡氏胡未詳郡國志不純稱司馬彪曰間稱劉昭不知昭僅作細注耳須各有析别至陽僕從齊浮渤海以討朝鮮云僕浮渤海蓋自青萊以北幽平以南皆濵于海其海通謂之渤海非指渤海郡而言也斯見解出同時王伯厚右矣王伯厚嘗仕吳郡見長洲宰扁其圃曰茂苑蓋取吳都賦中語伯厚告之曰長洲非此地也吳王濞都廣陵漢郡國志廣陵郡東陽縣有長洲澤吳王濞太倉在此東陽今盱眙縣此地長洲名縣始於唐武后時余謂是巳但未及所以名長洲者為何案萬歲通天元年析吳縣置長洲蓋取越絶書吳越春秋走犬長洲以名非枚乘所說長洲之苑者又漢王莽傳臨淮瓜田儀等為盜賊依阻㑹稽長洲亦指在蘇州者言非東陽縣也果屬東陽不得冠以㑹稽元和志苑在長洲縣西南七十里吳王闔廬游獵處又一長洲苑矣山陽漢射陽縣地射陽故城章懷太子賢曰在今楚州安宜縣東應劭注地理志在射水之陽張晏注廣陵厲王胥傳射陂下曰射水之陂在射陽縣終竟不知今何者為射水近讀寶應縣志白水塘在縣志西八十五里舊名白水陂一曰射陂遂躍然曰此其為射水乎城正在射水北湖亦在射水北明一統志遽以射陽湖即廣陵王胥之射陂大非又思其地素號土膏當廣陵王時尚未經耕墾故相勝之名為草田奏奪之以賦貧民魏鄧艾於此屯田積穀以制吳唐證聖長慶中兩皆開鑿之古今情狀頗不相逺云寶應邑人朱曰藩詩山陽濁水不可白射陂草田那得青竟認作清濁之濁草木之草詞人趁筆之語固無庸苛論耳漢射陽縣髙帝以封項纒者惠帝三年國絶與楚元王交都彭城王三十六縣者不相屬自宋建炎來城中即有楚元王廟頗著靈異未詳所始楚州淮隂郡唐隸淮南道非江南也武后垂拱四年狄仁傑為江南道巡撫大司奏焚淫祠留有伍員廟廟自當在吳越間明一統志以為城外英烈王廟即是且改江南為江淮殊非漢地節四年封長安男子張章為博成侯功臣表注曰淮隂蓋博成者淮隂之鄉名也當時此地一鄉至有戶三千九百一十三較之髙帝歎曲逆為壯縣僅五千餘戶者不見承平久戶口之滋殖乎曹操拜陳登為廣陵太守時治射陽孫亮拜吳穰為廣陵太守即治廣陵但不知中間孫權為吳王及僭位時皆孫韶為廣陵太守治於何所而史稱韶為邉將常逺斥候魏淮南濵江屯候皆徹兵逺徙徐泗江淮之地不居者各數百里乃知此地又曽為甌脫嗚呼即此而論古今之變豈勝道哉山陽縣西南四十里曰髙家堰堰不見史而僅見郡志為漢建安五年廣陵太守陳登所築余因考三國志注登曽任典農校尉乃巡土田之宜盡鑿溉之利蓋精於水利者當時廣陵太守江表傳以為治射陽則堰尤其密邇為登築復奚疑獨怪自建安五年至明永樂平江伯陳瑄治時凡一千二百十五六年中間並無有人云及髙家堰者豈湮廢無迹與抑堰止受洪澤諸湖黃淮尚未合而不聞其有潰決之患與及讀宋史楚州司戶參軍李孟傳加葺境內徐績墓修復陳公塘有灌溉之利陳公塘即今髙堰也堰固不乏修治苐史文不備耳同時真州東有陳公塘一名愛敬陂漕臣錢冲之修復門下李道傳為作記何一時而並舉與豫於此别自有感矣史稱陳元龍才兼文武志在濟民其時吳寇壓境蓋岌岌矣乃能興屯彊兵保障江淮一南一北水利永賴今平江伯既有專祠矣吾以上當冠以元龍下當嗣以潘季馴為三公合祀蓋皆勤於髙堰者或亦此地食安瀾之福者所宜動心也與寶應縣志載邑人土田議曰竊見直隸各布政司起科則例有大地小地上中下之殊有一二等至六七等三四則至數十則之别不但各司不同即一司之中各府各州各縣亦多互異蓋地形有髙下平陂土性有沙鹵肥瘠古人則壤成賦固不强之使同也但賦役全書內將各則田地注明折數者固多而遺漏未注者亦復不少某江南揚州人即以揚屬論江都之田一萬七千餘頃額徴銀五萬餘兩全書幸注明折數矣若髙郵田二萬五千餘頃額徴銀四萬一千餘兩泰州田九千餘頃額徴銀四萬四千餘兩非泰州之田僅髙郵三分之一非泰州之賦重於髙郵三倍也蓋泰州大地而髙郵小地也又如興化田二萬四千餘頃額徴銀二萬八千餘兩寶應田二千餘頃額徴銀二萬餘兩非寶應之田僅興化十分之一非寶應之賦重於興化十倍也蓋寶應大地而興化小地也小地則一畝為一畝大地則數畝折一畝一畝為一畝則賦輕數畝折一畝則賦重而全書之內皆未經注明也其未注明不獨某一鄉為然竊謂錢糧欵項不可不簡而田畝大小尤不可不明故名曰簡明新書愚讀至此而不覺有感於吾邑近事也山陽原額制田一萬零八百四十二頃八十一畝五分三釐六毫六絲一忽今折時田四萬六千頃刋諸易知由單者班班可考崇禎及順治間皆然秪緣賦役全書偶遺今折時田四萬六千頃九字而河隄使者以為山陽田有隱漏也丈量議起將奪民田四之三以入官勢甚􅍅民執兩易知由單以爭弗省也賴特奉嚴綸方行停止豫上考魏襄王時史起曰魏氏之行田也以百畝鄴獨二百畝是田惡也此即折數也周禮大司徒不易之地家百畝一易之地家二百畝再易之地家三百畝鄭司農注不易之地歲種之地美故家百畝一易之地休一歲乃復種地薄故家二百畝再易之地休二歲乃復種地又薄故家三百畝如此則民授田有多寡而所獲則無不齊此亦即折數也然則折田之制由來尚矣後居洞庭山中討論直隸真定廣平之志而後益曉然於今制折田之故蓋明初新罹兵燹地悉拋荒太祖有儘力開墾永不起科之令由是太平日久田日加闢每多無糧而有糧者苦其不均也請行清丈又并汙下鹻薄磽瘠本無糧者一概丈出故原額制田者明初洪武之定數不容增損名曰大地是也今折時田者屢次丈量之實數浮於故額名曰小地是也當時良有司恐畝數增多取駭於上而貽害於民乃以大畝該小畝取合原額之數此後上行造報則用大地以投黃册下行征𣲖則用小地以圖均平是以各縣大地有小地一畝八分以上折一畝者有二畝以上折一畝者有三畝以上折一畝者有七畝以上折一畝者有八畝以上折一畝者折畝之少者其地猶中中而折畝之多者其地殊低薄又各合一縣之丈地投一縣之原額以攤一縣之原糧而賦役由之以出故各縣地之折算雖有多寡而賦之分𣲖則無移易宜無不均也山陽田之折也亦若是而已矣說者謂起天啓間孫令肇興通行均丈以四畝折一畝私為惠於邑民不知孫北人也亦舉向來北方之例而行之議其概折無差等則可議其隱田損上而益下豈可哉且清文較他處最晚而民食均徭之惠也亦最淺豈忍復有所更變哉或曰如是則山陽之賦最輕豫又以為不然常徑過保定府新城縣其土田甲天下古所謂督亢地至今禾稼樹藝最勝而田賦最輕合計夏稅秋糧及草每畝徴銀五釐五毫足矣以山陽視之值米價賤尚一倍有餘安在其為最輕也且山陽産之腴者水旱咸登不足十分中之一他若有糧而田荒或永沉水底者不可勝數今不于此等議蠲議减而偏思所以奪其産是與于不仁之甚者也嗚呼果報之說雖儒者不道然林機議緩蜀賑禍至滅門馬默奏除投海天賜兒女王安石議復肉刑父子冥謫王僕射請貸飢夫神報相位布在傳記厯厯不誣漢武帝之橫征危而不至亡祗在田賦不加明思宗之勤朴卒無補於危亡則在屢加田賦此誠古今治亂之大關具以淮揚兩府折田之數告徐司寇健菴令纂入一統志中公曰是吾心也因記之徐司寇健菴問余子知蘇松二府糧重之故乎余曰蓋嘗聞其略因以日知録所載考一篇示余其辭曰官田自漢以來有之而宋紹興以後亦嘗詔鬻之矣開禧三年誅韓托胄明年置安邊所凡托胄與其他權幸沒入之田及圍田湖田之在官者皆隸焉輸米七十二萬二千七百斛有竒錢一百三十一萬五千緡有竒而已景定四年殿中侍御史陳堯道右正言曹孝慶監察御史虞虙張晞顔等言乞依祖宗限田議自兩浙江東西官民戶踰限之田抽三分之一買充公田得一千萬畝之田則歲有六七萬斛之入丞相賈似道主其議行之始於浙西六郡平江江隂安吉嘉興常州鎮江凡田畝起租滿石者豫二百貫以次遞減有司以買田多為功皆繆以七八斗為石其後田少與磽瘠虧租與佃人負租而逃者率取償田主六郡之民多破家矣而平江之田獨多似道傳包恢知平江督買田至以肉刑從事元之有天下也此田皆别領於官松江府志言元時苖稅公田外復有江淮財賦都總管府領故宋后妃田以供太后江浙財賦府領籍沒朱清張瑄田以供中宫稻田提領所領籍沒朱國珍管明田以賜丞相托克托撥賜莊領宋親王及新籍明慶妙行二寺等田以賜影堂寺院諸王近臣又有括入白雲宗僧田皆不係州縣元額而元史所記賜田大臣如拜珠雅克特穆爾等諸王如郯王徹辰圖等公主如魯國大長公主寺院如集慶萬夀二寺無不以平江田而平江之官田又多至張士誠據吳之日其所署平章太尉等官皆出于負販小人無不志在良田美宅一時買獻之産遍於平江而一入版圖亦按其租簿沒入之巳而富民沈萬三等又多以事被籍是時改平江曰蘇州而蘇州之官田多而益多故宣德七年六月戊子知府况鍾所奏之數長洲等七縣秋糧二百七十七萬九千餘石其中民糧止一十五萬三千一百七十餘石官糧二百六十二萬五千九百三十餘石是一府之地土無慮皆官田而民田不過十五分之一也且夫民田僅以五升起科而官田之一石者奉詔减其什之三而猶為七斗是則民間之田一入於官而一畝之糧化為十四矣此固其積重難返之勢始於景定訖於洪武而徴科之額十倍於紹熙以前者也於是巡撫周忱有均耗之法有改𣲖金花官布之法以寬官佃而租額之重則一定而不可改若夫官田之農具車牛其始皆給於官而歲輸其稅浸久不可問而其稅復𣲖之於田然而官田官之田也國家所有而耕者猶人家之佃户也民田民自有之田也各為一册而徴之猶夫金史所為官田曰租私田曰稅而未嘗併也相沿日久版籍訛脫疆界莫尋村鄙之氓未嘗見册買賣過割之際往往以官作民而里胥之飛灑移換者又百出而不可䆒所謂官田者非昔之官田矣乃至訟端無窮而賦不理於是嘉定二十六年嘉興知府趙灜創議田不分官民稅不分等則一切以三斗起徵蘇松常三府從而效之自官田之七斗六斗下至民田之五升通為一則而州縣之額各視其所有官田之多少輕重為凖多者長洲至畝科三斗七升少者太倉畝科二斗九升矣國家失纍代之公田而小民乃代官佃納無涯之租賦事之不平莫甚於此然而為此說者亦窮於勢之無可奈何而當日之士大夫亦皆帖然而無異論亦以治如亂絲不得守二三百年紙上之虛科而使斯人之害如水益深而不可救也抑嘗論之自三代以下田得買賣而所謂業主者即連陌跨阡不過本其錙銖之直而直之髙下則又以時為之地力之盈虛人事之贏絀率數十年而一變奈之何一入於官而遂如山河界域之不可動也且景定之君臣其買此田者不過豫以告牒㑹子虛名不售之物逼而奪之以至彗出民愁而自亡其國四百餘年之後推本重賦之由則猶其遺禍也而况於沒人之田本無其直者乎至於今日佃非昔日之佃而主亦非昔日之主則夫官田者亦將與册籍而俱銷共車牛而皆盡矣猶執官租之說以求之固巳不可行而欲一切改從民田以復五升之額即又駭於衆而損於國欲如古者咸則三壤謂宜遣使案行吳中逐縣清丈定其肥瘠髙下為三等上田科二斗中田一斗五升下田一斗山塘塗蕩以升以合計者附於册後而概謂之曰民田惟學田屯田乃謂之官田則民樂業而賦易完視之紹熙以前猶五六倍也捐不可得之虛計而非損上也立百世之永利而非變古也使唐宋兩太宗當此朝聞而夕行之矣余謂何必兩太宗明宣宗蓋嘗有意於此矣實録載其五年詔减官田舊額糧七年又申命减免不許有司故違但上壓於祖制之不逺下復有行在戶部之戞戞焉不克充其仁心成其仁政迄今誦其詩曰官租頗繁重在昔蓋有因而此服田者本皆貧下民殷念惻豫懷故迹安得循下詔减十三行之四方均先王視萬姓有若父子親嗚呼百世而下猶令人感激涕零也潛邱劄記卷二
