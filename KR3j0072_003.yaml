body:
  text: 潛邱劄記卷三山陽閻若璩撰史記索隱曰崔浩云勃旁跌也旁跌出者橫在濟北故齊都賦云海旁出為勃名曰勃海郡分野之説古人每詳言之周禮保章之職既難考論而見於左氏內外傳者猶可類推也武王克商歲在鶉火故伶州鳩曰歲之所在我周之分野也則鶉火為周分矣晉文即位嵗受實沈故董因曰晉人是居則實沈為晉分矣襄二十八年歲淫元枵禍衝於鳥尾周楚惡之則鶉尾為楚分矣昭十七年星見大辰梓慎知宋鄭之災曰宋大辰之虛也則大火為宋分矣獨其説有可疑者星紀北而吳越南井鬼南而秦居西虛危在北齊表東海降婁屬西魯宅曲阜或又以受封之始歲星所在為説然有絶而復續者封日既異前星又豈可據乎夫春秋戰國地域變遷三晉未分晉當何區秦拔西河魏當何屬周未東遷何故已直鶉火陳滅於楚何自而入韓分且中國幾何蠻夷戎狄豈日星所不臨哉天道在西北而晉不害越得歲而吳受其凶皆以所在言之也然豕韋實衛晉何以吉吳越同野吳何以凶衛既水屬何故與宋鄭同火禆竈先知之顓頊之虛薑氏任氏實守其祀是又齊薛之分矣此皆不可曉者前哲要自有見也春秋隱公九年冬公會齊侯于防杜注防魯地在琅邪縣東南十年六月辛巳取防注髙平昌邑縣西南有西防城宋邑鄭取以歸於我莊公七年春夫人薑氏會齊侯于防注防魯地二十有九年冬十有二月城諸及防注諸防皆魯邑諸今域陽縣僖公十有四年夏六月季姬及鄫子遇于防使鄫子來朝注鄫國今琅邪鄫縣鄭樵好説中原山川後識者見之云全不是東匯澤為彭蠡鄭樵以為多此一句朱子取之云禹治水時想亦不曽遍歷天下如荆州乃三苖之國不成禹一一皆到往往是使官屬去彼相視其山川具其圖説以歸然後作此一書爾故今禹貢所載南方山川多與今地靣上所有不同趙順孫孟子纂疏曰滕國在漢沛郡公邱縣東南薛國即漢魯國薛縣與滕相密邇密國在今寧州阮國在今涇州共阮地今有共池侵阮徂共蓋侵阮直至共之地也方十里者以開方法計之為九百夫方百里者以開法計之為九萬夫傅寅同叔禹貢集解曰禹之治水皆自下而上曰治水者必使其下能容而有餘易泄而無礙然後可以安受上流而不至於衝激以生怒又曰治其最下而速其行通其旁流而使其中無停積之患則河之大體無足憂矣蔣鳴玉曰川西皆岷岷北流為洮入黃河南流入川為大江此知岷峩總是一山只橫障西南二處為異耳今江水果隨岷峩至嘉睂直下中間如嶲州之大渡沫水夾江之青衣犍為之漢水無不湊集至嘉定為一都聚合之禹貢岷山導江一語地勢愜合漢水記考趙氏德曰轉附作轉鮒屬萊州張方平曰國家都陳留當四通五達之道非若雍洛有山川足恃倚重兵以立國耳後蒙古取襄鄧入漢濟江長驅南下多用郝經䇿得宋之奏議周知其形勝要害與其守禦之䇿用其所保反而攻之我無借箸聚米之勞而彼之地圖兵略皆轉而授於我矣此亦後事之師不可以不戒也宋史地理志楚州淮隂縣嘉定七年徙治八里莊程大昌曰東崤至西崤三十五里皆在秦關之東漢關之西隋大業改漢津縣曰漢陽寰宇記云以在漢水之南章山之陽故名雲梯關海口濶處凡十四五里或七八里安東而上大約二三里此即禹貢以來淮水入海之道也説文云陶再成邱也在濟隂夏書曰東至于陶邱陶邱有堯城堯嘗所居故堯號陶唐氏元史地理志元起朔漠併西域平西夏滅女真臣髙麗定南詔遂下江南而天下為一故其地北踰隂山西極流沙東盡遼左南越海表蓋漢東西九千三百二里南北一萬三千三百六十八里唐東西九千五百一十一里南北一萬六千九百一十八里元東南所至不下漢唐西北則過之有難以里數限者矣臨川朱思本曰大概河源東北流所厯皆西畨地至蘭州凡四千五百餘里始入中國又東北流至邊外地凡二千五百餘里始入河東境內又南流至河中凡一千八百餘里通計九千餘里郭璞注山經泰陸之水曰大陸水今巨鹿北廣平澤即其水郭氏注岷山為大江所出崍山為南江所出崌山為北江所出山海經曰岷三江首又曰大江出汶山北江出曼山南江出髙山郭注今江出汶山郡升遷縣岷山至廣陵郡入海汶山即岷山字異義同見史記夏本紀郭氏曰白水在梓潼白水縣源從臨洮之西西傾山來經沓中東流通隂平至漢壽縣入潛禹貢之水有散見於一州而復總見於導水條者渭與洛是也所以陳氏櫟于導渭自鳥鼠同穴曰灃涇漆沮皆入渭渭入河東會于灃即灃水攸同也東會于涇即涇屬於渭汭也東過漆沮即漆沮既從也灃涇大與渭並故曰會既得灃涇渭愈大漆沮皆小故曰過前分言於雍而自源徂流言于此也新安陳氏于導洛自熊耳曰此即豫州伊洛瀍澗之源流也澗瀍伊皆入洛而洛入河耳又有散見上文各州而復總結於末者九州攸同六句是也所以陳氏大猷曰禹貢書法簡嚴經于每州惟舉一隅至此總結之以見九州之所同如宅土惟言于兖雍故此以四隩既宅總之旅山惟言於梁雍故此以九山刋旅總之經所載之川澤雖多然九州之川澤不止是也故以九州九澤之滌陂總之經雖各載達河之道而四方之趨帝都者不止是也故以四海會同總之蔡傳豫州去帝都最近豫之東境徑自入河豫之西境則浮于洛而後至河也案豫州東境并無河惟北境有之當改東境作北境以上與荆州至于南河合豫州本傳北距大河合蔡氏每自忘前語何邪書傳會選既修太原下引朱子曰從太原至嶽陽皆修之也他所舉山川皆先地後績者覩成功而言也壺口梁岐太原皆先績後地者本用功之始而言也豈治有難易歟恆衛既從又引東萊吕氏曰言水土平於田賦之前者其害大當先治之也言于田賦之後者其害小徐治之也並當採入集傳張説郭震行狀云初安西南有毒河源逺在蔥嶺西北河岸百步人畜踏之者輒死公威振西域所向無不從者因驗圖經知其源率兵三萬人厯于闐康居大食等國所過之國令供資糧仍署其國王為左右總管率兵前進北至蔥嶺牙帳前十二國王兵百餘萬其河源上有大樹髙千餘尺垂隂數頃大軍至日有黃龍繞樹以口吐毒氣而拒官軍三軍悉覩焉公手書操檄文令左拾遺張宣抗聲讀之畢黃龍解樹而下公率諸軍誅之數日方倒聚而焚焉河源且絶數十里內悉為良田王少伯出塞詩但使龍城飛將在遍閲文苑英華凡十數本並同惟宋槧本王荆公百家詩選龍作盧或者頗以為疑來質余余曰盧是也李廣為右北平太守丐奴號曰飛將軍避不敢入塞右北平唐為北平郡又名平州治盧龍縣唐時有盧龍府盧龍軍杜氏通典盧龍塞在縣西北二百里其土色黑山如龍形故名若龍城見漢書丐奴傳五月大會龍城祭其先天地鬼神崔浩曰西方胡皆事龍神故名大會處為龍城所以唐竇威出塞潛軍度馬邑揚斾捲龍城楊炯從軍行牙璋辭鳯闕鐵騎繞龍城沈佺期雜詩誰能將旌鼓一為取龍城即王少伯又從軍行去為龍城戰正直胡兵襲則龍城明明屬丐奴中豈得冠於飛將上哉龍城一名龍庭班固燕然山銘躡冒頓之區落焚老上之龍庭注曰龍庭單于祭天所是也或曰宋槧本竟如是莫可擬議乎余曰亦不然如謝眺據南史改作朓耿緯據唐書改作湋萊州據李頎集則作蔡州浛涯縣據通典則作洭他尚不可勝數善乎顔介有言校定書籍夫何容易自劉向揚雄方稱此職世豈有劉揚其人者乎要事求有據不敢憑臆以決亦可矣通典山陽漢射陽縣地晉立山陽郡或云漢吳王濞反於廣陵山陽王率衆於此拒之因以山陽為名按漢有兩山陽王一元帝之子名康曽徙為山陽王既與吳楚反時絶不相及一梁孝王之子名定景帝中六年立為山陽王亦後于吳楚之反者十年蓋吳楚反梁孝王以兵捍之孝王在諸子固未嘗王孝王殁景帝始順太后意分梁地為五而盡立其諸子吳王濞初起兵于廣陵西涉淮並將楚兵破梁于棘壁乘鋭而前固未聞有人拒之於射陽者且射陽亦非梁所屬安得定於此拒之邪通鑑元狩元年驃騎將軍去病深入二千餘里四年驃騎將軍出代右北平二千餘里太初二年浚稽將軍趙破奴出朔方西北二千餘里本始二年田廣明范明友韓增趙充國田順期以出塞各二千餘里無至三千里者東漢永元元年竇憲耿秉至出塞三千餘里登燕然山永元三年憲欲滅丐奴遣耿夔任尚破北單于於金微山出塞五千餘里而還自漢出師未嘗至也兩漢追丐奴有里數者僅此宋史韓世忠列傳初世忠謂敵至必登金山廟觀我虛實乃遣兵百人伏廟中百人伏岸滸約聞鼓聲岸兵先入廟兵共擊之金人果五騎闖入廟兵喜先鼓而出僅得二人逸其三中有絳袍玉帶既墜而復馳者詰之乃烏珠也按續資治通鑑綱目宋元通鑑金山之下廟之上並有龍王二字曽親至其地疑之當時烏珠軍江南太乙貝勒軍江北韓世忠以海艦泊金山下烏珠不得絶江豈能輕騎至龍王廟且既覺而復能浮江去耶或曰當時有沙洲故諺云金烏珠騎馬上金山此尤無稽之談也昔在崑山輯大清一統志至鎮江府得舊本三山志載龍王廟北宋時在銀山上非金山也然後知修宋史者以其時龍王廟在金山故實以金山而不知於兵機地形失之逺矣大清一統志大清河在厯城縣北自齊河縣流入又東北入濟陽縣界其上流即古濟水也小清河在厯城縣北即古濼水也臣按自漢至隋唐惟有濟水杜佑始有清河之名宋南渡後始有大小清河之分于欽齊乘以大清為古濟水而以小清為劉豫所導後人皆沿其説其實非也以水經注元和志寰宇記諸書考之濟水最南漯水在中河水最北今者小清所經自厯城以東如章邱鄒平長山新城髙苑博興樂安諸縣皆古濟水所行而大清所經自厯城以上至東阿固皆濟水故道而自厯城東北如濟陽齊東青城諸縣則皆古漯水所行蒲臺以北則古河水所經蓋唐宋時河行漯川其後大清兼行河漯二川其小清所行則斷為濟水故道也淮安府清河縣臣按清河有三一曰清泗今縣所取名一曰清濟在今山東東平州界一曰清淇在今直隸廣平府界即古清河郡也宋史河渠志熙寧十年七月乙丑河大決於澶州曹村澶淵北流斷絶河道南徙東匯于梁山張澤濼分為二𣲖一合南清河入于淮一合北清河入于海凡灌郡縣四十五而濮齊鄆徐尤甚壞田逾三十萬頃元和志兖州乾封縣汶水源出縣東北原山西南流經縣治南去縣三里又有北汶嬴汶柴汶牟汶述征記曰泰山郡水皆名汶按今乾封縣界凡有五汶皆源别而流同也金史河渠志都水監田櫟上言前代每遇古堤南決多經南北清河分流南清河北下有枯河數道河水流其中者長至七八分北清河乃濟水故道可容二三分而已元史河渠志賈魯嘗言用物之效草雖至柔柔能狎水水漬之生泥泥與草并力重如碇然維持夾輔纜索之功實多宋史河渠志徽宗宣和三年詔曰江淮漕運尚矣春秋時吳穿𨝍溝漢吳王濞開𨝍溝通道海陵隋開𨝍溝自山陽至揚子入江王宗沭曰海州東海口在州東一十五里黃淮之正流於此入海安東縣張網海口在縣東北一百二十里黃淮之支流於此入海金史食貨志黃河已移故道梁山濼水退地甚廣遣使安置屯田自是為平陸矣今東平州西十八里有積水湖尚其遺迹巨野縣東五里有大野澤今涸為平陸其東偏為南旺湖在汶上縣水經注汶水西南徑桃鄉縣故城西世所謂鄣城也按汶上縣東北四十里有桃城在汶水南東平州東七十里有鄣城在汶水北酈氏合而一之非也黃宗羲今水經序曰余越人也以越水證之以曹娥江為浦陽江以姚江為大江之竒分苕水出山隂縣具區在餘姚縣沔水至餘姚入海皆錯誤之大者河水源出吐畨朵甘思之南曰星宿海又名火燉腦兒其地在中國西南直四川馬湖府之正西三千餘里雲南麗江府之西北一千五百里較之崑崙胡名騰乞里塔者殆為近焉天下之潮皆一日兩汛惟瓊海之潮半月東流半月西流潮之大小隨長短星不係日之盛衰郭璞山海經注曰諸水所出又與水經違錯以為凡山川或有同名而異實或同實而異名或一實而數名似是而非似非而是且厯代久逺古今變易語有楚夏名號不同未得詳也景范湖廣總論曰以天下形勢言之則重在襄陽以東南形勢言之則重在武昌以一省之勢言之則重在荆州龍門山在韓城縣東北八十里與山西河津縣分界北魏志梁山北有龍門山故龍門亦兼梁山之稱隋大業十三年李淵遣王長諧等自梁山濟營于河西以待大軍即龍門也黃河在韓城縣東五十里自延安府宜川縣流入境厯龍門口而下有禹門渡通山西河津縣寰宇記龍門山北有河口略似龍門而不能通相傳鯀治水時所鑿績用弗成今名錯開河龍門關在韓城縣東北龍門山後周時所立最為險厄或云關之下即禹門渡舊唐書禮儀志天寶十載正月遣頴王府長史甘守默祭霍山應聖公始列為五鎮唐書李吉甫列傳魏博田季安疾甚吉甫請任薛平為義成節度使以重兵控邢洺因圖上河北險要所在帝張於浴堂門壁每議河北事必指吉甫曰朕日按圖信如卿料矣羊祜列傳祜以孟獻營武牢而鄭人懼晏弱城東陽而萊子服乃進據險要開建五城收膏腴之地奪吳人之資石城以西盡為晉有自是前後降者不絶涇野吕氏曰鹽池之成以大河北自蒲州折而東向轉曲之間漸積畜匯有此奧衍今陕西花馬池鹽亦近黃河折流之處理或然也故唐博士崔敖曰鹽池乃黃河隂潛之功浸淫中條融為巨浸蓋有所見矣解州志曰解鹽池堯時洪水方殷池尚淤泥禹貢鹽絺但見青州周官有盬鹽謂不煉治而成蓋解鹽也故圖經引穆天子傳有安邑觀鹽池之語宋白曰華隂分秦晉之境邊晉之西則曰隂晉邊秦之東則曰寧秦胡三省通鑑注曰平原本齊地髙帝置郡禹疏九河皆在平原渤海郡界又曰終南山橫亘關中南靣西起秦隴東徹藍田凡雍岐􅔛鄠長安萬年相去且八百里而連綿峙據其南者皆此一山也唐書天文志宋元嘉中南征林邑五月立表望之日在表北交州影在表南三寸林邑九寸一分交州去洛水陸路九千里蓋山川回折使之然以表考其弦當五千乎書疏云衡即古橫字漳水橫流入河故曰橫漳鄭康成亦云橫漳漳水橫流深州志黃河北流漳水東注之河縱而漳橫故曰橫漳歐陽修嘗謂開河如放火不開如失火與其勞人不如勿開任伯雨奏禹之治水不獨行所無事亦未嘗不因其變以導之蓋河流混濁泥沙相半流行既久迤邐淤澱則久而必決者勢也或北而東或東而北亦安可以人力制哉為今之䇿正宜因其所向寬立隄防約攔水勢使不至大段漫流而已漳河源於西山由磁州洺川南入冀州新河鎮與胡盧河即大陸非也備録胡盧河在寧晉縣東南二十里連大陸澤判然二處在新河縣又似一處云胡盧河大陸澤之俗名合流其後變徙入於大河神宗熙寧三年詔程昉王廣廉相視四年開修元豐元年二府奏事語及淤田之利帝曰大河源深流長皆山川膏腴滲漉故灌溉民田可以變斥鹵而為肥沃朕取淤土親嘗極為潤膩熙寧九年劉瑾言楚州寶應縣泥港射馬港山陽縣渡塘溝龍興浦淮隂縣青州澗等可興置欲令逐路轉運司選官覆按古北口外舊有小興州大興州宜興縣鳯州等處宋蘇轍古北道中詩亂山環合疑無路小徑縈回長傍溪倣佛夢中尋蜀道興州東谷鳯州西明初隸版圖永樂中棄大寧淪沙漠矣元和志晉澤在晉陽縣西南六里隋開皇六年引晉水溉稻田周回四十一里通典枯絳渠在經城縣界在絳水之東者古兖州域絳水之西則古冀州域也經城縣在今順德府廣宗縣東二十里史記正義引括地志云沇東至溫縣西北為濟水又南當鞏之北南入于河入河而南截度河南岸溢滎澤今無水成平地括地志滎陽城在今滎澤縣西南十七里殷之敖地也亦曰隞在隞山之陽戰國時韓曰滎陽滎澤在滎澤縣治南今縣本禹貢溢為滎之地敖山在河隂縣西二十里皇甫謐曰仲丁自亳徙囂即敖也鞏城在今鞏縣西南三十里周鞏伯邑漢置縣隋大業初方移治洛口今縣治也在河南府東一百三十里東至鄭州汜水縣六十里北至懷慶府溫縣二十五里故溫城在今溫縣西南三十里周畿內國漢置縣于此唐方徙今治在懷慶府東南五十里又東南至鄭州汜水縣二十五里晉書地理志古者有分土而無分民若乃大者跨州連郡小則十有餘城以戶口為差降略封疆之逺近所謂分民自漢始也今水經曰黑龍江入松花江松花江入混同江混同江入海此語不確再考又曰大江過城陵磯下合洞庭諸水徑嶽州府臨湘縣其流清者為洞庭濁者為大江四鎮之增為五也自隋開皇間始元和郡縣圖志寧州定平縣隋大業十年于此築城置棗社驛故鉏城在滑州衛南縣東十五里左氏后羿自鉏遷于窮石是也泗州宿遷縣淮水入縣境南與楚州山陽縣分中流為界解縣與安邑縣鹽池總謂之兩池官置使以領之每歲收利納一百六十萬貫郭林宗墳在汾州介休縣東三里周武帝時除天下碑惟林宗碑詔特留古諺曰襄陽無西以其西逼萬山邔無東以其東逼漢江界促近也湯居亳與葛為鄰寰宇記曰相去八十里中牟縣西北七里有圃田澤范守已據穆天子傳以為自洧川之北直抵中牟之西東連尉氏西接新鄭周回三百餘里總謂之圃田穆天子傳天子次于軍邱以畋于藪鄭詩叔在藪火烈具舉而左傳所云取人于萑苻之澤是皆其地矣今中牟得其地什之四洧川尉氏各什之三大學衍義補曰周以前河之勢自西而東而北漢以後河之勢自西而北而東宋以後迄于今則自西而東而又之南矣洪武十八年三十一年及永樂初年皆詔令河南山東等處荒田許民儘力開墾永不起科宋紹興二十一年知臨江軍王伯淮奏曰清江縣有稅錢四十餘貫苗米四百餘石人煙田産並在髙安經界既定兩縣隨産認稅于是清江有稅無田髙安有田無稅清江不免以無田之稅增均於原額之田髙安即以無稅之田減均于原額之稅是髙安得偏輕之利清江得偏重之害矣曲洧新聞曰雒陽西至新安道路平曠自新安西至潼關殆四百里重岡疊阜連綿不絶終日走硤中亡方軌列騎處其間硤石及靈寶閿鄉間尤為險要古之崤函在此真所謂百二重關也周在東不能西禦秦唐在西不能東禦祿山悲夫懷慶府知府紀誡疏曰如西華縣志洪武二十四年在册地止一千九百九十四頃有竒嘉靖十一年新丈地一萬九千七百七十頃有竒永城縣原地一千五百三十頃有竒嘉靖十一年新丈出二萬六千六百一十九頃有竒二縣如此他縣可知是土地實增倍于其舊則糧宜增而不增而顧以其糧分灑之此輕者益見其輕也至河內縣原編戶一百二十餘里今併為八十三里修武縣原編戶六十里今併為二十九里他縣亦皆類是人逃而地漸荒則土地已非其舊夫糧宜減而不減而復以其糧包賠之此重者益重無怪乎懷慶之民日困征輸而卒無以自安也渦河在淮之北商船自淮入渦至河南祥符縣銅瓦廂在縣西北二十五里以達陽武陽武去衛河只六十里此元人陸運之故道也倘漕河中梗河道未能遽復而又不經黃河之險此亦備急之一䇿也玉堂嘉話王黃華論汴河前宋以洛河入汴為京西漕路其後黃河徙南洛水舊道斷絶今汴河名存其實止是京索須三水自滎澤南入汴河故道行流越王句踐世家越王曰夏路以左劉氏云楚適諸夏路出方城人向北行以西為左故云夏路以左括地志故長城在鄧州內鄉縣東七十五里南入穰縣北連翼望山無土之處纍石為固楚襄王控霸南土爭強中國多築列城于北方以適華夏號為方城程大昌禹貢論曰孔頴達謂江南人呼水無大小皆曰江此特後世語耳古何嘗有是歟經自岷江以外無得名江者漢水之大幾與江埒其未入江也止得名漢不得名江安有潯陽間九小流者方趨江未至而肯以江命之乎不獨江也淮河濟三名者其正派得之外此無有混言者濟之于河猶不得附借其名而江漢分枝僅得目為沱潛其嚴于名稱大抵如此又曰太湖一湖而得名五湖昭餘祁一澤而得名九澤鼂氏謂未易可以必其得數之因其説通也括地志漢張良墓在徐州沛縣東六十五里與留城相近也故城在徐州沛縣東南五十五里今城內有張良廟志稱漢中入關之道有三而入蜀中之道有二所謂入關中之道三者一曰褒斜道二曰儻駱道三曰子午道也所謂入蜀中之道二者一曰金牛道二曰米倉關道也今由關中以趨漢中由漢中以趨蜀中者謂棧道其北道即古之褒斜南道即古之金牛而子午儻駱以及米倉之道用之者或鮮矣隴山在隴州西北六十里即隴坂也又有小隴山在州西八十里一名關山以近隴關即大震而名也山長八十里路通臨鞏太白山在乾州武功縣西南九十里亦謂之太一山五經要義武功有太一山一名終南蓋終南南山之總名也張衡西京賦云終南太一是則非一山矣山接􅔛縣及盩厔縣界北去長安三百里故俗云武功太白去天三百案武功太白去天三百乃辛氏三秦記中語若璩但稱俗云蓋偶未考謹附訂于此六典關內道名山曰太白栁宗元云其地寒冰雪積之未嘗已又南十里為武功山杜彥達曰太白南連武功最為秀傑冬夏積雪望之皓然故云太白也軍行山下不得鳴鼓角鳴則風雨暴至又山半有橫雲如瀑布則澍雨諺云南山瀑布非朝即暮是也惇物山在武功縣東南二百里漢志注縣東有垂山古文以為惇物孔氏曰敦物即太華山似誤武關在商州東百八十里輿程記自武關西北行四百十里至藍田縣皆行山中至藍田始出險就平云岐陽廢縣在岐山縣東北五十里唐貞觀七年置周太王居岐之陽即此岐山在岐山縣東北十里一名天柱山其峯髙峻狀若柱然六典關內道名山曰岐山俗名鳯皇堆山之南周原在焉即太王所居詩周原膴膴是也志云原東西橫亘肥美寬平在今縣東北四十里宋白曰自興元東北至長安取駱谷路不過六百五十二里是往來之道莫便於駱谷也而五季以來駱谷漸成荒塞何歟鄭曉解大野既豬曰由是上源之來是澤有以受之下流之去是澤有以泄之始得而豬矣解揚州曰今按地勢山起于西北澤匯于東南東南地卑萬水所湊揚州是也彭蠡在揚州西南合江南江東江西諸水以為澤三江在揚州東南分東江松江婁江諸水以為名解浮于江沱潛漢曰禹貢之記貢道者如記二水曰浮于淮泗非謂近泗之地必由淮入泗也此荆州近于漢者則徑浮于漢不必自江而入漢也近于潛者則徑浮于潛而入漢亦不必自江也沱自華容縣出于江入于沔沔即漢也由江入沱由沱入漢一路也潛自漢出至潛江縣入于江由江入潛由潛入漢一路也又曰江至東陵而北合于漢漢至大别而南入于江孔安國曰禹治水之後舜分冀州為幽州并州分青州為營州始置十二州馬融曰禹平水土置九州舜以冀州之北廣大分置并州燕齊遼逺分燕置幽州分齊置營州金履祥曰分冀州自衛水以北為并州醫無閭之地為幽州碣石以東接青州之北為營州是為十有二州焉河渠書禹功施於三代自是之後滎陽下引河東南為鴻溝以通宋鄭陳蔡曹衛與濟汝淮泗會文穎曰即今官渡水也蓋為二流一南經陽武為官渡水一東經大梁城即河溝今之汴河是也韓邦竒曰古時汳泗皆在河之東南故灉入泗今河徙而南灉在河西泗在河東灉為河截斷不復能入泗矣王氏炎曰王莽時河行漯川大河不行于大邳之北而遂行於相魏之南則山澤在河之瀕者支川與河之相貫者悉皆易位而與禹貢不合矣肇域記滎陽縣北三十里有鴻溝應邵曰鴻溝在滎陽故城在滎澤東南二十里河渠書索隱引張華云大梁城在浚儀縣北縣西北渠水東經此城南又北屈分為二渠其一渠東南流是始皇所鑿引河水以灌大梁謂之鴻溝楚漢會此處也其一渠東經陽武縣南為官渡水寶應縣志運河隄自黃浦至界首長八十里即唐李吉甫所築平津堰也邵二泉禹貢岷山導江之簡曰江漢水漲彭蠡鬱不流逆為巨浸無仰其入而有賴其遏彼不遏則此不積所謂匯也者如此故曰北會于匯匯言其外也蠡言其內也于匯不于彭蠡勢則然也蓋實志也江水濬發最在上流其次則漢自北入其次則彭蠡自南入三水並持而東則江為中江漢為南江彭蠡所入為北江可知矣非判然異派之謂也且江漢之合茫然一水唯見其為江也不見其漢也故曰中江曰北江然其勢則相敵也故曰江漢朝宗凡集傳謂經誤者非是餘干張克修云寶亦云王禕子充水經序曰經云江水東徑永安宫南則昭烈託孤於武侯之地也又其言北縣名多曹氏時置南縣名多孫氏時置是又若三國以後人所為也又曰意者桑欽本成帝時人實為此書及郭酈二氏為傳注咸附益之而璞晉人道元後魏人也王子充曰十二野所以分天之綱者也其要在明乎躔度而已九州所以分地之紀者也其要在明乎疆界而已方輿勝覽禹貢梁州之山四岷嶓蔡蒙西山皆岷北山皆嶓南山皆蒙也析支在河州西南徼外禹貢雍州有崑崙析支應劭曰析支在河關西南千餘里羌人所居謂之河曲羌後漢西羌傳自河關之西濵于賜支至于河首綿地千里皆羌地賜支即禹貢析支也水經注引司馬彪曰自賜支以西濵于河首羌居其右河東流屈而東北經賜支之地是為河曲宋河渠志趙伯昌言唐黜陟使李承建捍海堰是承既建常豐堰于山陽又于鹽城海門建此堰亦竒矣哉但混為一者則非常豐在山陽東南華陽國志元鼎六年分廣漢郡為武都郡屬縣九東接梓潼西接天水北接始平郟亶水利書曰臣嘗論天下之水以十分率之自淮而北五分由九河入海書所謂同為逆河入于海是也自淮而南五分三江入海書所謂三江既入震澤底定是也單鍔吳中水利書曰嘗觀考工記善溝者水潄之善防者水淫之蓋謂上水湍流峻急則自然下水泥沙潄去矣錢有威曰昔周夏二公治水吳中民初不便詢諸父老父老對曰相公開河功多怨少千載之後功在怨磨二公斷而行之功施到今屠隆曰昔人之推水學者曰郟亶曰單鍔郟亶詳于治田單鍔詳於治水兼而用之水政舉矣歸子顧請治吳松江疏宋時江靣原濶九里可敵千浦故與錢塘揚子並稱三江今四川廣安大竹渠縣鄰水巴州通江南江達州東鄉太平凡十州縣皆漢宕渠縣地而故城則在渠縣至今營山縣界有巖渠廢縣乃梁置非漢縣也舊唐書地理志海州東海縣縣治鬱州四靣環海又曰自至德後中原多故襄鄧百姓兩京衣冠盡投江湘故荆南井邑十倍其初乃置荆南節度使上元元年九月置南都以荆州為江陵府又曰荆南節度使劍南西川節度使淮南節度使皆使親王領之又曰東京在西京之東八百五十里又曰武德三年置瓜州五年改為西沙州皆治於三危山在縣東南二十里又曰沙州壽昌縣漢龍勒縣地陽關在縣西六里玉門關在縣西北一百一十八里又曰武州將利縣今階州秦漢白馬氐之地漢置武都郡并縣愚按元和志將利縣本漢羌道縣地非武都縣地也後魏宣武帝於武都鎮城仙陵山之東復置武都郡廢帝改曰武州唐因之朏明曰景范云均州禹貢雍豫二州境最合為不知者將雍改作荆非也朏明又細考均州為雍豫州境亦非蓋唐宋之均州自為郡兼領鄖鄉即今鄖縣鄖西縣地也此二縣與商州上津縣此指唐接界謂之雍豫二境則可今均州屬襄陽府而明成化間别以鄖縣置鄖陽府則此州直為豫州之地不得言二州之境也鄖及鄖西亦當屬豫其漢南諸縣則荆也三國志董昭傳太祖將征烏丸患軍糧難致鑿平虜泉州二渠入海通運昭所建也陳湯每過城邑山川常登望鄧艾每見髙山大澤輒規度指畫軍營處所元人進金史表曰徑卒搗居庸關北拊其背大軍出紫荆口南扼其吭此古今都燕者防患之明驗也又曰西北之山東起醫無閭西接太行其為要害之關曰紫荆居庸倒馬居庸巖險易守倒馬去燕稍逺紫荆則跨於居庸而近於倒馬金人知守居庸不知扼紫荆非失計耶楊守謙每閲紫荆輿圖見所謂五虎嶺者為元人敗金之處則汗流浹背神不怡者纍日嗚呼勞臣志士之心事至今猶可以歎息也紀陟有言疆界雖逺險要必爭之地不過數四猶人六尺之軀要害亦數處耳大江之南上流之要害江陵武昌襄陽九江是也江水源於岷山下夔峽而抵荆楚則江陵為之都會嶓冡導漾東流為漢漢沔之上則襄陽為之都會諸葛亮謂荆州北據漢沔利盡南海東連吳會西通巴蜀此用武之國也沅湘諸水合洞庭而輸之江則武昌為之都會豫章西江與鄱陽之浸匯于湓口則九江為之都會昔人言天下之勢秦蜀為首東南為尾中原為脊周瑜語孫權曰據襄陽以蹙操北方可圖也庾翼謂襄陽西接梁益與關隴咫尺北去河雒不盈千里進可以掃蕩秦越退可以保據上流嶽飛謂襄陽等六郡為恢復中原基本此用荆襄以制中原之䇿也孫氏奄有公安江陵都武昌鄂州江南已定遂定都建業江左以來但有揚荆湘江梁益交廣荆揚二州為天下根本陸抗有言無江陵是無荆州也無荆州是無吳也江陵有急當傾國爭之是故江淮所恃以為藩籬者江陵也江陵所恃以為唇齒者襄陽也此用荆襄以固東南之䇿也元有得宋奏議以獻者下諸將議郝經獻議曰彼之素論謂有荆襄則可以保淮甸有淮甸則可以保江南先是我有荆襄有淮甸上流皆自失之今當先荆後淮先淮後江從彼所保以為吾所攻王宗沐建議於萬厯曰唐都秦右據岷涼左通陕渭有險則天寶興元乘其便無水則會昌大中受其貧宋都梁背負大河靣接淮泗有水則景德元祐享其全無險則宣和靖康受其病國家都燕北有居庸醫無閭以為城南有大海以為池天造地設山環水衛而自塞其利者何也都燕之受海猶憑左臂從腋下取物也置海漕而専力於河一夫大呼萬櫓皆停腰脊咽喉之譬先臣邱濬之諄復者不可不慮也潛邱劄記卷三
