body:
  text: 潛邱劄記卷五山陽閻若璩撰補正日知録國語凡陳之道設右以為牝益左以為牡淮南子􅣹形訓邱陵為牡溪谷為牝又牝土之氣御于玄天又所謂地利者左牡而右牝唐詩話韓翃久家居一日夜半客叩門急賀曰員外除駕部郎中知制誥曰誤矣客曰邸報制誥闕人中書兩進名不從云云是邸報字亦見于此單名以偏旁為排行如衛瓘衛玠之流按晉書玠乃瓘之孫非弟也漢書言李固杜喬朋心合力致主文宣而孝桓即位之詔曰臧吏子孫不得察舉按桓即位于閏六月庚寅先三日丁亥李固䇿免杜喬為太尉在次年之六月詔乃即位後四十四日丙戌下於李杜皆不相涉宣防既築導河北行復禹舊迹而梁楚之地復寧無水災自漢至唐河不為害幾及千年按此説大非復禹舊迹無水災此史記河渠書之文若溝洫志則續之曰自塞宣房後河復北決於館陶分為屯氏河地理志魏郡館陶縣下注云河水别出為屯氏河東北至章武入海是也雖不知的在何年要武帝元封二年壬申後宣帝地節元年壬子以前事余嘗謂禹之時河自碣石入海至周定王五年河徙從鄴縣東北入海此一變也漢武元封後宣帝地節前河又從渤海郡章武縣入海此又一變也古今何等大事而亭林亦未考及耶寧老云詩儀字凡十見皆音牛何反按相鼠詩儀與皮為叶東山詩儀與縭叶湛露詩儀與椅離叶斯干詩儀與議罹叶若讀為延知切似亦未為不可堯舜禹皆名也古未有號故帝王皆以名紀臨文不諱按曲禮詩書不諱臨文不諱盧植注曰臨文謂禮文也禮執文行事故言文也鄭康成注曰謂其失事正也陳澔注曰不因避諱而改行事之語蓋恐有誤於承用也從來解文字皆如此而從來引此句多誤豈寧老亦未之免邪要當用詩書不諱耳武王伐紂第二則云武王克商不以其故都封周之臣而仍以封武庚及武庚既畔乃命微子啓代殷而必於宋焉蓋不以畔逆疑其子孫而明告萬世以取天下者無滅國之義也故宋公朝周則曰臣也周人待之則曰客也自天下言之則侯服于周也自其國人言之則以商之臣事商之君無變于其初也平王以下去微子之世逺矣而曰孝惠娶于商左傳哀二十四年傳曰天之棄商久矣僖二十二年傳曰利以伐薑不利于商哀九年傳吾是以知宋之得為商也按左傳哀二十四年孝惠娶于商此宗人釁夏對魯哀公之言宋林氏注曰稱商不稱宋者避定公諱也此解絶妙寧老獨未見耶僖二十二年楚人伐宋以救鄭宋公將戰大司馬固諫曰天之棄商久矣君將興之弗可赦也已不曰棄宋而曰棄商者此即下文寡人雖亡國之餘之意亦即一姓不再興之説也今取以證宋得為商竊恐寧老未識當時立言之意因思僖二十一年宋人為鹿上之盟以求諸侯於楚公子目夷曰小國爭盟禍也宋其亡乎此處斷宜稱宋則彼處稱商正可意會哀九年晉趙鞅卜救鄭遇水適火史龜曰是謂沈陽可以興兵利以伐薑不利于商不曰伐齊與宋而變文言薑言商者取于上文陽兵協韻毛詩古音考可以興兵兵音邦此固古人文字之常只觀下文伐齊則可敵宋不吉二語不用韻協便直稱齊宋本號則可見矣第三則遷頑民于洛邑按寧老云頑民皆叛逆之徒也其與乎畔而遷者皆商世臣大族不與乎畔而留于殷者如祝鮀所謂分康叔以殷民七族是以陶氏施氏繁氏錡氏樊氏飢氏終葵氏為殷之庶民矣請問上文分魯公以殷民六族條氏徐氏蕭氏索氏長勺氏尾勺氏使帥其宗氏輯其分族將其醜類以法則周公用即命於周是使之職事於魯一則曰宗氏再則曰分族尚得謂非商之世臣大族乎豈同一氏族而分於康叔者獨為民乎此不可解豐熙偽尚書云其曰附後洪範一篇則所云惟十有三祀王訪于箕子者必冠之以周書文義乃通按左傳屢引洪範皆目為商書不曰周書説者謂為此夫子未刪前之書名也今云必冠之以周書文義乃通亦不必然寧人謂春秋蓋必起自伯禽之封以洎于中世當周之盛朝覲會同征伐之事皆在焉故曰周禮而成之者古之良史也按杜元凱春秋經傳集解序便知春秋一書其發凡以言例皆周公之垂法仲尼從而修之何必言起自伯禽與成之古良史哉又左傳隱七年謂之禮經杜注曰此言凡例乃周公所制禮經也寧老謂桓十七年五月無夏按桓十七年五月有夏春秋自僖公以前大夫並以長幼之字為稱按春秋自莊十二年衛大夫已稱子石祁子是也大夫稱子莫先于此或曰何以見祁為諡案鄧祁侯杜注祁諡也是也次則寧莊子見閔二年論語有卞莊子為魯卞邑大夫又云孟孫氏之稱子也自蔑也文十五年按國語有孟文子即左傳文伯也又先蔑之稱子亦當附見又云叔孫氏之稱子也自豹也襄七年按國語定王八年有叔孫宣子即左傳叔孫宣伯也又先於豹稱子亦當附及又按叔孫豹於襄二年稱穆叔於襄七年稱穆子亦稱穆叔至此後則或稱穆叔或稱穆子不一又於襄七年稱昭伯於昭四年稱昭子一人之身倏字而倏子豈一人之身倏貴而倏賤乎竊以為通稱又云季孫氏之稱子也自行父也文十三年年閔元年書季子二書髙子皆春秋之特筆按季孫氏之稱子也自行父也見文六年不待十三年又云欒氏之稱子也自枝也僖二十八年按左傳桓三年有欒共叔然國語稱為欒共子又先於欒氏之有貞子亦當附見又云范氏之稱子也自會也宣十二年按范氏之稱子也亦自渥濁也並見十二年又云魯之三家稱子他如臧氏子服氏叔仲氏皆以伯叔字焉不敢與三家並也按子叔氏有齊子即叔老有敬子即叔弓一見襄十四年一見昭三年誰謂不敢與三家並乎又昭四年豎牛賂叔仲昭子與南遺杜注昭子叔仲帶也昭十二年南蒯語叔仲穆子且告之故杜注穆子叔仲帶之子叔仲小也第二則又云君前不敢子也按文六年亦稱趙衰為成季非對君言也何解陽子成季之屬也故黨于趙氏君前臣名禮也孟子稱莊暴於齊宣王前曰莊子誠所未解又云論語之稱子者皆弟子之於師如云非不説子之道衛君待子而為政之類按陳子禽謂子貢曰凡兩稱子猶曰亢子貢弟子也若夫子之於季子然一稱子於季康子四稱子陳亢問於伯魚亦稱子桀溺問於子路亦稱子子路問於丈人亦稱子豈皆弟子之於師乎其説不可通矣或曰然則若何愚曰改皆字為多字庶乎其尚可耳又云孟子之稱子者皆師之於弟子按孟子於平陸大夫蚳蛙沈同留行之客畢戰陳相景春戴不勝淳于髠告子慎子白圭宋句踐滕之或人俱稱之為子豈皆弟子乎至曹交者集注明謂不容其受業亦稱之為子其説尤不可得而通矣寧老云外大夫若宋若鄭若陳若蔡若楚若秦無諡也而後字之按外大夫無諡者而後書字請問齊隰朋諡成子見國語注是隰朋固有諡矣何左傳止稱為隰朋猶可解曰注也注本世本再請問鄭子産諡成子見國語是子産亦有諡矣何左傳止稱為子産公孫僑與子美猶可解曰此外傳也再請問鄭子産之子參字子思諡桓子是亦有諡矣何左傳不稱為國桓子而必連其字曰桓子思問至此當無辭矣寧老謂古人琴瑟之用皆與歌並奏故有一人歌一人鼓瑟若漢文帝使慎夫人鼓瑟上自倚瑟而歌是也亦有自鼓而自歌孔子之取瑟而歌是也按史記趙世家武靈王夢見處女鼓瑟而歌詩亦自鼓自歌者又云衛靈公聽新聲於濮水之上而使師延寫之則但有曲而無歌按國語晉平公説新聲注曰新聲者衛靈公將如晉舍於濮水之上聞琴聲焉甚哀使師涓以琴寫之至晉為平公鼓之師曠撫其手而止之曰此亡國之音也師延為紂作靡靡之樂後乃自沉於濮水之中聞此聲者必於濮水之上乎當作師涓不當作師延何不用論語鼓瑟希鏗爾舍瑟而作邢疏曰鏗投瑟聲也此即有曲而無歌三年之喪云今從鄭氏之説三年之喪必二十七月其過於古人一也按從鄭氏説者正合於古人王肅乃故與鄭反朱子所謂王肅議禮必反鄭元是也王肅且以此獲短喪之譏寧老豈未之聞耶又云今婦為舅姑亦服三年其過於古人三也按婦為舅姑三年吳幼清亦嘗辨之見服制考詳序甚佳第二則云今人以初喪四十九日居於柩側謂之七七唐李翺集中有楊垂撰喪儀其一篇云七七齋按魏書胡國珍傳詔自始薨至七七皆為設千僧齋令七人出家孟子外篇云周禮大行人注引孟子曰諸侯有王顔氏家訓引孟子曰圖影失形廣韻圭字下注曰孟子六十四黍為一圭十圭為一合今孟子書皆無其文豈所謂外篇者耶按王應麟孟子考異焦弱侯焦氏筆乘所載古人引孟子外篇者其語甚衆何僅寥寥引此近尤詳繹史兩漢風俗云云按晉世祖泰始元年乙酉以傅元為諫官元上疏曰近者魏武好法術而天下貴刑名魏文慕通達而天下賤守節其後綱維不攝放誕盈朝遂使天下無復清議云云是致毁方敗常之俗魏文非魏武也愚嘗為之説曰清談之風一盛於王何再盛於嵇阮三盛於王樂而晉亡矣然其端則自文帝始此亦論世者之不可不考也唐宋以前上下通行之貨一皆以錢而已未嘗用銀按東阿于文定公筆麈所載古今用銀事尤詳又云漢書食貨志言秦并天下幣為二等而珠玉龜貝銀錫之屬為器飾寶藏不為幣漢武始造白金三品尋廢不行按孝武始造白金三品乃雜鑄銀錫為之此即漢書安息國以銀為錢之制竟認作銀非其文有龍有馬有龜觀錢譜可知所直各不同王莽即真始直用銀朱提銀重八兩為一流直一千五百八十它銀一流直千是為銀貨二品是也又云唐韓愈奏狀亦言五嶺買賣一以銀按張籍送南遷客詩海國戰騎象蠻州市用銀又云金至元光二年寶泉幾於不用哀宗正大間民間但以銀市易此今日上下用銀之始按紹興嵗幣銀二十萬兩絹二十萬匹又糜費銀一千三百餘兩非上下用銀之事乎何必金大抵見北宋所著書上下用銀已不計其數矣寧老云今人但以貢生為明經非也唐制有六科一曰秀才二曰明經三曰進士四曰明法五曰書六曰算當時以詩賦取者謂之進士以經義取者謂之明經今罷詩賦而用經義則今之進士乃唐之明經也愚嘗見茅鹿門評韓昌黎贈張童子序曰張本與昌黎同舉進士不覺失笑童子自是明經昌黎方是進士兩人出身各不同今昌黎榜進士凡三十餘人姓名具在無所為童子也鹿門其亦未識古今貢舉之制乎今見寧老此論實獲我心又按金有經義進士詞賦進士進士中兼二種亦不可不知進士有甲乙二科按唐書諸進士試時務䇿五條帖所讀一大經經䇿全得為甲第䇿得四帖過四以上為乙第第二則云甲乙丙科始見漢書儒林傳平帝時嵗課博士弟子甲科四十人為郎中乙科二十人為太子舍人丙科四十人補文學掌故匡衡傳數射䇿不中至九乃中丙科按漢書蕭望之傳以射䇿甲科為郎儒林傳房鳳以射䇿乙科為太史掌故太常如此則三科故事俱全元祐八年三月庚子中書省言進士御試答䇿多係在外凖備之文云云又云是當時即以經義為在外凖備之文矣按前云進士御試答䇿多係在外凖備之文此自指䇿而言與經義無干今寧老云是當時即以經義為在外凖備之文當時何曽第二則言楊文貞言洪武四年十七年開科及十八年會試猶循元制作經疑至二十一年始定今三場之制今之經義又不如經疑多矣按元試士用經疑亦用經義此則專用經疑不用經義矣大非六國獨燕無後云七國之時人主多任其貴戚云云至秦則不用矣按樗里疾秦惠王異母弟亦嘗相武王以縣統鄉以鄉統里備書之者史記老子楚苦縣厲鄉曲仁里人按楚非國乎當增一句曰以國統縣又按孔子生魯昌平鄉陬邑是又以國統鄉以鄉統邑又云書邑里而不言鄉史記聶政軹深井里漢髙祖沛豐邑中陽里人衛太子亡至湖泉鳩里按陳丞相平者陽武户牖鄉人也是又書邑鄉而不言里其都亭則如今之關廂按漢書循吏傳召信臣出入阡陌止舍離鄉亭是又有鄉亭又必有牢獄詩小雅宜岸宜獄陸云鄉亭之繫曰岸官府曰獄是也又云司馬相如往臨卭舍都亭云云按漢書翟方進傳北地浩商為義渠長所捕亡長取其母與豭豬連繫都亭下亦宜考及劉衡碑云為勃海王郎中令以兄琅琊相憂即日輕舉按趙相劉衡碑以兄琅琊相亡即日輕舉非憂字也從金石録又云楊著碑云遷髙陽令遭從兄沛相憂篤義忘寵飄然輕舉按髙陽令楊著碑拜思善侯相遭從兄沛相憂篤義忘寵飄然輕舉此作遷髙陽令誤東向坐第一則云古人之坐東向為尊歷引史云云以今之南面為尊非是第二則云舊唐書盧簡求子汝弼為河東節度副使府有龍泉亭簡求節制時手書詩一章在亭之西壁汝弼復為亞帥每亭中宴未嘗居賔位西向俯首而已是唐人亦以東向為賔位也按韓昌黎送幽州李端公序曰上堂即客階坐必東向亦可證唐人以東向為尊又按南唐書伍喬赴試金陵故事中選者主司必延之升堂置酒時有宋貞觀者首就坐張洎續至主司覽其文揖貞觀南坐引洎坐於西酒至數行喬始上卷主司歎其傑作乃徙貞觀處席北洎處席南以喬居賔席及覆考榜出喬果為首洎貞觀次之時稱主司精於衡鑒賔席者東向者坐也是五代時亦然又按宋理宗齋居夜夢一真人峩冠佩玉延帝殿上即東席西向坐以賔禮揖上東向面命洋洋俄而夢覺見宋史寺證云後漢書張湛告歸平陵望寺門而步注寺門即平陵縣門也按馬援傳曉狄道長歸守寺舍注寺舍官舍也先於張湛傳又髙陽令楊著碑聞母氏疾病醳榮投黻步出城寺正五九月云唐朝新格以正五九月為忌月今人相沿以為不宜上任考唐書云云按宋王勉夫野客叢書載正五九月為忌月其説尤詳當參閲二名不偏諱云杜氏通典大唐武德九年六月太宗居春宫總萬機下令曰依禮二名不偏諱今其官號人名及公私文籍有世及民兩字不連讀者並不須避諱按通典載髙宗亦有詔不諱其名治亦當引及又注云通典又言太宗時二名不相連者並不諱至玄宗始諱之然永徽初已改民部為户部而李世績已去世字單稱績矣按吾邑晉祠有唐太初貞觀二十年御製碑碑隂載當日從行諸臣姓名內有李績已去却世字單稱績是唐太宗在日已如此不待永徽初也愚嘗謂此段可補史傳之闕寧老素留心金石文字豈未暇考及此耶祖稱曽祖之父為髙祖然自是以上亦通謂之髙祖左傳昭公十七年郯子來朝曰我髙祖少皥摰之立也則以始祖為髙祖昭公十五年王謂籍談曰昔而髙祖孫伯黶司晉之典籍則謂其九世祖為髙祖按周書康王之誥無壞我髙祖寡命髙祖文武也在康王之世稱文武為髙祖是又以曽祖父祖父為髙祖矣藝祖第二則云宋王旦封祀壇序烈祖造新邦臻大定經制而未遑神宗求治理致升平業成而中罷是以宋太祖為烈祖太宗為神宗亦古人之通稱也按吾太原縣志載元豐八年韓絳崇聖寺碑銘序亦屢稱藝祖神宗神宗即太宗古時有人臣而隆其稱曰君者君奭君陳君牙皆此例也猶漢時人主稱丞相為君侯也漢書兒寬為御史大夫奉觴上夀制曰敬舉君之觴按丞相御史大夫官猶尊若嚴助為會稽太守武帝賜書曰君厭承明之廬亦稱君第二則云人臣稱君自三代以前有之孟子象曰謨蓋都君按史記舜本紀一年而所居成聚二年成邑三年成都堯乃賜舜絺衣與琴為築倉廪豫牛羊是時舜已為諸侯故曰都君非人臣也大抵上古時有德者民便往歸之奉而為君以主一國觀泰伯之在荆蠻可見春秋時稱卿大夫曰主按國語優施謂里克妻曰主孟啖我須知卿大夫之妻亦稱主也須知戰國䇿又以主君稱諸侯秦䇿甘茂引樂羊曰主君之力魏䇿魯君擇言稱主君之尊云云蓋一指魏文侯一指魏惠王也幽並營三州在禹貢九州之外先儒謂以冀州地廣而分之殆非也孔安國馬融並云按幽并營三州自九州分出從來説家皆如此而寧老斷然謂在禹貢山川之外謂幽在今桑乾河以北至山後諸州并在今石嶺關以北至豐勝二州營在今遼東大寧並有塞外之地其山川皆不載之禹貢故靡得而詳禹畫九州在前舜肇十二州在後者似是臆説不過從肇十有二州肇者始也著想耳并在石嶺關以北請問周禮并州藪曰昭餘祁昭餘祁實在太原府祁縣非石嶺關以南乎班固漢書敘傳三代損益降及秦漢革剗五等立郡縣崔瑗郡太守針有嬴驅除焚典紀舊蕩滅蕃畿罷侯置守蓋自漢以下文人之論皆謂秦始皇廢封建立郡縣以余觀之殆不然云云按戰國䇿張儀為秦連衡説韓王韓王曰客幸而教之請比郡縣又張儀為秦破從連橫謂燕王曰且今時趙之於秦猶郡縣也又昌國君樂毅為燕昭王合五國之兵而攻齊下七十餘城盡郡縣之以屬燕又蒙嘉為先言於秦王曰燕王願舉國為內臣比諸侯之列給貢職如郡縣又按國語晉公子夷吾私於公子縶曰君實有郡縣君謂秦君言秦亦自有郡縣則當秦穆公之世而固巳有郡有縣矣此證尤妙真可謂一言破的何必紛紛又史記秦本紀武公十年伐邽冀戎初縣之十一年初縣杜鄭是又先於秦穆公世有縣又云左傳宣十二年鄭伯逆楚子之辭曰使改事君夷于九縣注楚滅諸小國為九縣按左傳宣十一年楚子殺夏徵舒轘諸栗門因縣陳又王使讓之曰諸侯縣公皆慶寡人獨此條面告寧老以為然又按哀十七年彭仲爽申俘也文王以為令尹實縣申息楚滅息見莊十四年是莊十四年已有縣又云昭五年薳啓疆曰晉十家九縣其餘四十縣按左傳昭三年初州縣欒豹之邑也又文子曰溫吾縣也又晉之别縣不唯州又余不能治余縣凡四縣字先於薳啓疆語二年又注云周禮小司徒四甸為縣按周書作雒篇千里百縣縣有四郡宜補於四甸為縣之下又云戰國䇿甘茂曰宜陽大縣名曰縣其實郡也則當七國之世而固已有郡矣按史記秦本紀惠文君十年魏納上郡十五縣又後十三年置漢中郡又云西門豹為鄴令云云按史記秦本紀孝公十二年并諸小鄉聚集為大縣縣一令又云蘇代曰請以三萬户之都封太守千户封縣令按國䇿此二語乃趙勝為馮亭非蘇代也又按戰國䇿馬服君曰燕嘗以奢為上谷守又秦令韓陽告上黨守靳黈曰又齊人李伯見孝成王以為代郡守古郡守止稱守無太字至漢景帝中二年七月更郡守為太守始為太守史記於景帝以前事嘗敘太守者此自以後代制度敘前人事迹其誤甚明索隱所謂太者衍字是也然戰國䇿敘馮亭上黨事凡五稱太守愚竊謂此後人傳寫者增加非當時實録者古書如此類最多要當識者意會之衛世家言二世元年廢衛君角為庶人是始皇時衛未嘗亡也按漢書地理志始皇既并天下猶獨置衛君二世時乃廢為庶人凡四十世九百年最後絶此證尤好又云越世家言越以此散諸族子爭立或為王或為君濵于江南海上服朝于楚秦始皇本紀二十五年王翦遂定荆江南地降越君漢興有東海王搖閩越王無諸之屬如今世之土司是越未嘗亡也按越世家後七世至閩君搖佐諸侯平秦漢髙帝復以搖為越王以奉越後是不特未亡於秦且從而亡秦矣古所謂山東者華山以東管子言楚者山東之強國也史記引賈生言秦并兼諸侯山東三十餘郡後漢陳元傳言陛下不當都山東謂光武都雒陽蓋自函谷關以東總謂之山東唐人則以太行山之東為山東杜牧謂山東之地禹畫九土曰冀州是也而非若今之但以齊魯為山東也按戰國䇿蘇秦始將連橫説秦惠王當秦之隆山東之國從風而服使趙大重又秦惠王謂寒泉子曰蘇秦欺寡人欲以一人之智反覆山東之君從以欺秦如此之稱山東不啻數百見何不一引證又按漢書趙充國辛慶忌傳贊曰秦漢以來山東出相山西出將贊所謂山西者明云天水隴西安定北地諸處正在華山以西亦一妙證又按太史公自序蕭何鎮撫山西正義曰謂華山之西也又按漢書地理志秦地其界自𢎞農故關以西以之謂秦地則可謂山西則不可又按史記留侯世家劉敬説髙帝都關中左右大臣皆山東人多勸上都雒陽此事又先於陳元又按寧老云自函谷之東總謂山東只當言華山以東不必及函谷關蓋函谷距華尚逺也華原屬晉地又按老杜送舍弟頴赴齊州詩諸姑今海畔兩弟亦山東去傍干戈覓來看道路通又有昔我遊山東憶戲東嶽陽是唐人未嘗不專以齊魯為山東也又云古所謂河內者在冀州三面距河之內史記正義曰古帝王之都多在河東河北故呼河北為河內河南為河外又云河從龍門南至華隂東至衛州東北入海曲繞冀州故言河內蓋自大河以北總謂之河內而非若今之但以懷州為河內也按左傳僖十五年賂秦伯以河外列城五杜注曰河外河南也亦一證也戰國䇿蘇子為趙合從説魏王曰大王之地北有河外注曰河外即河南地不又一證耶史記廉頗藺相如傳秦王欲與趙王會于西河外澠池注曰在西河之南故云外則又一證矣又按戰國䇿黃歇説秦昭王曰王又舉甲兵而攻魏杜大梁之門舉河內注曰屬司隸正義云即懷州也在河南之北西河之東東河之西是古未嘗不專以懷州為河內也漢書地理志河內郡有懷縣下注曰莽曰河內是莽已以懷為河內不止今水經注大梁靈邱之誤左傳桓九年云云按戰國䇿須賈為魏謂穰侯曰初時惠王伐趙戰乎三梁注曰春秋秦取梁漢夏陽也河內有梁小邑也陳留浚儀大梁為三皆魏地太原第二則云舊唐書崔神慶傳曰則天時擢拜并州長史先是并州有東西二城隔汾水神慶始築城相接每嵗省防禦兵數千人邊州甚以為便此即志所云兩城之間有中城者也汾水湍悍古人何以架橋立城如此之易按水經注汾水云水上舊有梁青荓殞於梁下豫讓死於津側亦襄子解衣之所在也此即指晉陽又按唐李績馬燧俱引晉水架汾河而東去故汾河東有晉祠水利若以語寧老亦必不信又按萬厯間有僧妙峯者立願於汾水上建橋鑿石於西山石條幾與山齊惜此僧不久即逝後取以包太原縣城者即此石也未用其百之一使此僧尚存橋必有成夫以一僧力尚如此况崔神慶以朝廷之力乎所為跨水聫堞合而一之如傳志所云者正不必為竒泰山立石云嶽頂無字碑世傳為秦始皇所立云云又云後漢書祭祀志亦云上東上泰山乃上石立之泰山巔然則此無字碑明為漢武帝所立而後之不讀史者誤以為秦耳按後漢祭祀志乃上石立之泰山巔注引風俗通曰石髙二丈一尺刻文曰事天以禮立身以義云云又張純傳上元封舊儀及刻石文刻石文即事天以禮等語也跋素問元人葛恆齋即可久諸父行也嘗立説以為醫當視時之盛衰為益損劉守真張子和輩值金人強盛民悍氣剛故多用宣泄之法及其衰也兵革之餘飢饉相仍民勞志困故張潔古李明之輩多加補益至宋之季年醫者大抵務守護元氣而已此説實發內經所未備跋家禮按年譜乾道五年文公年四十丁母祝孺人憂始輯家禮其明年書成門人黃勉齋作行狀謂其後多損益未暇更定楊信齋亦謂家禮乃初年本也今姑即喪制考之其與經傳異者五齊衰悉有衰負版辟領一也婦人不衰二也既葬無受衰三也大祥用忌日則僅得二十四月又一日似乖二十五月而畢之義四也若大祥僅二十四月一日假使禫祭得卜在二十七月後一旬則是間二月而禫非間月矣卜祭先上旬次中旬與禮喪事先逺日相反五也自明孝慈録集禮會典俱遵用此書以故沿襲至今殆非文公本意若萬厯中坊本間有增損則益失其舊矣唯此為正德以前所刻附以楊氏注劉氏增注補注雖有闕訛差可喜也跋火經余家藏是書不記自何年實方伯公與羣芳譜手授先祖者後羣芳譜不知何往而此書展轉流傳獨插敝架上似冥冥中有相之者今年入長安司寇公聞之欣然請觀遂以歸池北書庫幸題數語以見寒舍雖衰猶曽與髙門有孔李之舊云聞書庫饒異本只將宋王伯厚鈔本集及其門人袁清容居士集假閲可以計日奉還長安酒貴或不須我一瓻乎預白跋金石要例徐巨源曰古人合葬題不書婦今日暨配某者空同以後不典之辭也余徴之空同文集凡八篇題有合葬字無暨配字故曰以後其即指王道思輩哉頗不誤汪苕文與人書刻石時篆蓋及志文首行宜但云某銜某府君幸勿加暨配字面有碑刻文集可考古人非略之也於此固有深義蓋女子從夫故祭曰祔食葬曰祔葬凡祔食者惟立男尸而無女尸故曰同几則一尸亦此義旨哉言也余戊午己未間在京師見汪苕文繆封公墓志載及髙祖謂之曰古人敘人家世皆自曽祖以下無及髙祖者間及髙祖亦必以其人其事足書非空空僅及其名諱而已厯覽韓歐王荆公以及明初宋潛溪皆然此唐宋以來髙曽之規矩也但古人文多口訣未嘗筆諸書故難卒曉要在讀者善體會雖以君所痛詆之前輩猶不失此規矩其遺集可按也時苕文怒甚有代之答者曰家先生本元人余曰近得柳文肅集於廟市亦是曽祖敘起渠非元人耶後見三刻堯峯文抄此篇削去髙祖諱某某五字此又當為書祖文廣一例耳惜道逺不及質黃太沖黃太沖神道解有二余按後漢書中山簡王傳修冢塋開神道注曰墓前開道建石柱以為標謂之神道是又一神道解引孫何碑解不當遺文賦碑披文以相質以為始李翺又文心雕龍亦單名曰碑髙祖上一世則稱五代祖最確以此例之玄孫下一世則稱五代孫故漢書孔光傳光孔子之十四世孫是司馬光以孔順為孔子六世孫蓋自孫數起與古不合矣權文公為王端碑書孫以其葬王父白文公碑崔孚書孫以其求文余按元微之志杜甫書孫以其葬王父兼求文云至韓昌黎長女改適樊宗懿而李漢猶自居於子壻其故俟他日詳言之跋邵文莊簡端録余年二十五嵗始從同里吳太易先生學見先生手不暫捨此書間請而觀焉復於先生曰未見甚佳處先生微笑蓋先生病耳聾以為此自其恆狀越後二載取而復讀徹首徹尾不覺沉酣尋味者彌旬以復先生先生喜曰吾當日若嗤子子未必服固知吾子必有今日解悟在其善開發人如此跋春秋左傳屬事余年二十前從同里靳茶坡先生學此書蓋得於其家世頗希有紙亦糜爛不可久今冬豐暇日以錢百文付匠裝裱遂新若手未觸顔介有言借人典籍者闕壞就為補治此亦士大夫百行之一也况巳物乎吾子孫其謹識之顧寧人左傳杜解補正止引邵二泉左觽陸貞山左傳附注及此書辨誤而作未引趙子常補注縱間及其語似實未見全書近方一刻於崑山再刻於江都真元人所謂自科舉之學廢而古書稍出者也或難余今科舉未曽廢余答今科舉文字無復一毫體要幸中者至為人夢想所不及雖不廢猶廢矣噫首有太倉二王公序元美似一活套子隨題填寫元馭則道著肯綮或曰元馭以春秋舉南宫第一人號名家宜乎其言之津津有味余曰元美習周易何嘗不錯引為陳晦伯所駁正耶不覺一笑跋老蘇集楊用九自吳門歸以余好收書於時下刋本尤易致也購以餽余其籖題不曰老蘇全集而曰蘇老泉先生是父冒子號矣蓋蘇氏先塋有老人泉子瞻取以自號不知何年訛以稱老泉一辨於葉石林再辨於焦弱侯以家藏子瞻墨迹有東坡居士老泉山人圖書證尤妙此尚不曉何以刋為楊君謙見吳原博送新修姑蘇志正盥面瞥其籖題輒以水灑其使者不開卷擲而還之殆亦未為過矣越明年庚辰首春戴唐器書來憶東坡得鍾山泉公書寄詩為謝云寶公骨冷喚不聞却有老泉來喚人果老蘇號老泉坡敢於僧泉公者稱曰老泉乎真解頥新語惜不令焦文端聞之也古文尚書寃詞孔穿曰謂臧三耳甚難而實非謂兩耳甚易而實是人將從難而非者乎抑將從易而是者乎余則反其辭曰偽古文尚書甚難而實是不偽古文尚書甚易而實非人將從易而非者乎抑將從難而是者乎此余所以不復與毛氏辨而但付之閔默爾何休好公羊學著公羊墨守左氏膏肓穀梁廢疾康成乃發墨守針膏肓起廢疾休見而歎曰康成入吾室操吾矛以伐我乎余謂此自是學海逺遜經神故云爾若在今日豈其然跋僧某書千字文千字文本有二篇一周興嗣一蕭子範子範製久失傳而所次韻之書梁書以為羲之宋史以為鍾繇要梁書近而得其真或曰興嗣當梁武帝朝被敕撰文能不染佛氏一語信有徑骨者余謂四大字有二一出老子一出圓覺經詳篇中四大字非指地水火風乎然則時風衆勢所趨真能不染其片語隻字者不綦戛戛乎難哉僧家故習懷素書此獨宗晉人秀潤一洗惡習或疑轉捩太方是不知惟宋榻本乃見鋒稜耳題劉隨州詩集劉長卿之為盛唐也無可疑而分劉為中嘗推其故蓋髙柄誤讀中興間氣集以中興為中唐于是所遷錢起劉長卿等二十六人除孟雲卿外盡從而中之此致誤之由水心猶未核及至謂安祿山天寶三載為范陽節度使六載進御史大夫劉有落第送楊侍御赴范陽充安大夫判官詩詩云泣憐三獻玉此豈開元二十一年進士如極玄集所云者哉亦具眼人也刋正楊升菴石經考漢靈帝熹平四年蔡雍書六經於碑使工鐫刻立於太學門外此所謂一字石經也魏邵陵厲公正始中邯鄲淳書石經亦立于太學此所謂三字石經也晉裴頠為祭酒奏修國學刻石寫經是為晉石經後魏孝明帝神龜元年祭酒崔光請補漢所立三字石經之殘缺此魏立也非漢唐文宗開成二年國子監九經石壁成從宰相領祭酒鄭覃之請也今尚在孟蜀廣政十四年鐫周易至宋仁宗皇祐元年公羊傳工畢是為石室十三經仁宗慶厯初命刻篆隸二體石經後僅孝經尚書論語畢工是為嘉祐石經髙宗紹興間親書易詩左氏傳論語孟子及禮記五篇刋石孝宗淳熙四年始建閣以覆之是為紹興御書石經蓋古來凡七刻矣與升菴所考逈異跋周郡守晉祠碑亭記二則首論祀典釐正粹然經術之文也末及顧傅兩先生言又歐陽公集古録趙明誠金石録之流亞也至其文勢抑揚往復有一唱三歎之遺亦非歐陽公固不足辦此也愚嘗妄以晉祠有三絶吾師此記為文絶曹侍郎紀遊十二詠為詩絶傅先生大書晉源之柏第一章七字為書絶有此三絶然則晉祠之可堪共語殆不止貞觀片石而已也嗚呼此三絶者皆出於十數年之間何其盛歟豈非山靈之幸歟吾師嘗謂愚曰聖母廟既正矣而此地臺駘廟亦不可不正蓋臺駘廟之在晉澤者即左傳所謂障大澤以處太原可以獨祀臺駘而此地則宜并及實沈今廟內雜祀有土地五通二神而不及實沈是有汾神而無參神也是知有地理而不知有天文也豈可乎哉今亦不必别興祠宇惟于廟內去土地五通二神而增一實沈象而更其額曰臺駘實沈廟則允合於祀典矣蓋臺駘當顓頊世實沈當帝堯世以世次為位次固不可以左傳所序先後為拘也凡吾師之釐正祀典皆援經據義不爽錙銖則其涖政以來神和民安亦可概見於茲矣故附記之愚既跋吾師晉祠碑亭記訖復取縣志閲之見宣和五年有薑仲謙晉祠謝雨文其首云致祭於顯靈昭濟聖母汾東王之祠中云惟聖母之發祥兮肇晉室而開基王有文之在手兮其神靈之可知為之狂喜欲絶益歎吾師之言信而有徵也女郎祠之建實始於天聖而封號之加則自熙寧禱應始宣和五年上距天聖甫百年其建祠之故與所祠之人必厯厯有據故仲謙得之於傳聞而載之於撰著不然豈牽合傅會遂至此也元人弋彀撰重修汾東王廟記亦云女郎祠建因改封汾東王之後則其相因而及意有在矣乃祀典之訛實自洪武四年始詔革天下神祗封號止稱以山水本名而聖母廟遂改為晉源神祠若以聖母為真水神也者嗚呼不知此似是而實非也愚故詳考曲證以信吾師之説且以為他日作縣志者補焉跋太上感應篇右太上感應篇不知起自何時而唐宋經籍藝文志俱不載惟宋理宗命鄭清之作序自是始大行於世前代儒者如髙忠憲亦兩序其書抑聞之為惡或免於禍然理無可為之惡為善或未蒙福然理無不可為之善此主理言也天下孰有尊於理者哉竊以理即感得禍蒙福斯應之矣蓋未有感而無應者朴園先生外現儒風內修道行宜乎於此篇晨夕誦持不少懈獨歎余少曽有志中遂蹉跎對此不覺汗流竟趾跋賀黃公載酒園詩話老友吳喬先生嘗言賀黃公載酒園詩話馮定逺鈍吟雜録及某圍爐詩話可稱談詩者之三絶余急問賀書何處有曰金陵有即託黃俞邰使者購之不半月以書至同胡朏明細讀口眼俱快沁入心脾嘆吾老友之知言也康熙庚午秋洞庭東山席氏館題跋初刻唐百家詩選余與宋次道同為三司判官時次道出其家藏唐詩百餘編諉余擇其精者次道因名曰百家詩選廢日力於此良可悔也雖然欲知唐詩者觀此足矣右王荆公原序見集中者宋刻殘本失去余從集中取以冠卷端以見復荆公之舊云嘗聞前輩撰列朝詩集先採詩於白下從亡友黃俞邵及丁菡生輩借書每借輒荷數擔至前輩以人之書也不著筆又不用籖帖其上但以指甲搯其欲選者令小胥鈔胥奉命惟謹於搯痕侵他幅者亦並鈔後遂不復省視此與羣牧司吏遺籖置不取小詩上者何異古今事恆相類説者謂吏失之懶胥失之勤其為失則一可發一笑也今閲殘本八卷去取頗精足徵老眼無花則邵氏聞見録云云疑傳聞非實事而前輩指搯本余猶就俞邵家見之回憶五十載前曽遇閩中書賈持翻刻本正二十卷啓中丞公廣購之卒不可得五十載之事約如浮雲須臾變滅豈惟書可勝慨歎雖然羽陵之蠧復完河東之亡再覯安知今不有類於古為報中丞公且珍此以俟何如補刻唐百家詩選序今年中秋後三日大中丞宋公以賑荒舟過淮余以病未往謁公手唐百家詩選全本授謁者曰子為我致百詩作一序以賀余之遭彼序固有言珍此以俟俟焉果得矣命竟未達豈委之於草莽乎抑謂我老耄而舍我也既而有獻疑者曰吳下人好作偽紙非宋箋刻易而為繕寫安知不復如楊公濟所為以博公之一笑乎余獨以為不然公撫軍久吳人仰若神明非惟不可欺實不忍欺凡事且然况書籍乎有試之之法在髙􅕗見全本以玄宗皇帝早度蒲關為開卷第一今其書合乎合則真矣陳振孫見全本非惟不及李杜韓三家而王維韋應物元白劉栁孟郊張籍皆不及倘闌入以上之一首則不合合又真矣公觀詩之眼如月有隙斯昭茍出近人假託譬衣布衲者必不能如前刻八卷一色之精公固早辨及此而謂其不真可乎馬貴與著文獻通考憾延夀史無志故南北日食多異同其父門下士李謹思序按唐張太素叔姪撰魏志百卷天文尤備中州集蔡圭補南北志六十卷今亡矣夫安得二志忽焉呈現以為君書之助公茲殆有相之道耶雖然余更有請焉者聞前輩云吳武陵太守謝承後漢書方從哲從史館持去世遂不可得不知吾鄉陽曲縣張氏傳氏黃氏皆有緣城破失去此永樂年間揚州刋本也安知世不更有其書乎前輩苦求李燾續長編後於內閣抄卷初五大本絳雲樓災遂成燼後數十年錫山人從嘉興髙氏購得建隆至治平者質諸前輩前輩曰吾焚香一瓣首一叩始敢讀一版其欣賞如此安知世不更有熙寧後以補足乎日纂志於洞庭徐司寇出典籍庫中大元大一統志十數本皆蜀中地記尚有九百八十餘本曽見葉文莊家書目此志與經世大典並列安知世不更有足本乎又前輩慨唐會要不可見今復出吳草廬周禮考注儀禮考注年譜且不載其目今復出太常因革禮亡友吳志伊物也既失而復為司寇所收竊以以公之力上所已出者或寫或刋以廣其傳上所未見者積誠以求之寬嵗月以待之如是則大有功於斯文不獨詩已也余終始未見其全本漫以意序之如此云邱劄記卷五
