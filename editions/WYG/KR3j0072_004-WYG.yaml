body:
  text: 潛邱劄記卷四山陽閻若璩撰喪服翼註愚向謂有當請於朝早加刋正無疑誤後人者莫過王子有其母死者之註註引陳氏耆卿字夀老臨海人著孟子紀蒙曰王子所生之母死厭於嫡母而不敢終喪誤亦有自來趙岐註孟子王之庶夫人死廹於嫡夫人不得行其喪親之數當岐同時康成亦註孟子未知其解云何要喪服記公子為其母練冠麻麻衣縓緣既葬除之康成註曰諸侯之妾子厭于父為母不得伸權為制此服不奪其恩也傳曰何以不在五服之中君之所不服子亦不敢服也蓋諸侯尊絶旁期已下何有于妾公子被厭不敢私服其母父卒猶有先君餘尊所厭亦不過服大功其嚴如此晉胡澹所生母喪嫡母尚存疑不得三年以問范宣宣答曰嫡母雖貴然厭降之制父所不及婦人無專制之事豈得引父為比而屈降支子也説與鄭註合不知何緣孔穎達疏戴記多有厭于適母之説流傳至宋闌入集註朱子亦有取于此遂成不刋之典明初大明令載庶子為其所生母齊衰期注謂嫡母在室者後孝慈錄成益定制子為母雖父在庶子為其母雖母在皆斬衰三年於序文中特言之何其甚也夫母在為所生斬猶可言也父在為所生並同不可言也始焉非所厭而云厭猶知有母也既焉竟無復有所厭是不知有父也冠履倒置至此極矣推其失集註實不能辭且公子為其母練冠之下麻衣之上仍有一麻字盖以麻為絰帶何竟遺去是不獨請早加刋正且加補正云爾余既緣孟子而斷曰母不厭子因徧檢儀禮禮記註疏又得五言曰祖不厭孫舅不厭婦姑不厭婦夫不厭妾女君不厭妾若此者亦可作經讀鄭康成言服之降有四君大夫以尊降公子大夫之子以厭降公之昆弟以旁尊降為人後者女子子嫁者以出降余謂仍有以餘尊降如父卒服未除而遭母喪仍服期公之庶昆弟為母妻昆弟止大功蓋一為父之餘尊所厭一為先君之餘尊耳又殤以年降是服之降有六也若此者亦可補入註疏或問母不厭子姑不厭婦則吾既聞命矣乃若宗子母在為妻禫似仍有相厭之意特為宗子妻尊夫為妻伸禫耳余曰否此自為同宗男女宗子之母在則不為宗子之妻服補明一筆夫仍禫耳故朱子言喪服小記是解喪服傳孔穎達疏嫌畏宗子尊厭其妻果爾當云雖宗子為妻禫不得有母在字面陳澔集説然則非宗子而母在者不禫矣説益非期之喪有禫者二父在為母為妻是也三年之喪亦有不禫者二臣為君三年而后葬者但有練祥而無禫是也或曰臣為君僅二十五月輙除無復禫見通典鄭學之徒所云渠何從而知之乎余曰以喪服小記列當禫之喪有四曰為父為母為妻為長子孔疏復補出二禫曰妻為夫為慈母不曰臣為君故知之或又問父在為母期期之喪莫有重焉為妻服與此同得毋甚與曰非甚也段成式酉陽雜俎解得致精一切傳註未及曰今之士大夫喪妻往往杖者㨿禮彼以父服我我以母服報之杖同削杖也使子夏復生聞之亦應首肻且不特削杖一也拜用稽顙二也十一月而練十三月而祥十五月而禫三也為母期雖除猶申心喪三年為妻禫已過夫必三年然後娶以達子之志種種皆同豈他旁親之期所敢並與禮有六不厭而有二厭一曰君厭臣公卿大夫厭于天子諸侯降其衆臣布帶繩屨是一曰父厭子父在為母降至期父卒直伸三年之衰不伸斬是或問何不云夫厭妻余曰妻之言齊也體與夫敵不得厭之使無服或服為之降當又得一言曰夫不厭妻以補註疏然則妻之不厭也貴也妾之不厭也賤也貴貴賤賤門内之治定矣女女子為曽祖父母祖父母是正尊雖出嫁亦不降為世父母叔父母姑姊妹是旁親雖未嫁茍十五已後即逆降父為嫡子三年斬縗而不去職者盖崇禮殺情也父在為母縗期却罷職居心喪三年則情伸而禮殺范甯言子夏傳既云以支子繼大宗則義以暢矣不應復云適子不得繼大宗此乃小宗不可絶之明文矣余謂絶有二有天然而絶者有以後人而絶者茍天然而絶在大宗則為之置後俾適適相承統領百世之族人若小宗則聽之不必復取他支子以後之盖彼不過五世則遷耳此大宗小宗之别也何休曰小宗無後當絶斯言得之賈公彦曰適子不得後人無後亦當有立後之義斯言失之汪氏琬與予論禮服京師不合頗聞其盛氣既而歸近且合刋正續藁悉改而從我其中儀禮説二條有可喜者亟錄于此一曰先王之制禮也在父黨則父子昆弟重而于父之姊妹恩殺矣故服諸父期服姑姊妹大功在母黨則母之姊妹重而于母之昆弟恩殺矣故服從母小功服舅緦先王所以嚴内外别男女而逺嫌疑者也唐太宗謂加舅服使與姨母同太宗知禮孰不知禮二曰凡父黨之尊者由父推之皆父之屬也世父叔父從祖祖父是也至父之姊妹則不可謂之父不可謂之父其可謂之母乎二者皆不可以名故聖人更名曰姑爾雅謂我姑者吾謂之姪盖姑亦不敢以昆弟之子為子也凡母黨之尊者由母推之則皆母之屬也從母是也至母之昆弟則不可謂之母不可謂之母其可謂之父乎二者皆不可以名故聖人更名曰舅爾雅謂我舅者吾謂之甥盖舅亦不敢以姊妹之子為子也此先王制名之微意也予謂爾雅僅有謂我舅者吾謂之甥一語若二語並列即出子夏傳文汪氏小誤章子留書曰母之兄弟曰舅父之姊妹曰姑舅母之次也姑父之次也婦人謂夫之父曰舅母曰姑舅父之次也姑母之次也白虎通亦云尊如父而非父者舅也親如母而非母者姑也余亦曰男子謂妻之父曰外舅母曰外姑盖彼以我之父為舅我亦從而舅之懼其同於母黨也故别曰外舅彼以我之母為姑我亦從而姑之懼其同於父黨也故别曰外姑女子謂母之兄弟曰舅謂夫之父亦曰舅謂父之姊妹曰姑謂夫之母亦曰姑盖女子居然以父母視其夫矣女子以父母視其夫可以在室服父母之服服舅姑似猶不可三年之喪又有無禫者二一心喪一追服三年者心喪以二十五月為限見宋元嘉之制追服三年無禫見梁天監二年何佟之議古者男子有五斬女子止一斬在室為父出嫁為夫當其為夫且降父之服而為期矣何有于舅失禮自唐貞元中始也今也男子除父為長子之服臣為君之服斬反有八盖母加服斬自明孝慈錄始也母既然于是承重之祖母所後之母皆然繼母慈母亦皆然合數之男子有八斬女子服母繼母與父同是在室有三斬嫁服舅姑并及承重之祖舅祖姑所後之舅姑繼姑慈姑亦皆斬合數之女子有九斬焉何斬之多也盖服制之變于是為巳極汪氏琬臨歿删其稾為堯峯文鈔戴晟西洮購以示我讀之頗有幽㝠之中負此良友之感盖為余所駮正者悉刋以從我有駮正而未及聞于彼者承譌仍故將來恐疑誤後生不小一為喪服或問一條一為答或人論祥禫第二書是也西洮請徵其説余曰同母異父兄弟之服檀弓以為大功非同父異母者汪氏乃為之服曰禮同父母之昆弟期同父異母之昆弟大功憶五十人初授翰林官訖有問此中人物云何者余答以若吳任臣之博覽徐嘉炎之彊記可稱二妙若李因篤之杜撰故事汪琬之私造典禮恐亦未必有三焉一時流傳以為口實私造典禮正坐此等耳答或人論祥禫第二書曰昔漢儒有主二十七月者此據服問中月而禫之説也魏儒有主二十五月者此據三年問二十五月而畢檀弓祥而縞是月禫之説也唐儒又有主三十六月者此據喪服四制喪不過三年三年而祥之説也譌尤不可勝言三年之喪天經地義所在古今來凡數大折衷為鄭學之徒者一説王學之徒者一説杜君卿通典出復又一説直至宋英宗治平二年禮院奏曰謹按禮學王肅以二十五月為畢喪而鄭康成以二十七月通典用其説又加至二十七月終則是二十八月畢喪而二十九月始吉盖失之也祖宗朝據通典為正而未經講求故天聖中更定五服年月勅斷以二十七月今士庶所同望仍遵用大哉斯奏真所謂羣言淆亂折諸聖者矣今漢儒主二十七月自指康成然服問無中月而禫之文間傳有之當改作間傳唐儒主三十六月當改作二十八月方合且所據乃間傳又期而大祥素縞麻衣中月而禫禫而纎無所不佩之文並非喪服四制汪氏云云唐無是人人無是説者也東海公聞而特過我曰唐實有主三十六月者子知之乎余曰知之新唐書王元感傳載元感初著論三年之喪以三十有六月􅃫閣舎人張柬之厯破其説曰云云當世謂柬之言不詭聖人而元感論遂廢此最作史者妙處盖世逺言湮邪説易以誣民故不載元感原文者不足載也却載他人之文於元感傳中以正元感也汪氏果指王元感乎則犬之拾骨而已矣尚不至此大抵讀書不深又健忘耳東海公曰善弟將轉告汪鈍翁已而不果余復有感宋英宗治平二年乙巳至孝宗乾道五年己丑凡一百五年朱文公居母祝令人憂輯家禮小祥用初忌大祥用第二忌日各短却一月與二十五月而畢相乖中月而禫乃中空一月今空至二月方成二十七月重服减之輕服増之進退兩無所據不知世儒何緣獨譏王肅杜預以短喪黜其從祀也書為一行童竊以逃文公既歿書始出不及刋修以為一定遂成萬世闕典豈不惜哉噫文公若此於汪氏乎何誅或問律文夫凡承重妻並從夫服但爾時姑尚存自應服其舅或姑斬妻從之是一時而有二斬矣抑不從耶余曰禮有之有適子者無適孫則有適子婦者無適孫婦可知也仍服大功或曰婦人既嫁從夫夫天也妻其敢貳于天乎余曰夫服祖父母期妻則大功夫服本生父母期妻亦大功不從夫而服者多矣奚有于是或問祖卒孫既承重訖矣久之祖母卒孫又應承重但祖母其所生者也承則無重之可言不承則己巳名為適孫將若何余曰喪服小記祖父卒而后為祖母後者三年疏曰此一經論適孫也律文適孫祖在為祖母承重止齊衰杖期亦指適孫非庻孫也竊以庶孫可立而為適孫妾必不可以升為妻仍服期汪氏琬有妾宜無服一篇或難妾之子而既貴矣天子且許之貤封而家長獨不可援古而服緦乎琬曰天子自貴其卿大夫之母家長自賤其妾律文之與勅也誥也是皆出於天子並行不悖者也或又難律文得毋有闕與曰國家辨妻妾之分嚴適庶之閑其防微杜漸也可謂深切著明矣而又何闕文之有或問古者父妾不論有子無子皆得謂之母唐開元禮則云庶母父妾之有子者始為之緦此子字男耶女耶余曰開元禮不可知若今律文與此同者則指男而非女矣何以騐之子即齊衰杖期條之適子衆子斬衰三年條之所生子之子也或曰安知其非女女無杖此有杖故知指男子也然則宜何稱律文父妾無子則不得以母稱今既已有女為吾之姊若妹也者吾亦從而母之奚不可但不敢加服焉是于明太祖隆妾之後而少寓殺抑之微意似為先王之所許者里中劉氏之喪兄既不拜弟有以嫂可拜其叔為疑者余曰鄭康成有言正言嫂叔尊嫂也若兄公於弟之妻則不能也兄公今之大伯之稱大伯之尊於弟之妻猶嫂之尊於夫之弟雖在流俗大伯猶于弟妻弗拜則嫂不宜拜夫之弟何疑故曰夫妻牉合也又曰夫尊于朝妻貴于室矣或有庶母卒者其父既從律服齊衰杖期矣而子來問已宜何服余曰無服盖律所不載也或因問父既如是其重服子獨不可凖之而少降乎余曰此則以意自為服也不可之甚者也盖此服載明洪武七年孝慈錄原明太祖溺情于孫貴妃之薨變禮于懿文太子及諸王非其所生者一時制耳豈真謂有王者起視如金條玉律莫可擬議也哉噫沿之而誤且三百三十有二年矣自唐武后上元初表請升母服與父同然仍齊衰三年耳非至如明孝慈錄之一無差等母同父斬率情變禮之甚者也遵行且三百年未見有人焉議請刊正者豈非一懾于明太祖之嚴威再便于己情之得伸而無所復屈也哉然周公以來制服有齊衰杖期齊衰不杖期齊衰三月與齊衰三年並列為四齊自是沒不復見矣傷哉余嘗反覆思維欲上留古制而下適乎時宜不得已如作春秋調人也者為之議曰父在母沒請為母服齊衰三年父沒然後服斬衰則厭降之義既行免懐之恩亦報而人道不至流于野人者此為庶㡬耳喪服傳曰父在為母期屈也至尊在不敢伸其私尊也又曰禽獸知母而不知父野人曰父母何筭焉都邑之士則知尊禰矣喪服四制曰資于事父以事母而愛同天無二日土無二王國無二君家無二尊以一治之也故父在為母齊衰期者見無二尊也此三條者能日百徧誦之則褚無量所歎俗情膚淺不知聖人之心者庶其有悟乎胡致堂真西山並以漢文短喪詔其大指盖為吏民初未及於嗣君説非也漢文明詔天下吏民令到出臨三日皆釋服三日者吏民之服也殿中當臨者皆㠯旦夕各十五舉音禮畢罷以下服大紅十五日小紅十四日纎七日釋服三十六日者殿中當臨者之服也殿中當臨非太子與百官而誰哉然文帝之意則詔天下以為已而服非詔天下以盡為其親而服是文帝固未嘗教天下以薄其親也然此詔以後天下不復有喪三年者矣嗚呼豈非上有好者下必有甚焉者與又豈非下之人祗從其意而不從其令與終西漢世服父喪三年惟原涉母喪三年惟薛修河間恵王良後母喪三年惟公孫𢎞師喪三年惟侯芭外此則杳無聞詩曰庶見素衣兮我心傷悲兮聊與子同歸兮其殆五子之謂焉杜元凱謂漢氏承秦率天下為天子終服三年是三年之喪在暴秦猶不廢也平帝崩王莽令吏六百石以上皆服喪三年是三年之喪在賊莽猶能復也由前言之則漢文之罪大矣由後言之則晉武亦未盡善也古者喪期無數孔穎達疏云哀除則止无日月限數也説頗非不若其疏三年問引此句云謂無葬練祥之數其喪父母之哀猶三年也故堯崩云如喪考妣三載則知堯以前已三年余謂豈惟堯以前盖自有天地即有人類有人類即有恩愛而喪紀緣之而興善乎荀卿言三年之喪人道之至文者也是百王之所同古今之所一也未有知其所由來者也此九字見前小戴綴於此小戴輯入經又言殺人者死傷人者刑是百王之所同未有知其所由來者也班固採入史兩未有知其所由來者也語致精百姓如喪考妣三載蔡傳云百姓圻内之民大非孔安國傳雖晚出然多本于王肅解百姓為百官盖有爵土者為天子服斬衰三年禮也内如舜及四岳九官等外如十二牧及十二州之諸侯孟子所謂舜帥天下諸侯以為堯三年喪是盖百姓二字孟子原知有舜在内方作此辯證不然果圻内之民孟子生千載下何從而知舜同諸侯為堯持服也耶此即以經解經恐元陳樵先生不應獨美于前矣後漢書李固傳昔堯殂之後舜仰慕三年坐則見堯于牆食則覩堯于羮此即舜居堯喪之實事註疏皆未之及通典宋庾蔚之曰女子既出則無厭馬融儀禮君母在則不敢不從服君母不在則不服註曰從君母為親服也君母亡無所復厭則不為其親服也自得伸其外祖小功也喪服小功章馬融曰除嫡子一人其餘皆庶子也開元禮曰出降者兩女各出不再降若兩男各為人後者亦如之羅虞臣長子亦可為人後議孫逺死而無嗣其弟重以長子彬後之或曰重之命非也長子不得為後曰斯重宗之義也吾將以重為知禮矣昔子思兄死而使其子白續伯父以主祖及曽祖之祭盖逺嫌也以弟代兄是謂奪宗以子繼伯父則有父命焉其孔氏之家之變禮乎重之命惡得為非潛邱劄記卷四
