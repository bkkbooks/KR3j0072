body:
  text: 潛邱劄記雜家類二雜考之屬提要臣等謹案潛邱劄記六卷國朝閻若璩撰若璩本太原人寄居山陽爾雅曰晉有潛邱元和郡縣志曰潛邱在太原縣南三里若璩以名是書不忘本也所撰有尚書古文疏證四書釋地及箋解困學紀聞皆别著録此書傳本有二一為其孫學林所刻一為山陽吳玉搢所刪定考若璩尚書古文疏證卷六第八十一條下有云潛邱劄記恐世不傳仍載其説於此然所載兩條一推春秋莊公十八年日食一推晉光熙元年正月七月十二月頻食今兩本皆無之葢其少年隨筆劄記本未成書後人掇拾於散佚之餘裒合成帙非其全也此本即吳玉搢所重定原刻首兩卷雜記讀書時考論多案而未斷此本刪併為一卷原刻卷三曰地理餘論以禹貢山川及四書中地名已詳疏證與釋地而此特其餘論耳此本次之卷二而取首兩卷内合於此一類者次為卷三原刻卷四上録雜文序跋卷四下曰喪服翼注曰補正日知録此本取首卷内涉及喪服者次喪服翼注後合為卷四移雜文序跋附補正日知録後為卷五原本以與人答論經史書録之卷五以考博學宏詞賦一首併雜詩若干首録之卷六詩賦非若璩所長且劄記不當及此此本刪去而存其與人荅論經史書為卷六葢學林徒綴輯其祖之殘稿欲一字不遺遂致漫無體例此本較學林所編尚有端緒今姑從之中間重見者四條三見者一條尚沿原本之誤今悉為之刪正若璩學問淹通而好負氣求勝與人辨論往往雜以毒詬惡謔與汪琬遂成讐釁頗乖著書之體然記誦之博考核之精國初寔罕其倫匹雖以顧炎武之學有本原日知録一書亦頗經其駁正則其他可勿論也兹編雖輯録而成非其全豹而言言有據皆足為考証之資固不以殘缺廢之矣乾隆四十五年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:4059eb963fd19de872e74b3efe9a159a3e6ca5d6f20d8e518a9a094277f08c14
