body:
  text: 潛邱劄記卷一山陽閻若璩撰周靈王二十二年庚戌即魯襄公二十二年是年冬十月庚子日先聖生十月庚子即今之八月二十七日出孔庭纂要金氏前編云史記載采薇之歌詞怨而氣弱絶與孔孟所言夷齊氣象不同外紀取之古史亦不取焉古以車戰春秋時鄭晉有徒兵而騎兵蓋始於戰國之初曲禮前有車騎六韜言騎戰其書當出於周末然左氏傳左師展將以昭公乘馬而歸已有騎之漸釋例終篇云稱凡者五十其别四十有九蓋以母弟二凡其義不異故也隋志有春秋五十凡義疏二卷通鑑載子思言苟變於衛侯在安王三十五年大事記云去孔子沒百有三年子思逮事孔子未必至是時尚存薛常州亦云子思之年母乃過於壽考乎戰國䇿云不聞老萊子之教孔子事君乎示之其齒之堅也六十而盡相靡也孔叢子云老萊子謂子思曰子不見夫齒乎雖堅剛卒盡相摩舌柔順終以不敝漢藝文志老萊子與孔子同時當從國䇿紹興古器評曰周犧尊規橅甚大制作純古其上作兩犧突然而起通體飾以雲雷叨餮真周物也自漢儒釋犧為莎制器者遂至刻以鳯皇之象其形婆娑然曲從臆斷遷就其義今觀此器知漢儒為陋矣博古圖曰周犧尊二魏太和間得尊於青州其制樣正與此類王肅注禮以犧象二尊並作牛象之形而鑿背為尊則其說蓋有自來也漢儒之說以為犧讀如婆娑之義而刻鳯皇之象其形婆娑然方是時其器祕於潛壤未之或見則曲從臆斷而遷就其義以今觀之蓋可笑矣周象尊今全作象形而開背為尊禮記犧象周尊也鄭氏則曰以象骨飾尊阮氏則曰以畫象飾尊殊不合古此作象形而出於冶鑄則鄭阮之謬概可考矣其所以然者三代之器遭秦滅學之後禮樂掃地而盡後之學者知有其名而莫知其器於是為臆說以實之以疑傳疑自為一家之論牢不可破安知太平日久文物畢出乃得是器以證其謬耶周素犧罍考犧之字至漢鄭元釋犧為莎又或作獻戲其字不同其為義一也後世用莎之語遂飾以鳯皇婆娑之狀曽不知止以犧為飾耳因其字畫形聲舛訛故器亦失其制度考是器耳鼻皆以犧為飾狀若牛首大槩與周犧首罍相類但兩耳連環為小異也顔真卿家廟碑銘云祖昭甫工篆籀草隸書與內弟殷仲容齊名而徑利過之父惟貞少孤育於舅殷仲容氏蒙教筆法則亦以妻弟為內弟然而非空同所知吕伯恭大事記朱子謂其有纎巧處如指公孫𢎞張湯姦狡處皆說得羞愧殺人愚謂朱子之說白樂天也亦然曰樂天多說其清髙其實愛官職詩中凡及富貴處多說得口津津地涎出此豈不令人愧殺乎至論陶淵明則不然曰晉宋間人物雖曰尚清髙然箇箇要官職這邉一靣清談那邉一靣招權納貨淵明真箇是能不要此所以髙於晉宋人物嗚呼此可謂深得淵明之心者矣乃蘇子瞻者生平嘗慕二公至為之辭曰淵明形神似我樂天心相似我合二公而並稱之其無乃未識二公之心也歟趙岐序孟子孝文皇帝欲廣游學之路論語孝經孟子爾雅皆置博士後罷傳記博士獨立五經而已朱子謂其說為妄孟子爾雅皆置博士在漢書并無可考不知漢書固嘗有其說也劉歆移太常博士書孝文皇帝世尚書初出於屋壁詩始萌芽天下衆書往往頗出皆諸弟子傳說猶廣立於學官為置博士此非孟子爾雅皆置博士之明驗乎特未見儒林傳耳其謂後罷傳記博士獨立五經則指武帝建元間而言蓋武帝以董仲舒對䇿凡不在六藝之條孔子之術者皆絶其道勿使並進故止立五經博士然論語孝經謂之非六藝則可謂之非孔子之道而亦罷黜之可乎哉嘗考諸兩漢論語雖不立學官如蕭望之張禹包咸包福輩猶以之授皇太子與天子及博士弟子試亦以之射䇿至和帝末徐防始奏論語勿以射䇿冀令學者専經雖所失或久差可矯革夫曰所失或久則論語之與五經同射䇿固非一日矣此又論經學者不可不知也歐陽公曰令狐楚碑文大師泥洹茶毗之六年余以門下侍郎平章事攝太尉泥洹茶毗是何等語宰相坐廟堂之上而口為斯言耶臯䕫稷契居堯舜之朝其語言尚書載之矣異乎此也論衡别通篇云禹主治水益主記異物海外山表無逺不至以所聞見作山海經非禹益不能行逺山海不造然則山海之造見物博也董仲舒睹重常之鳥劉子政曉二負之尸皆見山海經故能立二事之說使禹益行地不逺不能作山海經董劉不讀山海經不能定二疑胡渭生朏明解關雎曰流訓求未得也采則得之矣芼謂既得而擇之也字義具見淺深不必改訓况詩之用字亦有變文以協韻而義無所别者如實命不同實命不猶何以畀之何以豫之同猶畀豫豈亦有淺深之序乎士冠禮鄭注婦人於丈夫雖其子猶俠拜俠音甲俠拜者前後兩拜婦人先一拜男子答拜婦人再一拜謂俠一拜在中士婚禮婦拜扱音插地鄭注扱地手至地也婦人扱地猶男子稽首賈疏手至地則首不至手空首拜頭至手所謂拜手也鄉飲酒禮主人西南靣三拜衆賔衆賔皆答一拜鄭注三拜一拜示遍不備禮也賈疏衆賔各得主人一拜主人亦遍得一拜是不備禮鄉射禮主人西南靣三拜衆賔鄭注三拜亦遍也衆賔皆答一拜鄭注一拜不備禮也特牲饋食禮三拜衆賔賈疏衆賔無問多少總三拜以賤旅之衆賔共得三拜也少牢饋食禮主人西靣三拜𧃊者鄭注三拜旅之示遍也有司徹主人降南靣拜衆賔於門東三拜鄭注言三拜者衆賔賤旅之也少儀鄭注肅拜拜低頭也手拜手至地也婦人以肅拜為正凶事乃手拜耳為喪主則不手拜者為夫與長子當稽顙也其餘亦手拜而已矣草廬言鄭康成於中庸二十九字止以十三字注之朱子深有取焉初不曉所謂後讀朱子語類乃雖有其位一段鄭氏曰言作禮樂者必聖人在天子之位朱子稱其甚簡當以為古注有不可易是也古以百步為畝今以二百四十步為畝古之百畝當今之四十一畝也古者之甲以革為之故函人為攻皮之工後世始用金曰鎧歸熙甫上公車賃騾車以行熙甫儼然中坐後生弟子執書夾侍嘉定徐宗伯年最少從容問李空同文云何因檢空同集中于肅愍廟碑以進熙甫讀畢揮之曰此亦無他只文理不通耳偶拈一帙得曽子固書魏徴傳後文挾册朗誦至五十餘遍聽者皆厭倦欲卧而熙甫沉吟咏歎猶有餘味宗伯每嘆先輩好學深思非後生所能窺也崑山吳喬論八比時文曰自六經以至詩餘皆是自說已意未有代他人說話者也惟元人就古事作雜劇始代他人說話八比時文雖闡發聖經非注非疏代他人說話亦然我故曰俗體也張彥逺名畫記吳道子畫仲由便戴木劍閻令公畫昭君已著幃帽殊不知木劍創於晉代幃帽興於國朝舉此凡例亦畫之一病也晉書天文志惠帝光熙元年正月戊子七月乙酉並日蝕十二月壬午又日蝕按通鑑目録是年閏八月象緯訂曰天無體以二十八宿為體天無度以日月之行為度天無赤道以南北極為凖而分之為赤道天無黃道以日躔之所經為黃道天無十二次以日月所宿之次為十二次隋書天文志後魏末清河張子信學藝博通尤精厯數因避葛榮亂𨼆於海島中積三十餘年専以渾儀測候日月五星差變之數以算步之始悟日月交道有表裏遲速五星見伏有感召向背唐書厯志僧一行日度議曰康王十二年歲在乙酉六月戊辰朔三日庚午故畢命曰惟十有二年六月庚午朏越三日壬申王以成周之衆命畢公自伐紂及此五十六年朏魄日名上下無不合而三統厯以己卯為克商之歲非也夫有效於古者宜合於今三統厯自太初至開元朔後天三日推而上之以至周初失之先天蓋益甚焉是以知合於歆者必非克商之歲自宗周訖春秋之季日却差八度康王十一年甲申歲冬至應在牽牛六度周厯十二次星紀初南斗十四度於太初星距斗十七度少也古厯分率簡易歲久輒差達厯數者隨時遷革以合其變春秋日食合者十八莊二十六年僖五年文十五年宣十年成十六年襄十四年襄二十年襄二十一年九月襄二十三年襄二十四年七月昭七年昭二十一年昭二十二年昭二十四年昭三十一年定五年定十五年哀十四年是也通鑑天寶九載八月辛卯處士崔昌上言案是年八月丁巳朔無辛卯後讀𤣥宗本紀九月辛卯以商周漢為三恪蔡公鶴江在詞館與新都楊升菴友善姓名字見升菴文集卷五十七云松江陸子淵深語豫杜詩麗人行古本珠壓腰衱穩稱身下有足下何所著紅蕖羅襪穿鐙銀二句今本無之淮南蔡衡仲昻聞而擊節曰非惟樂府鼓吹兼是周昉美人畫譜也近朱錫鬯遍考宋刻本並無知係楊氏假託余家有宋本檢之亦無因思紅蕖羅襪即用杜詩羅襪紅蕖艷穿鐙銀用韓偓馬上見詩和裙穿玉鐙杜詩無一字無來處故作杜詩者亦須字字有本也疑淮南擊節之言亦係楊氏假託以自重特為辨之或問季友有大功於魯受費以為上卿自此以往季氏將世世執魯國之柄乎余曰未也僖十六年季友卒而臧文仲執政文十年臧孫辰卒而東門襄仲執政宣八年仲遂卒而季文子執政故成之世文子曰相二君襄之世文子曰相三君文子始見文六年是文子初立猶未相也况前此乎右司馬范欽字堯卿號東明性喜藏書購海內異本與王鳯洲家歲以書目取較各鈔所未見相易故浙東藏書家以范氏天一閣為第一輟耕録今人謂駔儈為牙郎本謂之互郎謂主互市事也唐人書互作㸦本與牙字相似因訛而為牙耳黃太冲論卦變曰李挺之所傳變卦反對圖可謂獨得其解而又與六十四卦相生圖並出則擇焉而不精也其後來知德頗以此說變而以反對者為綜竒偶相反者為錯於頥過八卦相反之外取反對者而亦復錯之不知竒偶相反之中暗寓反對非别出一義也若又有相反一義何以卦爻略不之及乎為卦爻之所不及者可亦無待於補矣詩詀云九拜鄭說皆非一稽首謂下手至地稽留乃起二頓首謂下手置首於地即起三空首謂下手首不至地四振動謂恐悚迫蹙而下手五吉拜謂雍容而下手六凶拜稽顙而後拜七竒拜竒不偶也謂禮簡不再拜也八褒拜謂答拜也古文報亦作褒九肅拜謂直身肅容而微下手如今婦人拜鄭以稽為頭至地頓為叩地空為頭至手所謂拜手吉為拜而稽顙凶為稽顙而后拜竒為先屈一膝或為倚拜鄭司農以褒拜為持節拜鄭大夫以振動為兩手相擊皆非也楊維禎揖拜辨荀子大略篇曰平衡曰拜謂磬折頭與腰平如衡也下衡曰稽首至地曰稽顙大夫之臣拜不稽首以是推之則今折腰揖即古之拜也今之稽首揖即古之稽首也今之拜伏其頭至地乃類古之稽顙耳然今之拜自是古之跪俯伏三事殊與古拜不同今之揖其形用古之拜其聲用今之喏亦是兩事疑皆與古揖不同古揖舉手而無聲也古者不分銀錫而銀皆稱錫衛風如金如錫金為黃金則錫非銀乎考工記攻金之工皆曰金錫金即銅錫即銀也故曰金幾分錫居幾以為斧斤㦸刃之屬栗氏為量煎金錫聲中黃鍾之宫假如以今之錫豈可摻和作斧斤㦸刃而量能聲中宫乎况今之錫與銅亦不可摻和以冶也史平凖書漢食貨志皆稱銀錫漢武造銀錫為白金其稱猶為近古也越絶書赤堇之山破而出錫若邪之谷涸而出銅歐冶用以為純鈎之劍尤可證鑄兵用銅蓋必兼以銀乃淬利也措大出五代史東漢世家宋史趙汝談傳汝談天資絶人沈思髙識自少至老無一日去書册其論易以為為占者作書堯舜二典宜合為一禹功只施於河洛洪範非箕子之作詩不以小序為信禮記雜出諸生之手周禮疑傅㑹女主之書要亦卓絶特立之見劉元城歲晚閒居或問公何以遣日元城正色曰君子進德修業惟日不足而可遣乎商邱侯太常執蒲家世戍籍子恂為少司馬將去之太常貽書曰人盡以為苦如國家何若吾獨以為辱如吾祖宗何卒不易其籍胡三省注通鑑序曰嗚呼注班書者多矣晉灼集服應之義而辨其當否臣瓚總諸家之說而駁以已見至小顔新注則又譏服應之踈紊尚多蘇晉之剖斷蓋鮮訾臣瓚以差爽詆蔡謨以抵牾自謂窮波討源構㑹甄釋無復遺憾而劉氏兄弟之所以議顔者猶顔之議前人也人苦不自覺前注之失吾知之吾注之失吾不能知也劉攽中山詩話杜曰皂鵰寒始急白曰千呼萬唤始出來人皆謂語病事之終始音上聲有所宿留今甫然者音去聲二公詩自非語病黃中字仲庸官修撰與朱文公同時往復講辨欲於實地上用工不徒託之空言而已嘗校藝漕闈學禁方嚴中發䇿有云平居不以利祿入其心而培植涵養如木有根水有源用之則回既倒之狂瀾不用則倡和寂寞之濵亦足以名世任此責者誰與文公後見之曰近年若此等議論令人歎服唐舒元輿玉筯篆志論李斯李陽冰之書其辭曰斯去千年冰生唐時冰復去矣後來者誰後千年有人誰能待之後千年無人篆止於斯嗚呼主人為吾寶之王安石倉頡臺曰倉頡造書不詁自明嗚呼多言祗誤後生此一銘一詩俱有不可名言之妙宜三復焉楊文懿公守陳謂舜典象以典刑章乃舜命官語非史臣記事之詞湯𦙍績字公讓東甌襄武王曽孫也有問古名將者𦙍績以張巡嶽飛為第一其人曰嶽將軍則聞命矣張睢陽何如人𦙍績瞋目曰子不觀其對令狐潮之語乎卿未識人倫焉知天道自唐以下誰有為此語者其所見如此顔氏大宗碑顔君廟碑俱唐顔真卿書在今上元縣金陵鄉宋乾道中移入府學其碑座尚存故地猶名顔碑衝廟碑云含琅邪臨沂人隋元帝過江已下七葉葬在上元幕府山西七葉者含髦綝靖之騰之炳之見逺也八葉曰協為梁記室九葉曰之推則入北齊為黃門侍郎隋東宫學士十葉曰思魯入唐十一葉曰勤禮十二葉曰昭甫十三葉曰惟貞十四葉真卿兄弟凡七人真卿行六碑稱第七子似誤竊嘗妄論六經之外文之談理而達者無如莊子論事而達者無如國䇿後之作者能兼撮二書之勝無如蘇長公自韓昌黎振纍代之衰力去浮蔓以為竒怪然其句琢字錬猶在虛實之間至歐學韓而益暢之并去雕刻而務出於平易又一變焉長公後出與歐同工於用虛而筆力豪橫倐忽變化後有作者無以復變亦無復能逮矣歐陽公曰經非一世之書也其傳之謬非一日之失也刋正補輯非一人之能也使學者各極其所見而明者擇焉以俟聖人之復生可也齊東野語曰書籍之厄吾鄉故家如石林葉氏賀氏皆號藏書之多至十萬卷其後齊齊倪氏月河莫氏竹齊沈氏程氏賀氏皆號藏書之富各不下數萬餘卷亦皆散失無遺近年惟貞齊陳氏書最多蓋嘗仕於莆傳録夾漈鄭氏方氏林氏吳氏舊書至五萬一千一百八十餘卷且倣讀書志作解題極其精詳近亦散失萬厯中黨論起而吾邑榜名已衰故鄉先生無顯然為東林者以至膠庠閭里間皆莫能辨别邪正奄黨楊維垣戍此十五年問字者屨恆滿户楊亦繆為下士士益日附之家君嘗獨笑曰使此老戍江南不知何法可得生活矣楊又喜談制義毁應試童子大署其門曰授小兒祕訣夜半有人續其後曰醫太僕官方明旦楊視之大窘又維垣戍淮時畫明妃夢還漢宫圖卷以見志屬人題詠適同宗閻用卿先生自沛至謂人曰今聖明在上手定逆案如山楊名在案中果漢宫可還則逆案可翻矣諸君紛紛何為者楊聞之立取卷回後直指使者誣劾用卿楊亦與有力焉黃太冲律吕新書數義云鄭世子考羊頭山秬黍以時制等則稱之百粒得二分五釐積至兩籥二千四百黍重六錢則今之六錢為古一兩以約度量今之八寸即古一尺今之三斗即古一斛度以八為率量以三為率權以六為率宋程實之曰讀尚書當識唐虞三代氣象唐虞君臣交相警戒夏商以後則多臣戒君禹皋戒君警於未然辭亦不費夏商以後則事形而後正救之如髙宗肜日等篇反覆詳至不憚辭費矣癸辛雜識管寧初無白帽事獨杜佑通典帽門載管寧在家常著帛帽豈以帛為白乎唐書循吏薛克構列傳陳思忠居父喪詔奪服客往弔思忠辭以辰日不見克構曰事親者避嫌可也既孤矣則無不哭世服其言唐張懷瓘書品後漢杜林字北山扶風茂陵人凉州刺史鄴之子位至司空尤工古文過於鄴也故世言小學由杜公嘗於西河得漆書古文尚書一卷寶玩不已每困厄自以為不能濟於亂世常抱經嘆曰古文之學將絶於此初衛宏方造林及見則暗然而服既㑹靣林以漆書示宏曰常以此道將絶何意東海衛君復能傳之是道不墜於地矣子曰德不孤必有鄰豈虛也哉光武建平中卒靈帝時劉陶删定古文今文尚書號中文尚書以北山本為正陶亦工古文是謂就有道而正焉史稱吕正獻平生以人物為已任凡當世名賢無不汲引豫所尤異者濂洛關陕諸賢皆為所薦周茂叔傳載熙寧初知郴州用趙抃及吕公著薦為廣東轉運判官程伯淳傳載用吕公著薦為太子中允監察御史裏行程正叔薦則與司馬光共疏其行義詔為西京國子監教授尋擢崇政殿說書郎張子厚傳載公著言其有古學神宗召見授崇文院校書子厚弟戩亦薦焉邵堯夫雖未為所薦公著居洛中雅敬堯夫恆相從游為市園宅夫道學諸公之在當世貴近大臣能不出力排擊詆毁者已難又從而薦諸朝廷使一一獲其用焉嗚呼若正獻者不獨得以人事君之義其增光吾道為何如哉明之士夫積習師弟重於父子得罪於父母者有之得罪於座主者未之有也門戶重於師弟以師之門戶為門戶者固多不以師之門户為門户者亦不少也富貴又重於門户有始附正人既而與之為敵者有始主邪說既而窺其黨將敗遂反攻之者皆惑於富貴者也東林書院復於萬厯甲辰首善書院建於天啓辛酉天下書院毁於天啓乙丑復社起於崇禎辛未㑹試易曰積善之家必有餘慶積不善之家必有餘殃此主數而言也理在其中矣明太祖有言曰為惡或免於禍然理無可為之惡為善或未蒙福然理無不可為之善此主理而言也數有所不足道矣又曰彼為善而無福為惡而無禍特時有未至耳又未嘗不以數言也韓文公之壻李漢為文公作集序止稱門人而不稱壻朱文公之壻黃幹為文公作行狀止稱門人而不稱壻古人重道統而輕私親如此案皇甫湜韓愈墓志當愈在日其女已與李漢離婚改嫁樊宗懿其不稱壻蓋以此黃幹則但見韓集序文而不考韓女改嫁之故誤效其顰者也若璩重道統之說殊為謬誤謹附訂於此蘇子瞻一生人知其見厄於荆公而不知極得力於荆公方新法之行也子瞻力爭以致竄逐瀕死而不悔既成其為元祐之正人及新法之敗也子瞻鑒此遂不復言變更制度一意勸上以安靜又免其為早用之安石故由前言之則是其不善者惡之由後言之則是其不善者改之子瞻之為子瞻其妙正在於此蘇子瞻不附荆公易不隨溫公難感歐公之知易感韓公之愛難辨王鞏之當舉易劾周穜之妄舉難豫最愛淮南子曰知性之情者不務性之所無以為盡性也知命之情者不憂命之所無奈何安命也二語之妙置之先儒中殆不可復辨後讀莊子達生篇乃知其全本於莊子但易生字為性字便覺淮南為勝郭象注曰生之所無以為者分外物也知之所無奈何者命表事也二語亦妙論道當嚴取人當恕昔人以此八字為東坡論道之語秦滅魏聞張耳陳餘此兩人魏之名士名士之稱始於此新垣衍曰吾聞魯仲連齊之髙士也孔子順與安釐王論天下髙士曰其魯仲連乎髙士之稱始於此唐應德序董中峯集曰漢以前之文未嘗無法而未嘗有法法寓於無法之中故其為法也密而不可窺唐與近代之文不能無法而能毫釐不失乎法以有法為法故其為法也嚴而不可犯立儲與用人同一關紐宋王成器曰國家安則先嫡長國家危則先有功猶丁度對宋仁宗曰承平無事則守資格緩急有大事大疑則先材能之論是也然二者俱以人用法不以法勝人即在承平之世要當以治人為急耳豈真先嫡長而不問賢愚據資格而不核功罪乎今人稱廉恥二字輒相連其實廉易而恥難如公孫𢎞布被脫粟不可謂不廉而曲學阿世何無恥也馮道刻苦儉約不可謂不廉而更事四姓十君何無恥之甚也蓋廉乃立身之一節而恥實根心之大德故廉尚可矯而恥不容僞周子曰人之生大不幸無恥三代以下郭子儀之德比於周公而其福則過於周公狄仁傑之志苦於伊尹而其功則過於伊尹何以言之尹猶為其易而仁傑實為其難也尹能見信於百姓而仁傑不免見誣於酷吏尹所感格者大甲之非心而仁傑所轉移者女主之逆志也尹歸嗣王於亳都商未嘗亡仁傑復廬陵為太子唐革已久也孔子為命一章其示人以作文之法乎小子一章其示人以作詩之法乎孟子論武城取二三䇿便識得讀書之法論北山以意逆志便識得讀詩之法嘗考明世宗初以議禮而獲罪者如喬莊簡宇汪文莊俊何文簡孟春楊修撰慎石文隱珤林貞肅俊皆出於李西涯之門以議禮而獲進者如席文襄書方文襄獻夫霍文敏韜黃尚書綰皆出於王陽明之門西涯本以辭章教門人而門人據經守禮百挫不回陽明以理學教門人而門人反依附揣合以致貴顯人固不繫於師承如此歐陽公議濮禮為臺諫所共非獨蔣之竒傅㑹之而後之劾歐公者即之竒也張桂議大禮為舉朝所不容獨楊文襄極稱之而後之傾文襄者即張桂也故曰小人都不可與作緣歐陽公從祀在嘉靖中實永嘉以濮議而進之雖稱其功同於韓愈實以其議合於已私也又嘗過釣臺賦詩譏嚴子陵不為光武議禮而去夫已既徼一時之幸得君擅政聲勢烜赫亦可已矣而必欲牽合古人紛紛褒刺吾不知其於永叔何所加於子陵何所損也宋元祐中朝士以類相從有洛黨蜀黨朔黨之分又有不立黨者又有戅直無黨者至章蔡用而諸賢盡錮為奸黨是君子始異而終未嘗不同也萬厯中與東林相角者有崑黨宣黨又有齊黨楚黨三方鼎峙之名至魏閹出而諸黨盡化為逆案是小人始異而終亦未嘗不同也然君子始異而終同同歸於禍小人始異而終同同歸於利則其是非固不待辨而知矣王荆公為江東提㸃刑獄時與周茂叔相遇語連日夜荆公退而精思至忘寢食荆公博辨騁辭人莫敢與抗獨吕晦叔以精識約言服之荆公曰疵吝每不自勝一詣長者不覺消釋荆公之屈服於正人如此何一旦柄國愎諌自信豈真性之不可易邪抑貧賤時能下人而富貴後遂矜已邪韓魏公當英宗初屢以危言動太后後簾下忽問漢有昌邑王事如何公即對曰漢有兩昌邑王不知所問何王耶太后語便塞按兩昌邑王者昌邑王賀之父名髆武帝子初封昌邑王而賀嗣立者也公蓋援此以折太后若為弗識其意者而太后亦不復敢明言則上以全國體下以消母后之邪心孰謂宰相而可不用讀書之人乎徐文貞當國畢公在言路舉朝嚴畢公甚於文貞議且出畢公於外文貞曰諸公畏之耶皆踧踖曰豈謂畏之黃門切直慮其府禍耳文貞曰不然吾亦畏之顧念人孰無私私必害公有若人在不敢自縱可寡過也老杜寫懷詩無貴賤不悲無富貧亦足本阮籍大人先生傳中語傳曰夫無貴則賤者不怨無富則貧者不爭各足於身而無所求也韓魏公判大名上疏極論青苗法已而文潞公亦以為言帝曰吾遣二中使親問民間皆云便甚潞公曰韓琦三朝宰相不信而信二宦者乎至哉斯言真可以為人主之龜鑑矣豫因思當仁宗之時文潞公則能斬史志聰當英宗之時韓魏公則能竄任守忠而天子不以為専宰相亦不自以為歉何一再傳之後二公之人猶故也宰相之權猶故也而其言則不能與宦者爭勝負此無他人主之敬大臣與不敬大臣而已矣敬大臣則誠誠則明明則左右不得關其說不敬大臣則疑疑則暗暗則左右得以竊其柄故神宗之弊不在於過信大臣而在不信大臣然則神宗之於安石亦為不信乎曰以宦者而信安石吾猶以為不信安石也李方叔責蘇子瞻不薦已子瞻曰進退之際不甚慎靜則於定命不能有毫髮之增益而於道德有邱山之損矣此聖賢信命之言也然天下儘有勸人能信而已未必能信者及觀子瞻對宣仁太后曰臣雖無狀不敢自他途以進則公之對朋友即所以對君父者也與姪書曰獨立不懼者惟司馬君實與叔兄弟耳萬事委命直道而行縱以此竄逐所獲多矣則公之對朋友即所以對子弟者也蓋子瞻好士出於天性而責善出於血誠故能不欺如此王濟謂王湛家有名士三十年而不知山簡嘆吾年幾三十而不為家父所知然則骨肉中知已尤不易得邪豫獨怪以濤之鍳拔而不能識其子以湛之癡名而獨為濟所異知與不知似有夙因不可強也晉明帝微行於湖隂察王敦營壘敦遣五騎追帝帝馳去馬有遺糞輒以水灌之後五騎見馬糞冷以為信逺而止不追帝乃獲免此智即從虞詡增竈得來也蓋增竈以示強強則不敢追灌糞以示逺逺則不必追其多方以誤敵之計則一耳竟陵鍾伯敬集有遊武夷山記考其時乃丁憂去職枉道而為此豫謂伯敬素稱嚴冷具至性能讀書不應昧禮至此昔二蘇兄弟居喪禁斷詩文再期之內不著一字陸文安稱為知禮何伯敬嚴冷反不及二蘇之放曠者與登山何事聞訃何時而竟優游為之邪豫尤怪談友夏撰墓銘不為隱避不為微詞反稱其哀樂竒到非俗儒所能測噫三年之喪天下之通喪也豈不俗人之所能免與王通對楊素曰使公可慢則僕得矣不可慢則僕失矣得失在僕公何預焉與王昶戒子書曰若已有可毁則彼言當矣無可毁則彼言妄矣當則無怨於彼妄則無害於身又何報焉數語竟如出一口然昶以此自反通以此自解又似不同雖然通亦為譖已者言之耳若已果慢人聞人言方且慚謝之不暇又何敢以人之可慢而為我之得計哉故觀通之言者尤㑹於言之外可也韋昭領國史吳主欲為其父和作紀昭曰文皇不登位當為傳不當為紀以此忤㫖見殺昭可謂不墮史職矣近世大臣追崇人主之私親而又儼然纂實録以垂後世聞昭之言獨不少愧乎豫按以追諡帝而作本紀者自陳壽始以追尊帝而纂實録者自明世宗時始五代之亂典章倒置可謂極矣而趙鳯撰唐事於懿祖獻祖太祖曰紀年録於莊宗曰實録猶能以一字示輕重歐陽修因之以三祖世系事跡冠於莊宗之前而統曰唐莊宗紀嗚呼其知史職者哉雒閩源流録曰嘉靖乙亥御史論薛文清應祀典集羣臣議或謂瑄無著述而欲祀孔廟猶無汗馬之勞而欲配帝享於義不稱中允秦鳴夏疏爭曰興王之業固有不盡恃於汗馬者而况吾道之於著述耶自秦火烈異端熾諸儒之傳經守正有足多者時也逮夫理學既明家喻戶曉枝葉滋蔓戕害本根瑄獨反躬實踐厭斥支流遡尋正脉使學者曉然知所趨向此其功大於著述矣臣以為昭代必欲崇異從祀以風示來學非瑄不可鳴夏字子享號白涯臨海人嘉靖壬辰進士萬厯甲辰東林書院九日首㑹山隂劉念臺講克復章畢坐中尚論微不滿於薛文清無錫髙存之請故念臺徐曰易儲一事按薛文清公年譜景泰元年二月以大理寺丞督餉四川雲南明年二月歸易儲則景泰三年五月事公方為南大理卿明年九月調北文清時以大理卿理餉雲南歸而不諍猶曰位不在也于忠肅臨刑文清時在內閣建言云天子新復辟不宜誅戮以傷天地和氣于初擬極刑因文清言擬斬此事為慊心否乎存之曰論至此却不能為文清解可見後世眼可畏不為你絲毫隱漏也念臺又曰所以文清不久去位以為曹石之故非也只此事文清已不能安其位念臺將别去存之曰此㑹可以千秋愚按山隂此論其辭雖若不滿亦可謂善體文清之心矣益智録云椒山劾嵩原疏中有冒功一欵奉㫖下部查覆武選主事王之遴覆稿言嚴效忠鬼名實無其人嚴鵠黃口乳臭身未履邊何得冒叙以叨世襲之典兵部尚書聶豹嵩黨也見而令易之遴執不肯豹愠形於色之遴曰公講良知之學刻語録負盛名若抹殺定案公論之謂何豹擲稿於地曰汝為君子豹為小人耳乃潛致嵩自疏辭功而部疏不覆後豹以諛頌齊醮為世宗所厭斥去之真枉為小人矣之遴素與椒山交善左右獄中慨然以其女許其次子應尾士皆義之逮萬厯初為戶部尚書值議陽明從祀之遴曰某曽司理紹興備知陽明以才勝若實踐工夫難與薛文清同又言此公一生只是作用親見其居身居家無實學止以氣魄議論籠罩從學者又曰陽明從祀則朱晦菴吕東萊皆不足信大宗伯沈鯉遂具疏言守仁從祀宜俟論定不報閣臣申時行具揭以請上以中㫖豫之之遴號繼津北直霸州人漢書谷永傳書曰自絶於天顔注今文周書泰誓之辭按此乃僞泰誓又曰臣聞三代所以隕喪者皆由婦人與羣惡沈湎於酒書曰乃用婦人之言今按此亦僞泰誓延平府志曰按特奏名不在進士之科考明翰林王贊撰溫志謂屢試不第憫而收用謂之特奏名而莆田翰林黃仲昭撰通志亦於特奏名明經釋褐學究諸科之下各疏其義大抵謂其亞於進士科蓋宋志如此覽者可類推矣吳玉搢曰寧波府選舉志云特奏名者太宗特憫鄉舉之士屢試禮部不中終不得出身詔貢士至十五舉者徑許赴殿試授以郡縣散職謂之特奏名恩例嗣後减至四舉五舉即得奏名蓋初或一歲二歲一試後則定為三歲一試故也演繁露曰唐制取民者為租庸調三色其曰庸者一歲而用人力止於二十日役不及二十日則輸絹三尺是名為庸若有事而加役二十五日者免其調調謂輸絹銀之屬也中論治學篇曰故六籍者羣聖相因之書也修本篇曰夫施吉報凶謂之命施凶報吉謂之幸又曰然行善而不獲福猶多為惡而不得禍猶少總夫二者豈可舍多而從少也曽子曰人而好善福雖未至禍其逺矣人而不好善禍雖未至福其逺矣孔叢子曰夫子墓塋方一里在魯城北六里泗水上諸孔氏封五十餘所人名昭穆不可復識有碑銘三所獸碣俱存水經注今本孔叢子無此文拖紳使者入戶西行南靣立詔付璽書兩龔傳莽遣使者徴勝勝稱病篤為牀室中戶西句南牖下東首加朝服古人室中北墉而南牖墉墻也牖窗也室之南靣左戶而右奧牖則居中朱子曰讀書須到不忍舍處方是見得真味黃魯直曰棄書册而游息時書味猶在胸中陸務觀詩曰睡餘書味在胸中程伯子曰尚書論語可以逐句看易詩春秋不可以逐句看朱子曰詩書是隔一重兩重說易春秋是隔三重四重又曰論語要冷看孟子要熟讀東坡次孔毅父韻第三首云不如西州楊道士萬里隨身惟兩膝又云楊生自言識音律洞簫入手清且哀此綿竹武都山道士楊世昌字子京也又云西蜀道人楊世昌晉梅將軍廟在江寧府聚寶門外雨花臺東祀晉豫章內史梅公賾也賾嘗屯營此地舊名東石子岡後因公名梅嶺岡賾在豫章以古文尚書奏上元帝明王以旗廟碑略曰留都聚寶山麓有廟一楹蓋祀晉豫章內史梅公賾也始公居其地或云嘗屯營焉至今人稱為梅岡廟圯不治𢎞治中有僧感夢葺於永寧寺側凡禱輒應同郡張寅瞻拜廟下乃徴言鑱石余嘗愛顧大韶仲恭禮記正文序因加駮正存於此其序曰自樂亡而經止於五矣五經皆經也然愚謂戴記獨不可名經何者禮之經其典章綱紀之大載在周官而周旋曲折之細備於儀禮是二禮者真經也戴記直為之傅耳今讀其書大都周季諸儒之述作論議而秦漢人之所掇拾或厠焉蓋大戴之傳固已蕪矣小戴頗有删削然觀其黜夏小正而存月令則去取之間更多可議者今周官儀禮並廢而獨尊小戴之所記以為經恐好古之士有未安焉或者謂周官止一代之制而虞夏商之遺法往往散見於記中古稱禮儀三百而儀禮所存僅有十七則其所闕亡固不啻十之九矣而推類比附以求見先民之則亦必於記乎取之則二禮之廢似不為過而記之獨尊為經亦未為無說也自宋以前為禮家之學者惟知有鄭注孔疏耳然康成臆說昔人固已疑之苐以其耆德雄辨壓折千載而頴達直依阿其㫖無所是正自宣和有好古之主於是三代器物往往間出於墟塜伏匿之中而學者始知漢人之多謬然後鄭孔之說不信而陳氏之集說從此出矣然未有集說以前學者之患在於疑而不能明既有集說以後學者之患又在乎明而不能疑夫明而不能疑與疑而不能明均之非自得之學也故愚以為不讀鄭注無以窺宋注之源不讀陳說無以證漢注之誤不盡屏漢宋而專讀正文又無以深維作者之意而成自得之學則朴菴之刻正文其殆有微意乎語云熟讀百遍其義自見學者誠能沈酣於正文而後稽之鄭注以窮其源參之陳說以定其歸則於禮經思過半矣案隋經籍志小戴本四十六篇後馬融足月令明堂位樂記三篇方四十九今云小戴存月令未確徽宗大觀初詔倣李公麟之考古圖作宣和殿博古圖宣和蓋殿名非年號時尚未有此年號當云自大觀有好古之主至不讀陳說無以證漢注之誤陳氏謂犧尊刻為犧牛之形讀為娑音者謂畫為鳯羽婆娑然也犧尊畫鳯羽而象骨飾之故亦曰犧象又謂象象尊也以象骨飾尊其說仍遵用康成案宣和博古圖録犧則全作牛形象亦象形鑿其背以受酒者陳氏謂簠內圓而外方盛稻粱之器簋外圓而內方盛黍稷之器按博古圖録簠方簋圜內外並同皆熟食用七之器以銅為之非刻木陳氏謂罍尊畫為山雲之形亦本康成案博古圖録有犧首罍素犧罍象首罍麟鳯百乳罍叨餮罍諸罍致飾不一僅犧首間錯雲雷并無畫山雲象者陳氏謂觶三升角四升亦本康成康成則從韓詩說來若以諸觴形制同升數異名遂因之而判殊不知博古圖録有立戈觶容四合文貝觶容五合較雙弓角容七合者固小不又有容八合之山觶乎是觶角之别以形不盡以量仲恭所云何違反乃爾若通篇認四十九篇為記末忽云禮經不知禮經者漢儒儀禮之稱云爾或問博古圖録亦云木曰豆竹曰籩禮家之言知多出漢儒臆度今豆蓋以銅此足正陳氏禮運之說矣子何獨遺之余曰木豆謂之豆竹豆謂之籩乃爾雅釋器之文非出漢儒安知始不以木後乃範以金圖傳諸永久乎古器有難以一槩論者傅山先生長於金石遺文之學每與余語窮日繼夜不少衰止歎問余此種學正經史之訛而補其亡闕厥功甚大畢竟始自何代何人余曰魏太和中魯郡於地中得齊大夫子尾送女器有犧尊純為牛形王肅以證其羽婆娑然之說非是晉永嘉賊曹嶷於青州發齊景公冡得犧象二尊形為牛象傳至梁劉杳以證象骨飾尊之說非漢章帝時零陵文學奚景於泠道舜祠下得白玉琯古以玉作琯傳至魏孟康以證律厯志竹曰琯之說不盡然儒林傳伏生濟南人也魏張晏注曰名勝伏生碑云地理志魏郡黎陽黎山在縣之陽縣當名黎隂乃云陽者兼取河水在其陽以名晉晉灼注曰其山上碑實云水經注青州刺史傅𢎞仁說臨淄人發古塜得銅棺前和外隱起為隸字言齊太公六世孫胡公之棺也唯三字是古餘同今書證知隸自出古非始於秦顔氏家訓開皇二年長安民掘地得秦始皇草六年鐵稱權上有乃詔丞相狀綰之銘之推與李德林對讀則知本紀丞相隗林為俗書林當作狀凡是數說似未有先之者余嘗謂蓋代文人無過歐公而學殖之陋亦無過公傅山先生聞之曰子得母以劉原父有好箇歐九之云從而和之乎余曰非敢然實親驗之集古録跋尾因笑劉原父既對客言好箇歐九極有文章但可惜不甚讀書耳他日英宗語及原父韓魏公對以有文章歐陽公曰其文章未佳特博學可稱耳似屬相報原父文字正自佳鄭樵有言氏不同而姓同不可為婚姻若僅氏同如孔子之孔出於子孔文子之孔出於姞鄭有二孔氏出於姬此三孔固可相為婚何者姓不同故說是巳余謂亦有姓同如黃帝之子十二姓有巳姓傳至春秋為莒子為郯子祝融之後八姓亦有巳姓傳至商末為有蘇氏周初為蘇忿生此二巳何妨為婚姻何者以各有其所得之姓不同德故此亦從來論氏族者所未及也余嘗問人秦始皇何姓或對曰嬴或對曰姜皆非也此出自史記始皇本紀生於邯鄲姓趙氏蓋秦猶近古深得古者天子建德因生以賜姓之義猶黃帝以姬水成遂姓姬舜生於姚墟遂姓姚是也降至於漢人皆識其為姓陸賈曰秦任刑法不變卒滅趙氏燕王旦曰尉他入南陳涉呼楚近狎作亂內外俱發趙氏無炊火焉顔師古注無炊火言絶祀也正指始皇之姓言太史公遽謂秦以其先造父封趙城為趙氏豈其然哉孔頴達堯典疏曰百官謂之百姓者左傳隱八年天子建德因生以賜姓謂建立有德以為公卿因其所生之地而賜之以為其姓令其收斂族親自為宗主此即後代宗法之所由起乎朱子語類云韓無咎嘗說髙麗入貢時神宗諭進先秦古書及進來內有六經不曽焚者神宗喜詔欲頒行王介甫恐壞他新經奏云真僞不可知恐為外裔所欺因止今本亦不傳以某觀之實未必然蓋招來髙麗時介甫已不在相位且神宗剛明果有未焚書豈介甫力所能阻記得文昌雜録說髙麗進孝經緯只是䜟緯之書無進先秦古書事余案宋史髙麗入貢在熙寧四年五月置經義局則熙寧六年三月頒三經新義於學官又八年六月安石復相時事韓朱說皆差元王惲中堂事記云世祖中統二年髙麗世子植元史世祖本紀髙麗列傳並作愖植乃國王愖之父也來朝宴於中書省問曰傳聞汝邦有古文尚書及海外異書答曰與中國書不殊此蓋得其實矣音注資治通鑑序云自荀悅漢紀以下獨梁武帝通史至六百卷按此似以通史與通鑑同一編年體隋經籍志唐藝文志並列正史吳均傳武帝使撰通史起三皇訖齊代均草本紀世家畢唯列傳未就史通云其書以史記為本異者唯無表耳此豈編年體哉玉海入雜史類不入編年得之初智宣子將以瑤為後按張溥曰或問左氏終智伯通鑑始智伯通鑑所以接左傳者豈無說乎曰一以示興亡之戒一以著周秦之端晉陽之守趙以仁興决水之禍智以驕滅此興亡之戒也晉分則秦強秦強則周亡此周秦之端也綱目赧王三十六年趙王欲與樂毅謀伐燕毅泣曰臣疇昔之事昭王猶今日之事大王也若復得罪在他國終身不敢謀趙之奴𨽻况子孫乎趙王乃止按綱目减省通鑑原文為識者所不取此段則原文所無而綱目補出者煞有關係嘗問諸人人莫能應余考之出三國志魏武帝紀注引公十二月己亥令然則文公門人學儘博擇亦精矣朱錫鬯與顧寧人書采苓采苓首陽之巔釋者謂苓蘦也今甘草是也而枚乘七發云蔓草芳苓曹植七啓云寒芳苓之巢龜李善注並云苓古蓮字某因是悟向者箋釋之誤蓋苓之為蓮猶夫茄之為荷耳蓮水花也而采於山巔五沃之土産蓮而首陽至瘠之地正以喻人言之不足信也鄭氏以為首陽山之上信有苓矣豈不謬哉客舉以示余余曰此作小題時文者翻弄字眼伎倆耳何關經學試看下章采苦采苦首陽之下苦菜正生山田及澤中然則人言不又足信與客不覺笑且錫鬯言過矣古人詩皆被諸管絃音長而節舒若只一章止則短促不成節奏必合二章三章為一闋故有韻換而義關合者此苦與下是有韻換而無義意但取音相諧者又下章采葑采葑首陽之東是余請賦一詩以謝錫鬯曰采薇采薇首陽之西人之為言茍亦無隨舍旃舍旃茍亦無然人之為言胡得焉又曰采蕨采蕨首陽之北人之為言茍亦無惑舍旃舍旃茍亦無然人之為言胡得焉客遂大笑嘗思齊孝公名昭而其後有昭公宋平公名成而其先有成公為二國之臣子者稱昭公成公之諡則觸孝公平公之名諱孝公平公之名則廢昭公成公之諡此將若之何曰鄭康成之論諱禮曰於下則諱上不聞於上則諱下也猶之於後則諱前不聞於前則諱後也此自諡昭公與名平公者之失考耳於二公何與哉然則禮既失於前矣而為二國之臣子者終將若之何曰周人以諱事神名終將諱之諱之故諡之諡者所以易名之典也烏得而廢諸但為齊之臣子於昭公則稱昭而餘則否為宋之臣子於成公則稱成而餘則否此固諱之變禮也吾於是而知名子者不以國不以日月不以隱疾不以山川為其易及而難避也今獨不可增一例曰名子者不以諡乎以諡則將廢此諡矣明臣如陳文王文皆例應諡文以名文遂不得諡文亦可見矣或問傳記九月壬戌戰韓原經書十一月壬戌戰於韓杜氏以九月壬戍為月之十三日十一月壬戌為月之十四日事在前而書於後者從赴也經之從赴而書者衆矣何獨此而疑其為夏正耶余曰蓋從前後之文而决其為夏正也當秦伯伐晉卜徒父筮之吉曰歲云秋矣我落其實而取其材所以克也按禮季秋之月草木黃落草木零落然後入山林則所謂落實取材正夏之季秋之事豈孟秋乎已而果九月獲晉侯於韓則占者之言驗矣晉獻公筮嫁伯姬於秦史蘇占之曰不吉姪其從姑六年其逋逃歸其國而棄其家明年其死於髙梁之虛夫曰六年逋明年死則是逃歸之明年而死乃圉以二十二年秋逃歸二十四年二月始殺於髙梁則其言似不驗不知晉用夏正圉歸於二十二年秋者實歸於晉惠十三年之夏也懷殺於二十四年二月者實殺於晉惠十四年之十二月也其事之相去正隔一歲則占者之言又合矣此俱傳文用夏正之明驗也大抵春秋經文為聖人所筆削純用周正傳則旁采諸國之史而為之故其間有雜以夏正而不能盡革者讀者猶可以其意得之也或曰子以傳之九月為即經之十一月則傳之十一月為即經之明年正月可知矣其甲子可得而合乎余曰何不合之有自九月十四日壬戍數至明年正月朔為戊申隕石于宋五此即晉侯歸之月也自戊申朔數至正月晦為丁丑六鷁退飛過宋都此即殺慶鄭而後入之日也或曰晉侯之歸既應在明春而經不見其事何與余曰經從告告則書晉侯之歸不告亦猶晉重耳之入不告經固不得而書也或曰經既不書而傳記之亦應列其事於明春而傳繫之於去年之末者何與余曰此傳之例也傳固有或先經以始事者或後經以終義者如此傳本記韓原之戰而必追叙晉侯之入是先經以始事也此傳本記晉侯之獲並叙及晉侯之歸是後經以終義也只此一傳而春秋之例亦可類推矣貞觀君臣之盛蓋三代以下所絶無而僅有者也然余觀太宗之為君可謂知求治而不知正心魏徴之為臣可謂知規過而不知養德正程正叔所謂作事無本者故太宗之過滅於此而復生於彼懲於前而復作於後魏徴在則以人為之鑑魏徴亡雖以房喬之寵遇猶不敢諌東征之非而况他人乎故一時之所就止可有補偏救治之術而非有拔本塞源之功也向使太宗得伊傅之臣或濂洛之儒以為之輔佐則致治之美將上與湯文比烈矣豈直成康而已哉人知有齊威王之朝周而不知其後有趙肅侯之朝周人知有魯仲連義不帝秦而不知其先有孔子順義不入秦傅山先生少耽左傳著左錦一書祕不示人余初訪之松莊年將六十矣問余古人命名應有義但如文六年續鞠居乃狐射姑之族鞠居二字何義余曰案成二年齊師乃止次於鞠居杜氏止注鞠居衛地惟劉昭續漢書注於郡國志兖州封邱縣下引陳留志云有鞠亭古鞠居則知此蓋以地命名者因難何以晉人逺取衛地而名其子邪余曰則有風俗通義在俗說縣令問主簿靈星在城東南何法主簿仰答曰唯靈星所以在東南者亦不知也先生不覺笑憶甲子初夏自碧山堂移徐公建菴寓邸夜飲言今日某直起居注上云古人有言使功不如使過此語自有出既思不可得又不敢上問奈何余對丙午丁未間重䇿論讀宋陳𫝊良時論有使功不如使過題通篇俱就秦穆公用孟明發揮應是昔人論此事者作此語苐不見出何書耳公曰博越十五年讀唐書李靖傳髙祖謂靖逗留詔斬之許紹為請而免後率兵八百破開州蠻冉肇則俘禽五千帝謂左右曰使功不如使過靖果然謂即出此又越五年讀後漢書獨行傳索盧放諫更始使者勿斬太守曰夫使功者不如使過章懷太子賢注若秦穆赦孟明而用之霸西戎乃知全出於此處甚矣學問之無窮而人尤不可以無年也公凡於余考據辨析議論輒手録成帙署曰碎金以為談助惜此條不及入之也西園翰墨林按西園二字乃漢靈帝鬻官游戲之所通鑑稱於西園開邸立庫以貯天下之錢於西園弄狗張讓傳所謂當之官者皆先至西園諧價然後得去是也於文事無涉建安七子有西園字亦無涉因考舊本張說集是西垣與園音同翰墨林蓋題為恩制賜食於麗正殿書院宴賦得林字麗正殿書院即開元十三年四月改名集賢殿書院者按唐六典集賢殿在洛陽宫之右其為垣字無疑且以西垣對東壁何等工以天文興起下人文何等妙遍考髙􅕗唐詩品彚李攀龍唐詩選並作園知承訛久矣宜亟正之舊唐書馬懷素等傳史臣曰以西垣對東壁正指麗正殿余嘗發憤歎息前明三百年文章學問不能逺追漢唐及宋元者其故蓋有三焉一壞於洪武十七年甲子定制以八股時文取士其失也陋再壞於李夢陽倡復古學而不原本六藝其失也俗三壞於王守仁講致良知之學而至以讀書為禁其失也虛胡朏明注韓文問古之所謂鄉先生沒而可祭於社者事何出余檢孔融傳為北海相郡人甄子然臨孝存知名早卒融恨不及之乃命配食縣社以對又鄉先生見儀禮鄭注鄉先生鄉大夫致仕者也獨嘗怪孔文舉並妻子被殺許下止京兆人脂習撫尸哭之不知何以逺葬揚州府治髙士坊疑唐人云孔北海墓所非實然南史梁武帝諸子傳乂理嘗祭孔文舉墓為立碑製文甚美下文云赴其兄南兖州任又兩云廣陵則墓真在今揚州無疑蓋梁距建安尚未逺也古今事不可考者此類是也詩疏辨家父仍叔凡伯在詩為一人在春秋又别一人楚世家陸終生子六人坼剖而産焉干寶曰先儒學士多疑此事譙允南通才達學精核數理者也作古史考以為作者妄記廢而不論余亦尤其生之異也然案六子之世子孫有國升降六代數千年間迭至霸王天將興之必有尤物乎若夫前志所傳修巳背坼而生禹簡狄胸剖而生契厯代久逺莫足相證近魏黃初五年汝南屈雍妻王氏生男兒從右胳下水腹上出而平和自若數月創合母子無恙斯蓋近事之信也以今况古固知注記者之不妄也天地云為隂陽變化安可守之一端槩以常理乎詩云不坼不副無災無害原詩人之㫖明古之婦人嘗有坼剖而産者矣又有因産而遇災害者故美其無害也毛詩酌言獻之傳獻奏也箋云飲酒之禮既奏酒於賔乃薦羞酌言酢之傳酢報也箋云報者賔既卒爵洗而酌主人也酌言酬之傳酬導飲也箋云主人既卒酢爵又酌自飲卒爵復酌進賔猶今俗之勸酒後魏書靈徴志髙祖延興三年秋秀容郡婦人一産四男四産十六男陳師道後山談叢郯城民妻有二十一子而雙生者七陳第曰惟唐韓退之獨知五十八篇為文字之祖故淮西碑法舜典也佛骨表法無逸也畫記法顧命也詞意並佳遂成絶筆管晏列傳子孫世祿於齊有封邑者十餘世索隱曰世本云莊仲山産敬仲夷吾夷吾産武子鳴鳴産桓子啓方啓方産成子孺孺産莊子盧盧産悼子其夷其夷産襄子武武産景子耐涉耐涉微凡十代世譜同武安侯列傳蚡未貴往來侍酒魏其跪起如子姪漢書田蚡列傳作往來侍酒嬰所跪起如子姓師古曰姓生也言同子禮若巳所生唐書蔣乂列傳子係善屬文開成末為諌議大夫宰相李德裕惡李漢以係友壻出為桂管觀察使復坐漢貶唐州刺史西溟曰古者卿大夫五十不稱字别以伯仲天子稱同姓曰伯父叔父是稱也達於天下若去父止稱伯叔則是以長幼為次序而以父之晜弟同於凡人之稱矣此後世失禮之甚者也蘇子瞻曰麻衣如再著墨汁真可飲前輩虛心如此亦是實理唐德宗以順宗子謜為第六子以孫為子今吳下多有之謂之過房宋駙馬尚主多易其名使與父同行太宗之王貽永李遵朂是也王稱曰英宗以前公主廢舅姑之禮主壻輒升行次同諸父英宗特思所以釐正之至神宗即位詔公主出降皆行舅姑禮仁宗康定二年參知政事李若谷罷為資政殿大學士提舉㑹靈觀宫觀置提舉自若谷始也吕溱為翰林學士疏論宰相陳執中仁宗還其疏溱請付執中令自辨初謂還疏之事見此後讀宋史張洎列傳上疏願棄靈武以省關西饋運太宗還其疏又先於仁宗元以科目取士延祐至元統凡七科而罷至正二年復舉行至二十六年凡九科唐命魏徴修隋書命長孫無忌修五代史志志成即入隋書故隋書志兼齊周梁陳之事而李伯藥令狐德棻姚察父子遂不復贅四代之事於其史中當時發凡起例必有成說也鄭康成大司樂注倍文曰諷以聲節之曰誦賈疏倍文曰諷者謂不開讀之以聲節之曰誦者此亦皆倍文但諷是直言之無吟咏誦則非直倍文又為吟咏以聲節之為異文王世子春誦夏絃注誦為歌樂歌樂即詩也以配樂而歌故云歌樂亦是以聲節之唐書路隨列傳初韓愈撰順宗實録書禁中事為切直宦豎不喜訾其非實帝詔隨刋正隨建言臣宗閔臣僧孺謂史官李漢蔣係皆愈之壻不可參撰俾臣得下筆臣謂不然且愈所書非巳自出元和以來相循逮今雖漢等以嫌無害公誼請條示甚謬誤者付史官刋定有詔摘貞元永貞間數事為失實餘不復改漢等亦不罷魏書髙允列傳允字伯恭渤海人晚以昔歲同徴零落將盡感逝懷人作徴士頌蓋止於應命者其有命而不至則闕焉頌末曰昔因朝命與之克諧披襟散想解帶舒懷此欣如昨存亡奄乖靜言思之中心九摧揮毫頌德􅏰爾增哀賈氏儀禮疏曰宫必有碑案士昏禮聘禮云三揖鄭注皆云入門將曲揖既北靣揖當碑揖則大夫士廟內皆有碑鄉飲酒鄉射言三揖則庠序之內亦有碑據祭義既入廟門麗於碑則諸侯廟內有碑明矣但生人寢內不見有廟碑兩君相朝燕在寢豈不三揖乎明亦當有碑矣碑所以識日景觀碑景邪正以知日之早晚也宫廟之碑用石為之葬碑取縣繩繂暫時之間往來運載當用木而已張鶴騰曰條鞭之法始於大理白公棟創之東阿後司國計者以為便遂著為令甲山陬海澨罔不畫然一𠂻於此法張嘉貞列傳對𤣥宗曰昔馬周起徒步謁人主血氣方壯太宗用之能盡其才甫五十卒年四十八而殁向使用少晚則無及矣陛下不以臣不肖必用之要及其時後衰無能為也且百年壽孰為至者臣常恐先朝露死溝壑誠得效萬一無負陛下足矣南史張融列傳融有孝義忌月三旬不聽樂世說新語注桓𤣥不立忌日止立忌時厯代名畫記盧鴻一名浩然髙士也新唐書隱逸傳作盧鴻字皓然楊升菴妄引尸子以為鴻一其名也綱目書徴處士盧鴻鴻下脫一字謬也通鑑祖逖與劉琨俱為司州主簿同寢中夜聞雞鳴蹴琨覺曰此非惡聲也因起舞晉書祖逖列傳作荒雞唐韻正古也與邪通用晉書魏舒傳有主人婦夜産俄聞有車馬之聲相問曰男也女也唐書王璵列傳𤣥宗在位久璵専以祠解中帝意漢以來葬喪皆有瘞錢後世里俗稍以紙寓錢為鬼事至是璵乃用之唐書百官志五經博士各二人掌以其經之學教國子周易尚書毛詩左氏春秋禮記為五經古今人表敤手舜妹說文作敤首舜女弟名案列女傳作舜妹繫當是誤合敤手二字為一字當以古今人表為是嘉靖三年五星聚於營室司天樂頀上言星聚非大福即大禍聚房周昌聚箕齊霸漢興聚東井宋盛聚奎天寶聚尾祿山亂占曰天下兵謀星聚營室春秋長厯論曰書易所謂言當順天以求合非為合以驗天者也宋書天文志星傳曰四星若合是謂太湯其國兵喪並起君子憂小人流五星若合是謂易行有德受慶改立王者奄有四方無德受罰離其國家滅其宗廟今按遺文所存五星聚者有三周漢以王齊以霸周將伐殷五星聚房齊桓將霸五星聚箕漢髙入秦五星聚東井齊則永終侯伯卒無更紀之事是則五星聚有不易行者矣四星聚者有九漢光武平帝元始四年四星聚栁張各五日晉元帝懷帝永嘉六年四星聚牛女並中興而魏漢獻帝初平元年四星聚心又聚箕尾建安二十二年四星又聚宋晉孝武太元十九年安帝義熙三年九年四星各一聚並更紀是則四星聚有易行者矣晉安帝義熙三年二月癸亥熒惑填星太白辰星聚於奎婁從填星也九年二月壬辰歲星熒惑太白填星聚於東井從歲星也唐書天文志天寶九載八月五星聚於尾箕熒惑先至而又先去尾箕燕分也占曰有德則慶無德則殃王勃列傳崔昌請承周漢廢周隋為閏集公卿議可否集賢學士衛包起居舍人閻伯璵上表曰都堂集議之夕四星聚於尾天意昭然矣天寶中隋書律厯志開皇以古斗三升為一升古稱三斤為一斤大業中依復古侯一元曰蓋志有難者八焉不詳則事不該而米鹽詳之則蕪不簡則要不舉而太簡則傷略舉其大則見以為不勤小物忽羸豕弛童牛而細故毛舉則謂之不知類逺古之事傳之則忽荒芒昧近於誣而不傳則羊去而禮亡文不酌諸古則不雅醇而古則逺於俗而不適於用當世之顯人善而傳之則有官盛之嫌而置之則無以示至公不善不諱則怨興而改枋頭則傷於直筆章而不微則戾周身之防而微之則或不習其讀而無以鏡後故志所以難者也唐書選舉志凡禮記春秋左氏傳為大經詩周禮儀禮為中經易尚書春秋公羊傳穀梁傳為小經通二經者大經小經各一若中經二通三經者大經中經小經各一通五經者大經皆通餘經各一孝經論語皆兼通之凡治孝經論語共限一歲尚書公羊傳穀梁傳各一歲半易詩周禮儀禮各二歲禮記左氏傳各三歲寶應二年禮部侍即楊綰上疏言請以孝經論語孟子兼為一經未行李德裕對武宗曰臣無名第不當非進士然臣祖天寶末以仕進無他岐勉强隨計一舉登第自後家不置文選蓋惡其不根藝實唐韓愈將到韶州先寄張端公使君借圖經詩曲江山水聞來久恐不知名訪每難願借圖經將入界每逢佳處便開看唐㑹要諸州圖每三年一送職方建中元年改至五年一造送宋故事諸州貢地圖初以閏為限名閏年圖淳化四年詔自今再閏一造明洪武六年猶命各行省每於閏年繪圖以獻洪武三年二月癸酉上命中書省臣凡行郊祀禮以天下戶口錢糧之籍陳於臺下祭畢收入內庫藏之梁天監六年詔曰頃代以來元日朝畢次㑹羣臣則移就西壁下東向坐求之古義王者宴萬國唯應南靣何更居東靣於是御座南向以西方為上皇太子以下在北壁坐者悉西邊東向尚書令以下在南方坐者悉東邊西向舊元日御座東向酒壺在東壁下御座既南向乃詔壺於南闌下凡舄唯冕服及具服著之履則諸服皆用唯褶服以靴靴履也取便於事施於戎服袴褶之制未詳所起近代服以從戎今纂嚴則文武百官咸服之車駕親戎則縛袴不舒散也劉子𤣥曰議者以祕閣梁南郊圖有衣冠乘馬者此圖後人所為也古今圖畫多矣如畫羣公祖二疏而有曵芒屩者畫昭君入胸奴而婦人有施帷帽者夫芒屩出於水鄉非京華所為帷帽創於隋代非漢宫所用豈可因二畫以為故實乎謂乘馬衣冠宜省杜預手所定左傳齊武帝以賜晉安王子懋曰知汝所好也梁蕭琛得班固漢書序傳真本云是三輔舊書沈約於郊居宅閣齊請王筠為草木十詠書之壁皆直寫文辭不加篇題約謂人曰此詩指物程形無假題署崔慰祖好學聚書至萬卷鄰里年少好事者來從假借日數十袠慰祖親自取與未嘗為辭陶𢎞景以算推知漢熹平三年丁丑冬至加時在日中而天實以乙亥冬至加時在夜半凡差三十八刻是漢厯後天二日十二刻也三百篇中清廟文王等専為樂而作詩關雎鹿鳴等先有詩而後入於樂朱子詩傳盡去舊序但據經文以為注使三百篇盡出於賦乃可安得據比興之辭以求逺古之事乎宋人不知比興小則為害於唐體大則為害於三百施愚山曰今人祗是做韻誰人做詩四賔主者一主中主如一家唯有一主翁也二主中賔如主翁之妻妾兒孫奴婢即主翁之身分以主內事者也三賔中主如主翁之朋友親戚任主翁之外事者也四賔中賔如朋友之朋友與主翁無涉者也於四者中除却賔中賔而主中主亦只一見唯以賔中主鈎動主中賔而成文章八大家無不然也煅者有冷鎚於成刀劍後細密加鎚也精鐵得此愈見堅利毛鐵則破碎注釋詩文之冷鎚也有意則得注精彩倍加無意則破碎布八十縷為升升登也登成也凡織紝之法皆縷縷相登上乃成繒布尚書疏古之贖罪者皆用銅漢始改用黃金但少其斤兩令與銅相敵孔安國傳金作贖刑曰金黃金固非疏復附㑹黃金黃鐵皆銅也尤非項羽本紀項王項伯東嚮坐亞父南嚮坐沛公北嚮坐詳叙各坐次不是閒話總為下文項莊欲擊沛公於坐項伯以身翼蔽沛公兩劍舞地耳使沛公項王並坐便有投鼠忌器之事不得擊殺之張良西嚮侍非立也仍是坐不言坐者承上文此有二證一項王未有以應曰坐樊噲從良坐一樊噲傳時獨沛公與張良得入坐是也他石録外編儒辨第二十五曰六經多被混亂尤甚者易易中尤甚者先天八卦夫卦之方位帝出乎震章八方有明文天地定位章不言八方蓋謂有天上地下之否而亦有地上天下之泰八卦相蕩以成六十四卦也逆數者卜筮而前知吉凶也先天之文見於乾卦先讀去聲非卲子之所謂也愚嘗得張平叔悟真篇於方外士其意與卲子之圖適合離東者移火於木位東三南二同成五也坎西者移水於金位北一西將四共之也乾南坤北者移坎之中實以填離之中虛而成金丹三家相見結嬰兒也巽居西南坤位以長女合老隂黃婆也艮居西北乾位以少男合老陽築基也兑居東南巽位以少女合長女隱寓二七於其中鼎器也震居東北艮位以長男合少男隱寓二八於其中藥物也其於數往知來遙寓順則成人逆則仙也易道無所不包何獨丹法凡醫藥相地三命等無不倚之以立言而離於文王處憂患孔子無大過之意即非儒道之易希夷仙也不妨以丹道說易邵子交於二程何可出此考亭於丹道粗有所見不同佛道之茫然是以手注魏伯陽之參同契見邵子之圖欣然㑹心入之本義而不計丹道可以倚易易不為丹道作也本義之混濫者多矣以天地定位章為第一說苑君道篇郭隗曰今王將東靣目指氣使以求臣則厮役之材至矣南靣聽朝不失揖讓之禮以求臣則人臣之材至矣西靣等禮相抗下之以色不乘勢以求臣則朋友之材至矣北靣拘指逡巡而退以求臣則師傅之材至矣閩陳第曰相鼠似鼠頗大能人立見人則立舉其前兩足若拱揖然愚於薊門山寺見之僧曰此相鼠也及檢埤雅巳有載矣蓋見人若拱似有禮儀詩之所以起興也今注曰相視也鼠蟲之可賤惡者意義索然按說文引此詩亦以相為視誤也久矣鹽法考成化年間戶部尚書葉淇言商人輸粟二斗五升是以銀五分得鹽一引也請更其法課輸銀於運司銀四錢支鹽一引可得粟二石是以一引之鹽坐致八倍之利且商人銀納運司道近而便安是上下交利之道奏可於是商人引鹽悉輸銀於運司類解戶部鹽銀歲驟增至百萬餘兩諸商墾田塞下者悉撤業歸西北商或徙家於淮以便鹽而邊地為墟粟踊貴石至直五兩時議者屢言虛邉儲而實太倉非計顧歲所增入當數十郡一歲錢穀之數而縣官經費日繁即緩急可以支應慮不能捐目前厚利以深維邉計欲復如祖宗時盡輸粟塞下及薄取八分之利必不可得矣唐書髙崇文列傳始崇文選兵五千常若寇至至是卯漏受命辰巳出師器良械完無一不具藩鎮魏博列傳田承嗣為賊前驅嘗大雪祿山按行諸屯至其營若無人已而環甲列卒閲所籍不缺一人祿山異其能使守頴川後漢書樊倏傳言郡國舉孝廉率取年少能報恩者是漢時即有此說宋陳瑩中言使王氏之門有負恩之士則漢之宗社不至於亡其言可感蘇子瞻書傳民至愚而不可欺凡其所毁譽天且以是為聰明而况人君乎隋書禮儀志云梁武帝引孔安國傳尚書山龍華蟲曰華者花也今傳無此語隋書經籍志自後漢佛法行於中國又得西域胡書能以十四字貫一切音文省而義廣謂之婆羅門書蔡傳賈逵說文羿帝嚳射官按說文古諸侯也一曰射師聽其言也厲鄭注曰厲嚴正無確字解夫子哂之馬注曰哂笑無微笑也之解以杖叩其脛孔注曰叩擊也無微擊之解大抵集注多傅㑹燕禮若有諸公則先卿獻之鄭注諸公者謂大國之孤也孤一人言諸者容牧有三監鄉飲酒禮諸公大夫鄭注大國有孤四命謂之公賈疏謂之公者若天子有三公也蔡傳築居也案說文築搗也凡土功曰築長樂敖繼公儀禮集說序云周公此書乃為侯國而作也而王朝之禮不與焉何以知其然也書中十七篇冠昏相見鄉飲鄉射士喪既夕士虞特牲饋食凡九篇皆言侯國之士禮少牢饋食上下二篇皆言侯國之大夫禮聘食燕大射四篇皆言諸侯之禮惟覲禮一篇則言諸侯朝天子之禮然主於諸侯而言也喪服篇中言諸侯及公子大夫士之服詳矣其間雖有諸侯與諸侯之大夫為天子之服然亦皆主於諸侯與其大夫而言也由是觀之則此書决為侯國之書無疑矣又云或曰此十七篇為侯國之書固也豈其本數但如是而已乎抑或有亡逸而不具者乎曰是不可知也但以經文與其禮之類考之恐其篇數本不止此也是經之言士禮特詳其于大夫則但見其祭禮耳而其昏禮喪禮則無聞焉此必其亡逸者也公食大夫禮云設洗如饗謂如其公饗大夫之禮也而今之經乃無是禮焉則是逸之也明矣又諸侯之有覲禮但用於王朝爾若其邦交亦當有相朝相饗相食之禮又諸侯亦當有喪禮祭禮而今皆無聞焉是亦其亡逸者也然此但以經之所嘗言禮之所可推者而知之也而况其間又有不盡然者乎由此言之則是經之篇數本不止於十七亦可見矣左傳昭七年故王臣公孔疏公者五等諸侯之總名通典魏代或問髙堂隆曰案逸禮藏主之處似在堂上壁中魏書禮志清河王懌議曰孔悝反祏載之左史饋食設主著於逸禮邱瓊山曰周尺比今鈔尺六寸四分弱鈔尺者其長凖前明通行寶鈔也今裁縫尺近之朱子曰府君夫人自漢以來為尊神之通稱漢碑已如此史記髙祖本紀五年髙祖與諸侯兵共擊楚軍與項羽决勝垓下淮隂侯將三十萬自當之孔將軍居左費將軍居右皇帝在後絳侯柴將軍在皇帝後項羽之卒可十萬淮隂先合不利却孔將軍費將軍從楚兵不利淮隂侯復乘之大敗垓下漢書髙帝紀止云十二月圍羽垓下而已室中東南隅謂之窔窔少右開戶戶半門也西南隅謂之奧奧少左開牖牖穿壁以木為交窗也户東而牖西皆南鄉户牖之間謂之依故曰天子當依而立諸侯北靣而見天子曰覲鄭康成曰孝子聞名心瞿凡不言人諱者亦謂其相感動也張耒曰有諡不能使欺者傳無諡不能使實者沒謂私諡也熊過曰周禮掌祧守先王先公之祧序先王於先公之上王蓋后稷也司服享先王則衮冕享先公則鷩冕序先王於先公之上王蓋后稷既稱王則祭當稱王尸今何以稱公尸哉然則鳬鷖之詩殆非武王成康時詩也荀子堯問篇其在中蘬之言也曰諸侯自為得師者王得友者霸得疑者存自為謀而莫巳若者亡吕氏春秋恃君覽仲虺有言曰諸侯之德能自為取師者王能自取友者存其所擇而莫如巳者亡梁簡文書曰徒以煙墨不言受其驅染紙札無情任其搖襞甚矣哉文章橫流一至於此春秋公羊莊二十八年傳曰春秋伐者為客注伐人者為客讀伐長言之齊人語也疏謂伐人者必理直而兵强故引聲唱伐長言之喻其無畏也伐者為主注見伐者為主讀伐短言之齊人語也疏謂被伐主必理曲而寡援恐得罪於鄰國故促聲短言之喻其恐懼也公羊子齊人因其俗可以見長短故言此賈公彥曰周道然也者對殷道則不然以其殷道氏族異則得昏姻也賈公彥曰在上謂之發聲在下謂之助句義無取則是發聲也黃宗羲曰公子之字即宗之為氏不必至孫而後稱也姚懿貞觀中諡文獻子崇開元九年諡文獻是父子同諡也隋書牛𢎞傳𢎞以三年之喪祥禫具有降殺期服十一月而練者無所象法以聞於髙祖髙祖納焉下詔除期練之禮自𢎞始也崔文敏公銑曰孔子刪書百篇存者伏生二十八篇傳信可也晉人晚出之書傳疑可也章帝八王傳濟北孝王次九歲喪父至孝梁太后下詔曰諒暗以來二十八月自諸國有憂未之聞也朝廷甚嘉焉文選傅季友為宋公修楚元王墓教注曰墓在彭城宋公過見故修之今以為在山陽者非也後漢輿服志注世本云奚仲始作車古史考曰黃帝作車引重致逺其後少昊時駕牛禹時奚仲駕馬臣昭案服牛乘馬以利天下其所起逺矣豈奚仲為始世本之誤古史考所說是也輿服志注古文尚書曰豫臨兆民凛乎若朽索之馭六馬逸禮王度記曰天子駕六馬諸侯駕四大夫駕三士二庶人一周禮四馬為乘毛詩天子至大夫同駕四士駕二易京氏春秋公羊說皆云天子駕六許慎以為天子駕六諸侯及卿駕四大夫駕三士駕二庶人駕一史記曰秦始皇以水數制乘六馬鄭𤣥以為天子四馬周禮乘馬有四圉各養一馬也諸侯亦四馬顧命時諸侯皆獻乘黃朱乘亦四馬也今帝者駕六此自漢制與古異耳陸深曰詩中有三章而辭義無大相逺者如樛木螽斯之類蓋樂之三成猶今之三闋三疊是巳曹操軍國之饒起於棗祗而成於任竣皆屯田也髙文襄曰國初無考察始正統元年嗣是以往亦皆十年一行耳未有一定之題目一定之處分至𢎞治十七年始令六年一次考察遂迄今為然然事例有八目四科曰貪曰酷為民曰不謹曰罷軟冠帶閒住曰老曰疾致仕曰才力不及曰浮躁淺露降調外任法可謂密矣宋真宗咸平二年禮官言故事帝后同陵謂之合葬同塋謂之祔葬新安程元初曰昔諸葛武侯以一隅抗衡魏吳曽築讀書臺藉多士之力考華陽國志木牛流馬亦一士人所獻武侯採而用之李德裕曰帝王之雄辨不足以服奸臣之心唯能塞諍臣之口金之將亡也臨事不肯分明可否相習低言緩語互推讓號養相體陳同甫王道甫之沒也葉正則立新例併志之其言曰同甫得無以死後餘力引而齊之使道甫亦傳而信乎古之君子悼賢人志士之抑沒而惟恐其不得而信也其用心至於如此唐書后妃列傳德宗昭德皇后王氏帝為魯王時納為嬪生順宗既即位册號淑妃貞元二年妃久疾帝念之遂立為皇后册禮方訖而后崩羣臣大臨三日帝七日釋服葬靖陵李紓上諡冊曰大行皇后帝謂不典詔翰林學士吳道𤣥改撰冊曰咨后王氏然議者謂岑文本所上文德皇后冊言皇后長孫氏為得體永貞元年改祔崇陵唐書三鄭列傳鄭餘慶憲宗立復拜同中書門下平章事子浣本名涵第進士纍遷右補闕敢言無所諱憲宗謂餘慶曰涵卿令子而朕直臣也可更相賀是父為相子居言職之明驗也鄭覃文宗太和九年拜同中書門下平章事弟朗由山南幕府入遷右拾遺是兄為相弟居言職之明驗也蓋下文云朗開成中擢起居郎開成凡五年其所為中應指三年四年而宰相表覃以開成四年五月罷非適兄弟同時乎同歲同月止後一日拜同中書門下平章事者李石石當國弟福為監察御史見宗室宰相列傳福與朗後亦俱至相他若竇參相而族子申為給事中鄭絪相而餘慶子浣即其從孫為右補闕皆班班可考惟杜佑之子從郁元和初為左補闕崔羣等以宰相子為嫌僅此一見初非有如宋故事必相避者也唐書韋貫之列傳宰相杜佑子從郁為補闕貫之與崔羣持不可換左拾遺復奏拾遺補闕為諫官等宰相政有得失使從郁議是子而議父殆不可訓卒改他官宋史全文續資治通鑑乙丑元豐八年冬十月丁丑詔尚書侍郎給舍諫議中丞待制以上各舉堪充諌官二員以聞初中㫖除范純仁為左諫議大夫唐淑問為左司諫朱光庭為左正言蘇轍為右司諫范祖禹為左正言令三省樞密院同進呈太皇太后問此五人何如章惇曰故事諫官皆令兩制以上奏舉然後執政進擬今除目從中出臣不知陛下從何知之得非左右所薦此門不可寖啓太皇太后曰皆大臣薦非左右也惇曰大臣當明揚何以密薦由是吕公著以范祖禹韓縝司馬光以范純仁親嫌為言惇曰臺諫所以糾繩執政之不法故事執政初除親戚及所舉之人見為臺諌官者皆徙他官今當循故事不可違祖宗法光曰純仁祖禹作諫官誠協衆望不可以臣故妨賢者進臣寧避位惇曰縝光公著必不至有私萬一他日有奸臣執政援此為例純仁祖禹請除他官仍令兩制以上各得奏舉故有是詔淑問光庭轍除命皆如故純仁改為天章閣待制祖禹為著作佐郎傳是樓藏李燾長編仁宗皇祐元年春正月辛酉詔曰自古為治必戒苛察近歲風俗爭事傾危獄行滋多上下暌急傷纍和氣朕甚悼焉自今言事者非朝廷得失民間利病毋得以風聞彈奏違者坐之宋史吕誨列傳仁宗時誨為殿中侍御史廷臣多上章訐人罪誨言臺諌官許風聞言事蓋欲採納以補政茍非職分是為侵官今乃詆斥平生暴揚曖昧刻薄之態浸以成風請下詔懲革髙麗史宣宗世家辛未八年為宋元祐六年五月丙午戶部尚書李資義還自宋奏云帝問我國書籍多好本命館伴書所求書目録授之乃曰雖有卷第不足者亦須傳寫附來書目則百篇尚書以下計然子十五卷以上凡一百二十九部云內黃帝針經九卷宋史髙麗列傳元祐七年遣黃宗慤來獻黃帝針經哲宗本紀元祐八年春正月庚子詔頒髙麗所獻黃帝針經於天下即其事不聞别有所獻則其國之書籍亦未備况百篇尚書乎原哲宗意或聞先臣歐陽修有日本刀歌傳聞其國居大島土壤饒沃風俗好前朝貢獻屢往來士人往往工詞藻徐福行時書未焚逸書百篇今尚存令嚴不許傳中國舉世無人識古文謂日本既有髙麗應不獨無故命其使者往求於海外不知歌特詩人寄興之辭不必核實曷足據乃明豐坊之之父豐熙忽稱家藏古書世本曰箕子朝鮮本曰徐市倭國本倭國即日本若以實歐陽公之歌辭殆怪而可笑者矣梁書髙祖三王列傳南康王績天監八年封邑二千戶出為輕車將軍領石頭戍軍事時年五歲晉書顔含傳郭璞嘗遇含欲為之筮含曰命在天位在人修已而天不與者命也守道而人不知者性也自有性命無勞蓍龜通鑑令狐潮圍張巡於雍丘朝廷聲問不通謂巡曰向見雷將軍方知足下軍令然其如天道何巡謂之曰君未識人倫焉知天道世傳五月十三日為關公生辰明㑹典亦載之但云其字為四戊午則不可不辨公死於獻帝建安二十四年己亥史不言其壽元人胡琦考之當在六十上下果生於戊午僅四十有二耳不合一戊午乃靈帝光和元年考通鑑目録是年四月庚戍朔五月無戊午不合二古人始生止記年月日不及時即唐李虛中推命猶不以時見韓昌黎集安有公生東漢間而傳其為戊午時於千載下乎不合三陸深書輯曰科斗今之蝦蟆子是也上古未有筆墨以竹挺㸃漆書竹簡上竹硬漆膩畫不能行故首粗尾細自然成象後人巧擬形狀失本意矣黃氏日抄曰夫詩非序莫知其所自作去之千載之下欲一旦盡去自昔相傳之說别求其說於茫冥之中誠亦難事宋陳無擇曰二十四銖為兩每兩古文六銖錢四箇開元錢三箇至趙宋廣科以開元錢十箇為兩今之三兩得漢唐十兩明矣千金本草皆以古三兩為今一兩以古三升為今一升宋林億等校正仲景醫書先校定傷寒論次校定金匱玉函經今又校成金匱玉函要略方凡三卷此三卷王洙得之於館閣蠧簡中依舊名曰金匱方論由此觀之則今世所傳傷寒論十卷即首所列者也金匱要略三卷即末所列者也惟金匱玉函經不傳文獻通考以金匱玉函經為即要略似非焦弱侯曰往蘇子容聞人語故事必檢出處坡老每有撰著雖目前事率令少章叔黨諸人檢視而後出其精審乃爾潛邱劄記卷一
